function ScoreCircle({score,max=10,size=72}){
  const r=size/2-4;const c=2*Math.PI*r;const pct=score/max;const offset=c*(1-pct);
  const color=pct>=0.7?T.ok:pct>=0.4?T.hi:T.accent;
  return <svg width={size} height={size} style={{display:"block"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={4}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={4}
      strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
      style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset .8s ease"}}/>
    <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
      style={{fontFamily:Fd,fontSize:size*.32,fontWeight:700,fill:color}}>{score}</text>
  </svg>;
}

function ScoreBar({label,value,max=10}){
  const pct=Math.round((value/max)*100);
  const color=pct>=70?T.ok:pct>=40?"#B8860B":T.accent;
  return <div style={{marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
      <span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>{label}</span>
      <span style={{fontFamily:Fb,fontSize:12,fontWeight:600,color}}>{value}/{max}</span>
    </div>
    <div style={{height:4,borderRadius:4,background:T.border}}>
      <div style={{height:"100%",borderRadius:4,background:color,width:`${pct}%`,transition:"width .6s ease"}}/>
    </div>
  </div>;
}

function AnnotatedText({text,errors}){
  if(!errors||!errors.length)return <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>{text}</p>;
  // Build segments from error positions
  const sorted=[...errors].sort((a,b)=>(a.start||0)-(b.start||0));
  const parts=[];let pos=0;
  for(const err of sorted){
    const start=err.start!=null?err.start:text.toLowerCase().indexOf(err.original?.toLowerCase()||"~~~",pos);
    const len=err.original?err.original.length:(err.end?err.end-start:0);
    if(start<0||len<=0)continue;
    if(start>pos)parts.push({text:text.slice(pos,start),type:"normal"});
    parts.push({text:text.slice(start,start+len),type:err.type||"grammar",correction:err.correction,explanation:err.explanation});
    pos=start+len;
  }
  if(pos<text.length)parts.push({text:text.slice(pos),type:"normal"});
  if(!parts.length)return <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>{text}</p>;

  const[active,setActive]=useState(null);
  const colors={grammar:{underline:"#C0392B",bg:"#FFF0F0"},unnatural:{underline:"#B8860B",bg:T.hiSoft}};

  return <div style={{position:"relative"}}>
    <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>
      {parts.map((p,i)=>{
        if(p.type==="normal")return <span key={i}>{p.text}</span>;
        const c=colors[p.type]||colors.grammar;
        return <span key={i} onClick={()=>setActive(active===i?null:i)} style={{
          textDecoration:"underline wavy",textDecorationColor:c.underline,
          background:active===i?c.bg:"transparent",cursor:"pointer",
          borderRadius:3,padding:active===i?"1px 3px":0,transition:"all .2s"
        }}>{p.text}</span>;
      })}
    </p>
    {active!=null&&parts[active]&&parts[active].correction&&<FadeIn>
      <div style={{background:T.card,borderRadius:12,padding:14,boxShadow:T.shadow,marginTop:10,border:`1.5px solid ${(colors[parts[active].type]||colors.grammar).underline}25`}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:(colors[parts[active].type]||colors.grammar).underline,margin:"0 0 4px"}}>
          {parts[active].type==="grammar"?"Grammar":"Phrasing"}
        </p>
        <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 4px"}}>
          <span style={{textDecoration:"line-through",opacity:0.5}}>{parts[active].text}</span>{" → "}
          <strong style={{color:T.ok}}>{parts[active].correction}</strong>
        </p>
        {parts[active].explanation&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>{parts[active].explanation}</p>}
      </div>
    </FadeIn>}
  </div>;
}

/* ═══════════════════════════════════════════════
   MAIN APP — with API auth + persistence
   ═══════════════════════════════════════════════ */
function App(){
  const[loading,setLoading]=useState(true);
  const[authed,setAuthed]=useState(false);
  const[screen,setScreen]=useState("welcome");
  const[lpp,setLpp]=useState(null);
  const[level,setLevel]=useState("B1");
  const[lScore,setLScore]=useState({s:0,t:0});
  const[streak,setStreak]=useState(0);
  const[lessons,setLessons]=useState(0);
  const[lessonCards,setLessonCards]=useState([]);
  const[cardStats,setCardStats]=useState({});
  const[allCards,setAllCards]=useState([]);
  const[isAdmin,setIsAdminState]=useState(false);
  const[sessionData,setSessionData]=useState(null);
  const[sessionLoading,setSessionLoading]=useState(false);
  const[recallMsg,setRecallMsg]=useState("");

  const loadCards=async()=>{
    const cards=await apiLoadCards();
    setAllCards(cards);
    return cards;
  };

  useEffect(()=>{
    (async()=>{
      if(!getToken()){setLoading(false);return}
      setIsAdminState(getIsAdmin());
      const[d]=await Promise.all([apiLoad(),loadCards()]);
      if(d&&d.lessonsCompleted>0){
        const s=calcStreak(d.lastDate,d.streak);
        setStreak(s);setLpp(d.lppProfile);setLevel(d.userLevel);setLessons(d.lessonsCompleted);setCardStats(d.cardStats||{});
        setScreen("welcome-back");
      }
      setAuthed(true);setLoading(false);
    })();
  },[]);

  const onAuth=async()=>{
    setIsAdminState(getIsAdmin());
    const[d]=await Promise.all([apiLoad(),loadCards()]);
    if(d&&d.lessonsCompleted>0){
      const s=calcStreak(d.lastDate,d.streak);
      setStreak(s);setLpp(d.lppProfile);setLevel(d.userLevel);setLessons(d.lessonsCompleted);setCardStats(d.cardStats||{});
      setScreen("welcome-back");
    }else{setScreen("welcome")}
    setAuthed(true);
  };

  const onLogout=()=>{clearToken();setIsAdmin(false);setIsAdminState(false);setAuthed(false);setScreen("welcome");setLpp(null);setLevel("B1");setStreak(0);setLessons(0);setCardStats({});setAllCards([])};

  const persist=async(nl,prof,lv,newStats)=>{
    const t=getToday(),d=await apiLoad(),prev=d?d.streak:0,pd=d?d.lastDate:null;
    let s;if(pd===t)s=prev;else if(pd===new Date(Date.now()-864e5).toISOString().split("T")[0])s=prev+1;else s=1;
    await apiSave({streak:s,lastDate:t,lessonsCompleted:nl,lppProfile:prof,userLevel:lv,cardStats:newStats});setStreak(s);
  };

  const startSession=async()=>{
    setSessionLoading(true);
    const session=await apiComposeSession();
    setSessionLoading(false);
    if(session&&(session.type==="mixed"||session.type==="mixed_with_listening"||session.type==="mixed_with_writing")&&session.passage){
      setSessionData(session);
      setScreen("reading");
    }else if(session&&session.type==="writing"&&session.writing_prompt){
      setSessionData(session);
      setScreen("writing");
    }else{
      setScreen("lesson");
    }
  };

  const onGoal=id=>{setLpp(id);setScreen("placement")};
  const onPlace=lv=>{setLevel(lv);setScreen("level-reveal")};

  const onLesson=async(score,total,cards,results)=>{
    const ns={...cardStats};for(const r of results){ns[r.cardId]=updateSRS(ns[r.cardId]||newCardStats(),r.correct)}
    setCardStats(ns);const nl=lessons+1;setLessons(nl);setLScore({s:score,t:total});setLessonCards(cards);await persist(nl,lpp,level,ns);setScreen("celebration");
  };

  const onReadingComplete=(score,total,results,rcMsg)=>{
    const nl=lessons+1;setLessons(nl);setLScore({s:score,t:Math.max(total,1)});setLessonCards([]);
    setRecallMsg(rcMsg||"");
    persist(nl,lpp,level,cardStats);
    setSessionData(null);setScreen("celebration");
  };

  const onReset=async()=>{await apiReset();setScreen("welcome");setLpp(null);setLevel("B1");setStreak(0);setLessons(0);setLessonCards([]);setCardStats({})};

  const masteredCount=Object.values(cardStats).filter(s=>s.mastery>=4).length;
  const seenCount=Object.values(cardStats).filter(s=>s.seen>0).length;

  if(loading) return <div style={{maxWidth:440,margin:"0 auto",background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Loading...</p></div>;
  if(!authed) return <div style={{maxWidth:440,margin:"0 auto"}}><AuthScreen onAuth={onAuth}/></div>;

  return <div style={{maxWidth:440,margin:"0 auto",background:T.bg,minHeight:"100vh",position:"relative",overflow:"hidden"}}>
    {screen==="welcome"&&<WelcomeScreen onStart={()=>setScreen("goal")} isAdmin={isAdmin} onAdmin={()=>setScreen("admin")}/>}
    {screen==="welcome-back"&&<WelcomeBackScreen streak={streak} level={level} phrases={seenCount} masteredCount={masteredCount} lpp={lpp} onContinue={startSession} onReset={onReset} onLogout={onLogout} isAdmin={isAdmin} onAdmin={()=>setScreen("admin")}/>}
    {screen==="goal"&&<GoalScreen onSelect={onGoal}/>}
    {screen==="placement"&&<PlacementScreen onComplete={onPlace}/>}
    {screen==="level-reveal"&&<LevelRevealScreen level={level} onContinue={()=>setScreen("lesson")}/>}
    {screen==="lesson"&&<LessonScreen cards={allCards} onComplete={onLesson} allStats={cardStats} lpp={lpp}/>}
    {screen==="reading"&&sessionData&&<ReadingScreen session={sessionData} cards={allCards} onComplete={onReadingComplete} allStats={cardStats} lpp={lpp} listeningExercise={sessionData.listening_exercise||null} writingPrompt={sessionData.writing_prompt||null}/>}
    {screen==="writing"&&sessionData?.writing_prompt&&<WritingScreen prompt={sessionData.writing_prompt} onComplete={()=>{setSessionData(null);const nl=lessons+1;setLessons(nl);setLScore({s:7,t:10});setLessonCards([]);setRecallMsg("Nice work on your writing today!");persist(nl,lpp,level,cardStats);setScreen("celebration")}} inSession={false}/>}
    {screen==="celebration"&&<CelebrationScreen score={lScore.s} total={lScore.t} streak={streak} lessonCards={lessonCards} allStats={cardStats} lpp={lpp} recallMsg={recallMsg} onContinue={()=>setScreen("tomorrow")}/>}
    {screen==="tomorrow"&&<TomorrowScreen lppProfile={lpp} onNextLesson={startSession} onRestart={onReset}/>}
    {screen==="admin"&&<AdminPanel onBack={()=>setScreen(lessons>0?"welcome-back":"welcome")}/>}
    {sessionLoading&&<div style={{position:"fixed",inset:0,background:"rgba(251,247,240,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{width:48,height:48,borderRadius:24,background:`linear-gradient(135deg,${T.accent},${T.hi})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><BookOpen size={22} color="#fff"/></div><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Preparing your session...</p></div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
