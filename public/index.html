/* ═══════════════════════════════════════════════
   API STORAGE (replaces window.storage)
   ═══════════════════════════════════════════════ */
function getToken(){return localStorage.getItem("eng_token")}
function setToken(t){localStorage.setItem("eng_token",t)}
function clearToken(){localStorage.removeItem("eng_token")}
function getUsername(){return localStorage.getItem("eng_user")||""}
function setUsername(u){localStorage.setItem("eng_user",u)}
function getIsAdmin(){return localStorage.getItem("eng_admin")==="true"}
function setIsAdmin(v){localStorage.setItem("eng_admin",v?"true":"false")}

async function apiLoad(){
  const t=getToken();if(!t)return null;
  try{
    const r=await fetch(window.API_URL+"/api/progress",{headers:{"Authorization":"Bearer "+t}});
    if(!r.ok)return null;
    const j=await r.json();return j.data||null;
  }catch{return null}
}
async function apiSave(data){
  const t=getToken();if(!t)return;
  try{await fetch(window.API_URL+"/api/progress",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+t},body:JSON.stringify({data})})}catch{}
}
async function apiReset(){
  const t=getToken();if(!t)return;
  try{await fetch(window.API_URL+"/api/reset",{method:"POST",headers:{"Authorization":"Bearer "+t}})}catch{}
}
async function apiRegister(username,password){
  const r=await fetch(window.API_URL+"/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
  const j=await r.json();if(!r.ok)throw new Error(j.error||"Registration failed");
  setToken(j.token);setUsername(j.username);setIsAdmin(j.is_admin||false);return j;
}
async function apiLogin(username,password){
  const r=await fetch(window.API_URL+"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
  const j=await r.json();if(!r.ok)throw new Error(j.error||"Login failed");
  setToken(j.token);setUsername(j.username);setIsAdmin(j.is_admin||false);return j;
}

function getToday(){return new Date().toISOString().split("T")[0]}
function calcStreak(last,cur){const t=getToday();if(last===t)return cur;const y=new Date(Date.now()-864e5).toISOString().split("T")[0];return last===y?cur+1:1}

function newCardStats(){return{interval:0,ease:2.5,correct:0,seen:0,streak:0,lastSeen:null,nextReview:null,mastery:0}}
function updateSRS(stats,wasCorrect){const s={...stats};s.seen++;s.lastSeen=getToday();if(wasCorrect){s.correct++;s.streak++;if(s.mastery===0)s.mastery=1;else if(s.streak>=2&&s.mastery<5)s.mastery=Math.min(5,s.mastery+1);if(s.interval===0)s.interval=1;else if(s.interval===1)s.interval=3;else s.interval=Math.round(s.interval*s.ease);s.ease=Math.min(3,s.ease+0.1)}else{s.streak=0;s.mastery=Math.max(0,s.mastery-1);s.interval=0;s.ease=Math.max(1.3,s.ease-0.2)}const n=new Date();n.setDate(n.getDate()+s.interval);s.nextReview=n.toISOString().split("T")[0];return s}

function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5)}
function buildLesson(allCards,statsMap){
  const today=getToday();const due=[],fresh=[],mastered=[];
  for(const c of allCards){const st=statsMap[c.id];if(!st||st.seen===0)fresh.push(c);else if(st.nextReview&&st.nextReview<=today)due.push({card:c,st,overdue:daysBetween(st.nextReview,today)});else if(st.mastery>=3)mastered.push({card:c,st})}
  due.sort((a,b)=>b.overdue-a.overdue);fresh.sort(()=>Math.random()-.5);
  const SIZE=8,lesson=[],used=new Set();
  const wp=mastered.length>=2?mastered:[...mastered,...due.filter(d=>d.st.mastery>=2)];
  for(let i=0;i<Math.min(2,wp.length);i++){if(!used.has(wp[i].card.id)){lesson.push(wp[i].card);used.add(wp[i].card.id)}}
  for(const d of due){if(lesson.length>=SIZE-2&&fresh.length>0)break;if(lesson.length>=SIZE-1)break;if(!used.has(d.card.id)){lesson.push(d.card);used.add(d.card.id)}}
  const nt=Math.max(2,Math.ceil(SIZE*.3));let na=0;
  for(const c of fresh){if(lesson.length>=SIZE-1)break;if(na>=nt)break;if(!used.has(c.id)){lesson.push(c);used.add(c.id);na++}}
  for(const c of[...due.map(d=>d.card),...fresh,...mastered.map(m=>m.card)]){if(lesson.length>=SIZE)break;if(!used.has(c.id)){lesson.push(c);used.add(c.id)}}
  for(const c of allCards){if(lesson.length>=SIZE)break;if(!used.has(c.id)){lesson.push(c);used.add(c.id)}}
  return lesson.slice(0,SIZE);
}

function RearrangeEx({card,onResult,onHelp}){const[pool,setPool]=useState([]);const[built,setBuilt]=useState([]);const[done,setDone]=useState(false);const[ok,setOk]=useState(null);const[msg,setMsg]=useState("");useEffect(()=>{setPool([...card.rearrange.words]);setBuilt([]);setDone(false);setOk(null)},[card.id]);const add=(w,i)=>{if(done)return;const nb=[...built,w],np=pool.filter((_,j)=>j!==i);setBuilt(nb);setPool(np);if(np.length===0){const u=nb.join(" ").toLowerCase().replace(/[^a-z0-9' ]/g,"").trim(),t=card.rearrange.sentence.toLowerCase().replace(/[^a-z0-9' ]/g,"").trim();setOk(u===t);setDone(true);setMsg(u===t?rnd(MW):rnd(MM))}};const rm=i=>{if(done)return;setPool([...pool,built[i]]);setBuilt(built.filter((_,j)=>j!==i))};const reset=()=>{setPool([...card.rearrange.words]);setBuilt([]);setDone(false);setOk(null)};
  return <FadeIn key={`r-${card.id}`}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><Badge color={T.purple} bg={T.purpleSoft}>🧩 REARRANGE</Badge><button onClick={onHelp} style={{background:T.navySoft,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:Fb,fontSize:12,fontWeight:600,color:T.navy}}><HelpCircle size={14}/>Help</button></div><p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:"4px 0 10px"}}>Tap words in the right order:</p><div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:12}}><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 3px"}}>🇮🇩 {card.meaning}</p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇬🇧 {card.meaningEn}</p></div><div style={{minHeight:48,background:T.card,borderRadius:12,border:`2px dashed ${built.length?T.accent:T.border}`,padding:10,marginBottom:10,display:"flex",flexWrap:"wrap",gap:6}}>{!built.length&&<span style={{fontFamily:Fb,fontSize:14,color:T.border}}>Tap words below...</span>}{built.map((w,i)=><button key={`b${i}`} onClick={()=>rm(i)} style={{fontFamily:Fb,fontSize:14,fontWeight:500,background:T.accentSoft,color:T.accent,border:`1.5px solid ${T.accent}40`,borderRadius:7,padding:"5px 11px",cursor:done?"default":"pointer"}}>{w}</button>)}</div><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>{pool.map((w,i)=><button key={`p${i}`} onClick={()=>add(w,i)} style={{fontFamily:Fb,fontSize:14,fontWeight:500,background:T.card,color:T.text,border:`1.5px solid ${T.border}`,borderRadius:7,padding:"5px 11px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>{w}</button>)}</div>{!done&&built.length>0&&<button onClick={reset} style={{background:"none",border:"none",fontFamily:Fb,fontSize:13,color:T.muted,cursor:"pointer",display:"flex",alignItems:"center",gap:5,marginBottom:8}}><RefreshCw size={13}/>Reset</button>}{done&&<FadeIn><div style={{padding:14,borderRadius:12,background:ok?T.okSoft:T.hiSoft,marginBottom:12}}>{ok?<p style={{fontFamily:Fb,fontSize:14,color:T.ok,fontWeight:500,margin:0}}>✨ {msg}</p>:<div><p style={{fontFamily:Fb,fontSize:14,color:"#B8860B",fontWeight:500,margin:"0 0 5px"}}>{msg}</p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0}}>Correct: <strong style={{color:T.ok}}>{card.rearrange.sentence}</strong></p></div>}</div><Btn onClick={()=>onResult(ok)}>Continue →</Btn></FadeIn>}</FadeIn>
}

function RecallEx({card,onResult,onHelp,autoHint=false}){const[input,setInput]=useState("");const[done,setDone]=useState(false);const[ok,setOk]=useState(null);const[msg,setMsg]=useState("");const[hint,setHint]=useState(autoHint);const ref=useRef(null);useEffect(()=>{setInput("");setDone(false);setOk(null);setHint(autoHint);setTimeout(()=>ref.current?.focus(),100)},[card.id,autoHint]);const check=()=>{const a=input.trim().toLowerCase().replace(/[.,!?…]/g,""),t=card.phrase.toLowerCase().replace(/[.,!?…]/g,"").trim(),c=a.includes(t)||(t.includes(a)&&a.length>=t.length*.7);setOk(c);setDone(true);setMsg(c?rnd(MW):rnd(MM))};
  return <FadeIn key={`rc-${card.id}`}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><Badge color="#B8860B" bg={T.hiSoft}>🧠 TYPE FROM MEMORY</Badge><button onClick={onHelp} style={{background:T.navySoft,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:Fb,fontSize:12,fontWeight:600,color:T.navy}}><HelpCircle size={14}/>Help</button></div><p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:"4px 0 10px"}}>What English phrase means this?</p><div style={{background:T.card,borderRadius:14,padding:18,boxShadow:T.shadow,marginBottom:12}}><p style={{fontFamily:Fd,fontSize:18,fontWeight:500,color:T.text,margin:"0 0 6px",fontStyle:"italic",lineHeight:1.4}}>"{card.meaning}"</p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 10px"}}>🇬🇧 {card.meaningEn}</p><div style={{background:T.navySoft,borderRadius:10,padding:10}}><p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:0}}>💬 {card.context.replace(new RegExp(card.phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),"______")}</p></div></div>{hint&&!done&&<FadeIn><div style={{background:T.hiSoft,borderRadius:10,padding:"8px 12px",marginBottom:10}}><p style={{fontFamily:Fb,fontSize:13,color:"#B8860B",margin:0}}>💡 Starts with: <strong>"{card.phrase.slice(0,Math.ceil(card.phrase.length*.45))}..."</strong></p></div></FadeIn>}{!done&&<><input ref={ref} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&input.trim())check()}} placeholder="Type the phrase..." style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:16,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",marginBottom:12}} onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.border}/><div style={{display:"flex",gap:10}}>{!hint&&<Btn v="secondary" onClick={()=>setHint(true)} style={{width:"auto",flex:"0 0 auto",padding:"14px 20px"}}>Hint</Btn>}<Btn onClick={check} disabled={!input.trim()}>Check</Btn></div></>}{done&&<FadeIn><div style={{padding:14,borderRadius:12,background:ok?T.okSoft:T.hiSoft,marginBottom:12}}>{ok?<div><p style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.ok,margin:"0 0 3px"}}>🧠 Recalled!</p><p style={{fontFamily:Fb,fontSize:14,color:T.ok,margin:0}}>{msg}</p></div>:<div><p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:"#B8860B",margin:"0 0 6px"}}>{msg}</p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 5px"}}>Answer: <strong style={{color:T.ok}}>{card.phrase}</strong></p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,fontStyle:"italic"}}>"{card.context}"</p></div>}</div><Btn onClick={()=>onResult(ok)}>Continue →</Btn></FadeIn>}</FadeIn>
}

{onConversation} style={{marginTop:10}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>💬 Practice conversation</span></Btn>}{onGrammar&&<Btn v="ghost" onClick={onGrammar} style={{marginTop:10}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📐 Grammar lesson</span></Btn>}{onConnectedSpeech&&<Btn v="ghost" onClick={onConnectedSpeech} style={{marginTop:10}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🔊 Fast English</span></Btn>}{onToefl&&(level==="B2"||level==="C1"||level==="C2")&&<Btn v="ghost" onClick={onToefl} style={{marginTop:10}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📝 TOEFL Practice</span></Btn>}{onProgress&&<Btn v="ghost" onClick={onProgress} style={{marginTop:10}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📊 Progress</span></Btn>}{onDomains&&<Btn v="ghost" onClick={onDomains} style={{marginTop:10}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🎯 Change topics</span></Btn>}<button onClick={onReset} style={{background:"none",border:"none",fontFamily:Fb,fontSize:13,color:T.muted,cursor:"pointer",marginTop:16,display:"block",width:"100%",textAlign:"center",opacity:.5}}>Reset progress</button></FadeIn></div>}

function GoalScreen({onSelect}){return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}><FadeIn><Badge>STEP 1 OF 3</Badge><h2 style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:T.text,margin:"12px 0 8px"}}>What sounds good<br/>right now?</h2><p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:"0 0 24px"}}>Pick whatever catches your eye.</p></FadeIn>{GO.map((g,i)=><FadeIn key={g.id} delay={150+i*80}><button onClick={()=>onSelect(g.id)} style={{width:"100%",background:T.card,border:`1.5px solid ${T.border}`,borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:16,textAlign:"left",transition:"all .2s",boxShadow:T.shadow,marginBottom:12}} onMouseEnter={e=>{e.currentTarget.style.borderColor=g.color;e.currentTarget.style.transform="translateY(-2px)"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform=""}}><div style={{width:48,height:48,borderRadius:12,background:`${g.color}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{g.icon}</div><div style={{flex:1}}><div style={{fontFamily:Fb,fontSize:16,fontWeight:600,color:T.text}}>{g.title}</div><div style={{fontFamily:Fb,fontSize:13,color:T.muted,marginTop:2}}>{g.sub}</div></div><ChevronRight size={18} color={T.muted} style={{flexShrink:0}}/></button></FadeIn>)}</div>}

function PlacementScreen({onComplete}){const[cur,setCur]=useState(0);const[scores,setScores]=useState([]);const[sel,setSel]=useState(null);const[show,setShow]=useState(false);const[opts,setOpts]=useState([]);useEffect(()=>{setOpts([...PQ[cur].options].sort(()=>Math.random()-.5))},[cur]);const q=PQ[cur];const pick2=(opt,i)=>{if(sel!==null)return;setSel(i);setShow(true);const ns=[...scores,opt.score];setScores(ns);setTimeout(()=>{if(cur<PQ.length-1){setCur(cur+1);setSel(null);setShow(false)}else{const avg=ns.reduce((a,b)=>a+b,0)/ns.length;onComplete(avg>=3.5?"C1":avg>=2.5?"B2":avg>=1.5?"B1":"A2")}},1100)};return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}><FadeIn><Badge>STEP 2 OF 3</Badge><h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"12px 0 4px"}}>Quick vibe check</h2><p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px"}}>No scores. Just finding your level.</p></FadeIn><Bar current={cur+1} total={PQ.length}/><div style={{marginTop:24}}><FadeIn key={q.id}><p style={{fontFamily:Fb,fontSize:17,fontWeight:500,color:T.text,margin:"0 0 20px",lineHeight:1.5}}>{q.prompt}</p><div style={{display:"flex",flexDirection:"column",gap:10}}>{opts.map((o,i)=>{const best=opts.reduce((a,b)=>a.score>b.score?a:b),isBest=show&&o===best,isSel=sel===i;let bg=T.card,bdr=T.border;if(isSel&&!isBest){bdr=T.hi;bg=T.hiSoft}if(isBest&&show){bdr=T.ok;bg=T.okSoft}return <button key={i} onClick={()=>pick2(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"14px 16px",cursor:sel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,color:T.text,textAlign:"left",transition:"all .3s",lineHeight:1.45}}><div style={{display:"flex",alignItems:"flex-start",gap:10}}><span style={{flexShrink:0,width:22,height:22,borderRadius:11,border:`2px solid ${isBest&&show?T.ok:isSel?T.hi:T.border}`,display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,background:isBest&&show?T.ok:"transparent",transition:"all .3s"}}>{isBest&&show&&<Check size={12} color="#fff" strokeWidth={3}/>}</span><span>{o.text}</span></div></button>})}</div></FadeIn></div></div>}

function LevelRevealScreen({level,onContinue}){const d={A2:{w:"1,000+",d:"You understand basic phrases.",n:"Building confidence"},B1:{w:"2,500+",d:"You handle everyday situations.",n:"Sounding natural"},B2:{w:"4,000+",d:"You interact fluently on familiar topics.",n:"Professional English"},C1:{w:"8,000+",d:"You express yourself fluently.",n:"Advanced polish"}};const info=d[level]||d.B1;return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32,background:T.bg}}><FadeIn><div style={{textAlign:"center",marginBottom:32}}><Badge><Sparkles size={13} style={{verticalAlign:-2,marginRight:4}}/>Level detected</Badge></div></FadeIn><FadeIn delay={300}><div style={{textAlign:"center",marginBottom:32}}><div style={{fontFamily:Fd,fontSize:64,fontWeight:700,color:T.accent,lineHeight:1}}>{level}</div><p style={{fontFamily:Fb,fontSize:14,color:T.muted,marginTop:8}}>You know <strong style={{color:T.text}}>{info.w}</strong> English words!</p></div></FadeIn><FadeIn delay={500}><div style={{background:T.card,borderRadius:16,padding:24,maxWidth:360,width:"100%",boxShadow:T.shadow,marginBottom:32}}><p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.6,margin:0}}>{info.d}</p><div style={{height:1,background:T.border,margin:"16px 0"}}/><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}><strong style={{color:T.accent}}>Next:</strong> {info.n}</p></div></FadeIn><FadeIn delay={700} style={{width:"100%",maxWidth:360}}><Btn onClick={onContinue}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Start my first lesson<ArrowRight size={18}/></span></Btn></FadeIn></div>}

/* ═══════════════════════════════════════════════
   LESSON SCREEN
   ═══════════════════════════════════════════════ */
function LessonScreen({cards,onComplete,allStats,lpp}){
  const[lesson]=useState(()=>buildLesson(cards,allStats));
  const SIZE=lesson.length;const P=getLPP(lpp);
  const[step,setStep]=useState(0);const[phase,setPhase]=useState("learn");const[sel,setSel]=useState(null);const[isOk,setIsOk]=useState(null);const[fillIn,setFillIn]=useState("");const[showHint,setShowHint]=useState(false);const[quizOpts,setQuizOpts]=useState([]);const[microWin,setMicroWin]=useState("");const[mistakeMsg,setMistakeMsg]=useState("");const[showHelp,setShowHelp]=useState(false);const[frustMsg,setFrustMsg]=useState(null);const[downgraded,setDowngraded]=useState(false);const scoreRef=useRef(0);const streakRef=useRef(0);const wrongStreakRef=useRef(0);const resultsRef=useRef([]);const[,tick]=useState(0);const fillRef=useRef(null);
  const card=lesson[step];const isLast=step>=SIZE-1;
  const getPhaseForCard=(c,dg)=>{const st=allStats[c.id];const m=st?st.mastery:0;const base=exerciseForMastery(m);if(!dg)return base;const order=["learn","quiz","fill","rearrange","recall"];return order[Math.max(0,order.indexOf(base)-1)]};

  useEffect(()=>{const ic=lesson[0];const ip=getPhaseForCard(ic,false);setPhase(ip);if(ip==="learn"||ip==="quiz")setQuizOpts([...ic.wrongOptions.slice(0,3),ic.phrase].sort(()=>Math.random()-.5))},[]);
  useEffect(()=>{if(phase==="fill"&&fillRef.current)fillRef.current.focus()},[phase]);

  const good=()=>{scoreRef.current++;streakRef.current++;wrongStreakRef.current=0;setMicroWin(rnd(P.microWins));resultsRef.current.push({cardId:card.id,correct:true});tick(n=>n+1)};
  const bad=()=>{streakRef.current=0;wrongStreakRef.current++;setMistakeMsg(rnd(P.mistakeMsgs));resultsRef.current.push({cardId:card.id,correct:false});tick(n=>n+1);if(wrongStreakRef.current>=2)setFrustMsg(rnd(ENCOURAGE))};
  const next=()=>{if(isLast){onComplete(scoreRef.current,SIZE,lesson,resultsRef.current);return}const ns=step+1;const nc=lesson[ns];const np=getPhaseForCard(nc,false);setStep(ns);setPhase(np);setSel(null);setIsOk(null);setFillIn("");setShowHint(false);setMicroWin("");setMistakeMsg("");setFrustMsg(null);setDowngraded(false);if(np==="learn"||np==="quiz")setQuizOpts([...nc.wrongOptions.slice(0,3),nc.phrase].sort(()=>Math.random()-.5))};
  const skip=()=>{setShowHelp(false);resultsRef.current.push({cardId:card.id,correct:false});next()};
  const bored=()=>{const types=["quiz","fill","rearrange","recall"].filter(t=>t!==phase);const p=rnd(types);setPhase(p);setSel(null);setIsOk(null);setFillIn("");setShowHint(false);setMicroWin("");setMistakeMsg("");if(p==="quiz")setQuizOpts([...card.wrongOptions.slice(0,3),card.phrase].sort(()=>Math.random()-.5))};
  const downgrade=()=>{setFrustMsg(null);wrongStreakRef.current=0;const easier=getPhaseForCard(card,true);setPhase(easier);setSel(null);setIsOk(null);setFillIn("");setShowHint(false);setDowngraded(true);if(easier==="quiz")setQuizOpts([...card.wrongOptions.slice(0,3),card.phrase].sort(()=>Math.random()-.5))};
  const doQuiz=(opt,i)=>{if(sel!==null)return;setSel(i);const ok=opt===card.phrase;setIsOk(ok);if(ok)good();else bad()};
  const doFill=()=>{const a=fillIn.trim().toLowerCase().replace(/[.,!?]/g,""),parts=card.fillAnswer.toLowerCase().replace(/[.,!?]/g,"").split("|"),ok=parts.some(p=>a.includes(p.trim()));setIsOk(ok);if(ok)good();else bad();setPhase("fill-fb")};

  const st=allStats[card.id];const mastery=st?st.mastery:0;
  const phaseLabels={learn:"👀 New",quiz:"👀 Recognize",fill:"✏️ Fill In",rearrange:"🧩 Rearrange",recall:"🧠 Recall","fill-fb":"✏️ Fill In"};
  const masteryLabel=["New","Seen","Familiar","Practiced","Strong","Mastered"][Math.min(mastery,5)];
  const helpBtn=<button onClick={()=>setShowHelp(true)} style={{background:T.navySoft,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:Fb,fontSize:12,fontWeight:600,color:T.navy}}><HelpCircle size={14}/>Help</button>;
  const switchBtn=<button onClick={bored} style={{background:"none",border:`1.5px solid ${T.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:Fb,fontSize:12,fontWeight:500,color:T.muted}}><Shuffle size={13}/>Switch</button>;

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
    {showHelp&&<HelpOverlay card={card} onClose={()=>setShowHelp(false)} onSkip={skip}/>}
    <div style={{marginBottom:14}}><Bar current={step+1} total={SIZE}/><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>{phaseLabels[phase]||phase}</span><span style={{fontFamily:Fb,fontSize:11,color:T.purple,background:T.purpleSoft,padding:"2px 8px",borderRadius:6}}>{masteryLabel}</span></div>{streakRef.current>=3&&<span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.accent,display:"flex",alignItems:"center",gap:3}}><Zap size={14} fill={T.accent} color={T.accent}/>{streakRef.current}x</span>}</div></div>

    {frustMsg&&<div><FrustrationBanner message={frustMsg}/><div style={{display:"flex",gap:10,marginBottom:14}}><Btn v="secondary" onClick={downgrade} style={{flex:1}}>Make it easier</Btn><Btn v="ghost" onClick={()=>setFrustMsg(null)} style={{flex:0,width:"auto",padding:"14px 20px",color:T.muted}}>I'm okay</Btn></div></div>}

    {phase==="learn"&&!frustMsg&&<FadeIn key={`l-${step}`}><p style={{fontFamily:Fb,fontSize:13,color:P.color,fontWeight:500,margin:"0 0 12px"}}>{P.lessonIntro}</p><div style={{background:T.card,borderRadius:18,padding:24,boxShadow:T.shadow,marginBottom:18}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Badge color="#B8860B" bg={T.hiSoft}>NEW PHRASE</Badge>{helpBtn}</div><h3 style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.text,margin:"0 0 12px",fontStyle:"italic"}}>"{card.phrase}"</h3><p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.6,margin:"0 0 12px"}}><span style={{color:T.muted}}>Example: </span>{card.context}</p><div style={{background:T.bg,borderRadius:12,padding:14,marginBottom:10}}><p style={{fontFamily:Fb,fontSize:14,color:T.accent,fontWeight:600,margin:"0 0 3px"}}>🇮🇩 {card.meaning}</p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇬🇧 {card.meaningEn}</p></div><div style={{background:T.navySoft,borderRadius:12,padding:12}}><p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:0,lineHeight:1.5}}>💡 {card.usage}</p></div></div><Btn onClick={()=>{setPhase("quiz");setQuizOpts([...card.wrongOptions.slice(0,3),card.phrase].sort(()=>Math.random()-.5))}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Got it — test me<ArrowRight size={18}/></span></Btn></FadeIn>}

    {phase==="quiz"&&!frustMsg&&<FadeIn key={`q-${step}`}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:0}}>Which phrase means:</p><div style={{display:"flex",gap:6}}>{switchBtn}{helpBtn}</div></div><div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}><p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:0,lineHeight:1.5,fontStyle:"italic"}}>"{card.meaning}"</p></div><div style={{display:"flex",flexDirection:"column",gap:9}}>{quizOpts.map((o,i)=>{const isSel=sel===i,cor=o===card.phrase;let bg=T.card,bdr=T.border;if(sel!==null){if(cor){bg=T.okSoft;bdr=T.ok}else if(isSel){bg="#FFF5F0";bdr="#E07A5F"}}return <button key={i} onClick={()=>doQuiz(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"13px 16px",cursor:sel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,textAlign:"left",transition:"all .3s",display:"flex",alignItems:"center",gap:10}}>{sel!==null&&cor&&<Check size={16} color={T.ok} strokeWidth={3}/>}{o}</button>})}</div>{sel!==null&&<FadeIn delay={80}><div style={{marginTop:16,padding:14,borderRadius:12,background:isOk?T.okSoft:T.hiSoft}}>{isOk?<p style={{fontFamily:Fb,fontSize:14,color:T.ok,fontWeight:500,margin:0}}>✨ {microWin}</p>:<div><p style={{fontFamily:Fb,fontSize:14,color:"#B8860B",fontWeight:500,margin:"0 0 5px"}}>{mistakeMsg}</p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 3px"}}><strong>{card.phrase}</strong> → {card.meaningEn}</p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,fontStyle:"italic"}}>"{card.context}"</p></div>}</div><div style={{marginTop:12}}><Btn onClick={next}>{isLast?"See results →":"Continue →"}</Btn></div></FadeIn>}</FadeIn>}

    {phase==="fill"&&!frustMsg&&<FadeIn key={`f-${step}`}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><Badge color={T.teal} bg={T.tealSoft}>✏️ FILL IN THE BLANK</Badge><div style={{display:"flex",gap:6}}>{switchBtn}{helpBtn}</div></div><div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:10}}><p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:"0 0 8px",lineHeight:1.5}}>{card.fillBlank}</p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇮🇩 {card.meaning}</p></div>{showHint&&<FadeIn><div style={{background:T.hiSoft,borderRadius:10,padding:"8px 12px",marginBottom:8}}><p style={{fontFamily:Fb,fontSize:13,color:"#B8860B",margin:0}}>💡 Starts with: <strong>"{card.fillAnswer.split("|")[0].slice(0,Math.ceil(card.fillAnswer.split("|")[0].length/2))}..."</strong></p></div></FadeIn>}<input ref={fillRef} value={fillIn} onChange={e=>setFillIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&fillIn.trim())doFill()}} placeholder="Type your answer..." style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:16,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",marginBottom:12}} onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.border}/><div style={{display:"flex",gap:10}}>{!showHint&&<Btn v="secondary" onClick={()=>setShowHint(true)} style={{width:"auto",flex:"0 0 auto",padding:"14px 20px"}}>Hint</Btn>}<Btn onClick={doFill} disabled={!fillIn.trim()}>Check</Btn></div></FadeIn>}

    {phase==="fill-fb"&&!frustMsg&&<FadeIn key={`ff-${step}`}><div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:12}}><p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:0,lineHeight:1.5}}>{card.fillBlank}</p></div><div style={{padding:14,borderRadius:12,background:isOk?T.okSoft:T.hiSoft,marginBottom:12}}>{isOk?<p style={{fontFamily:Fb,fontSize:14,color:T.ok,fontWeight:500,margin:0}}>✨ {microWin}</p>:<div><p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:"#B8860B",margin:"0 0 5px"}}>{mistakeMsg}</p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 2px"}}>You: <span style={{opacity:.6,textDecoration:"line-through"}}>{fillIn}</span></p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 5px"}}>Answer: <strong style={{color:T.ok}}>{card.fillAnswer.split("|")[0]}</strong></p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,fontStyle:"italic"}}>"{card.context}"</p></div>}</div><Btn onClick={next}>{isLast?"See results →":"Continue →"}</Btn></FadeIn>}

    {phase==="rearrange"&&!frustMsg&&<RearrangeEx card={card} onResult={ok=>{if(ok)good();else bad();next()}} onHelp={()=>setShowHelp(true)}/>}
    {phase==="recall"&&!frustMsg&&<RecallEx card={card} onResult={ok=>{if(ok)good();else bad();next()}} onHelp={()=>setShowHelp(true)} autoHint={downgraded}/>}
  </div>
}

/* ═══════════════════════════════════════════════
   READING SCREEN
   ═══════════════════════════════════════════════ */
function ReadingScreen({session,cards,onComplete,allStats,lpp,listeningExercise,writingPrompt,subtextExercise,registerExercise,slangExercise,sarcasmExercise}){
  const passage=session.passage;
  const pData=passage.data||passage;
  const text=pData.text||"";
  const title=passage.title||pData.title||"Reading";
  const wordCount=pData.word_count||text.split(/\s+/).length;
  const readMin=Math.max(1,Math.ceil(wordCount/200));
  const comprehension=pData.comprehension||[];
  const targetPhrases=pData.target_phrases||[];

  // Build exercise list from target phrases matched to actual card data
  const[exCards]=useState(()=>{
    const cardList=cards||[];
    // Build lookup maps keyed by every possible identifier (string and number forms)
    const cardMap={};
    cardList.forEach(c=>{
      if(c.id!=null){cardMap[c.id]=c;cardMap[String(c.id)]=c}
      if(c.card_id!=null){cardMap[c.card_id]=c;cardMap[String(c.card_id)]=c}
      // Also key by phrase for fallback matching
      const phrase=(c.phrase||c.data?.phrase||"").toLowerCase();
      if(phrase)cardMap["phrase:"+phrase]=c;
    });
    // 2 exercises per phrase: easier then harder, based on mastery
    const pairs=m=>m<=1?["learn","quiz"]:m===2?["quiz","fill"]:m===3?["fill","rearrange"]:["rearrange","recall"];
    const result=[];
    const seenCardIds=new Set();
    targetPhrases.forEach(tp=>{
      const dedupKey=String(tp.card_id||tp.phrase||"");
      if(seenCardIds.has(dedupKey))return;
      seenCardIds.add(dedupKey);
      const cid=tp.card_id;
      let card=cardMap[cid]||cardMap[String(cid)];
      if(!card&&tp.phrase){card=cardMap["phrase:"+tp.phrase.toLowerCase()]}
      let resolved;
      if(card){resolved=card.phrase?card:{...card,...(card.data||{})}}
      else{
        resolved={id:cid,card_id:cid,phrase:tp.phrase||"",meaning:tp.meaning||"",meaningEn:tp.meaningEn||tp.meaning_en||"",context:tp.context||tp.sentence||("Use: \""+tp.phrase+"\""),usage:tp.usage||"",wrongOptions:tp.wrongOptions||tp.wrong_options||[],fillBlank:tp.fillBlank||tp.fill_blank||null,fillAnswer:tp.fillAnswer||tp.fill_answer||null,rearrange:tp.rearrange||null};
      }
      const cardId=resolved.id||resolved.card_id||cid;
      const st=allStats[cardId]||allStats[String(cardId)]||allStats[resolved.id]||allStats[resolved.card_id];
      const m=st?st.mastery:0;
      const[easy,hard]=pairs(m);
      result.push({card:resolved,exType:easy,card_id:cid});
      result.push({card:resolved,exType:hard,card_id:cid});
    });
    return result;
  });

  const[stage,setStage]=useState("read"); // read, comp, highlight, exercises, listening, writing, recall, retest
  const[compIdx,setCompIdx]=useState(0);
  const[compSel,setCompSel]=useState(null);
  const[compShow,setCompShow]=useState(false);
  const[compScore,setCompScore]=useState(0);
  const[exIdx,setExIdx]=useState(0);
  const scoreRef=useRef(0);
  const startTimeRef=useRef(null);
  const resultsRef=useRef([]);

  // Exercise state (mirrors LessonScreen patterns)
  const[exPhase,setExPhase]=useState("learn");
  const[sel,setSel]=useState(null);
  const[isOk,setIsOk]=useState(null);
  const[fillIn,setFillIn]=useState("");
  const[showHint,setShowHint]=useState(false);
  const[quizOpts,setQuizOpts]=useState([]);
  const fillRef=useRef(null);

  // Recall check state
  const[rcIdx,setRcIdx]=useState(0);
  const[rcSel,setRcSel]=useState(null);
  const[rcShow,setRcShow]=useState(false);
  const[rcScore,setRcScore]=useState(0);
  const[rcWrong,setRcWrong]=useState([]); // phrases user got wrong
  const[rcOpts,setRcOpts]=useState([]);
  const[rcMsg,setRcMsg]=useState(""); // message for celebration
  // Retest state (fill-in-the-blank for missed recall)
  const[rtIdx,setRtIdx]=useState(0);
  const[rtInput,setRtInput]=useState("");
  const[rtDone,setRtDone]=useState(false);
  const[rtOk,setRtOk]=useState(null);
  const rtRef=useRef(null);

  // Build unique phrase list for recall (one per target phrase, not per exercise)
  const[rcPhrases]=useState(()=>{
    const seen=new Set();
    return exCards.filter(ec=>{
      const k=ec.card.phrase;
      if(seen.has(k))return false;
      seen.add(k);return true;
    });
  });

  const P=getLPP(lpp);
  const curExCard=exCards[exIdx];

  const initExercise=(idx)=>{
    const ex=exCards[idx];if(!ex)return;
    let p=ex.exType;
    // Fallback: if card lacks data for chosen type, use quiz
    if(p==="fill"&&!(ex.card.fillBlank&&ex.card.fillAnswer))p="quiz";
    if(p==="rearrange"&&!(ex.card.rearrange&&ex.card.rearrange.words))p="quiz";
    setExPhase(p);setSel(null);setIsOk(null);setFillIn("");setShowHint(false);
    if(p==="learn"||p==="quiz")setQuizOpts([...(ex.card.wrongOptions||[]).slice(0,3),ex.card.phrase].sort(()=>Math.random()-.5));
    startTimeRef.current=Date.now();
  };

  const compQ=comprehension[compIdx];

  const pickComp=(opt,i)=>{
    if(compSel!==null)return;
    setCompSel(i);setCompShow(true);
    const correct=opt===compQ.correct||(typeof compQ.correct==="number"&&i===compQ.correct);
    if(correct)setCompScore(s=>s+1);
    apiLogEncounter({card_id:0,passage_id:passage.passage_id||passage.id,encounter_type:"comprehension",result:correct?"correct":"incorrect"});
    setTimeout(()=>{
      if(compIdx<comprehension.length-1){setCompIdx(compIdx+1);setCompSel(null);setCompShow(false)}
      else{setStage("highlight")}
    },1200);
  };

  const highlightText=()=>{
    if(!targetPhrases.length)return <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0,whiteSpace:"pre-wrap"}}>{text}</p>;
    const parts=[];
    let remaining=text;
    const phrases=targetPhrases.map(tp=>tp.phrase||tp).filter(Boolean);
    for(const phrase of phrases){
      const idx=remaining.toLowerCase().indexOf(phrase.toLowerCase());
      if(idx>=0){
        parts.push({text:remaining.slice(0,idx),highlight:false});
        parts.push({text:remaining.slice(idx,idx+phrase.length),highlight:true,phrase});
        remaining=remaining.slice(idx+phrase.length);
      }
    }
    parts.push({text:remaining,highlight:false});
    return <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>
      {parts.map((p,i)=>p.highlight?
        <span key={i} style={{background:T.accentSoft,color:T.accent,fontWeight:600,borderRadius:4,padding:"2px 4px"}}>{p.text}</span>:
        <span key={i}>{p.text}</span>
      )}
    </p>;
  };

  // Exercise result handlers
  const exGood=()=>{
    scoreRef.current++;
    const elapsed=startTimeRef.current?Date.now()-startTimeRef.current:0;
    const r={card_id:curExCard.card_id,exercise_id:curExCard.card.id+"_"+curExCard.exType,encounter_type:curExCard.exType,result:"correct",response_time_ms:elapsed};
    resultsRef.current.push(r);apiLogEncounter(r);
  };
  const exBad=()=>{
    const elapsed=startTimeRef.current?Date.now()-startTimeRef.current:0;
    const r={card_id:curExCard.card_id,exercise_id:curExCard.card.id+"_"+curExCard.exType,encounter_type:curExCard.exType,result:"incorrect",response_time_ms:elapsed};
    resultsRef.current.push(r);apiLogEncounter(r);
  };
  const buildRcOpts=(phraseIdx)=>{
    const cur=rcPhrases[phraseIdx];if(!cur)return[];
    const correct=cur.card.meaning||cur.card.meaningEn||"";
    // Get wrong meanings from other cards in the session, then from allCards
    const wrongs=[];
    rcPhrases.forEach((ec,i)=>{if(i!==phraseIdx){const m=ec.card.meaning||ec.card.meaningEn;if(m)wrongs.push(m)}});
    (cards||[]).forEach(c=>{const m=c.meaning||c.data?.meaning;if(m&&m!==correct&&!wrongs.includes(m))wrongs.push(m)});
    return[correct,...wrongs.slice(0,3)].sort(()=>Math.random()-.5);
  };
  const startRecall=()=>{setStage("recall");setRcIdx(0);setRcSel(null);setRcShow(false);setRcScore(0);setRcWrong([]);setRcOpts(buildRcOpts(0))};
  const goToSarcasmOrRecall=()=>{
    if(sarcasmExercise){setStage("sarcasm")}
    else{startRecall()}
  };
  const goToSlangOrRecall=()=>{
    if(slangExercise){setStage("slang")}
    else{goToSarcasmOrRecall()}
  };
  const goToRegisterOrRecall=()=>{
    if(registerExercise){setStage("register")}
    else{goToSlangOrRecall()}
  };
  const goToSubtextOrRecall=()=>{
    if(subtextExercise){setStage("subtext")}
    else{goToRegisterOrRecall()}
  };
  const goToWritingOrRecall=()=>{
    if(writingPrompt){setStage("writing")}
    else{goToSubtextOrRecall()}
  };
  const goToListeningOrNext=()=>{
    if(listeningExercise){setStage("listening")}
    else{goToWritingOrRecall()}
  };
  const exNext=()=>{
    if(exIdx<exCards.length-1){const ni=exIdx+1;setExIdx(ni);initExercise(ni)}
    else{goToListeningOrNext()}
  };
  const doQuiz=(opt,i)=>{if(sel!==null)return;setSel(i);const ok=opt===curExCard.card.phrase;setIsOk(ok);if(ok)exGood();else exBad()};
  const doFill=()=>{const a=fillIn.trim().toLowerCase().replace(/[.,!?]/g,""),parts=curExCard.card.fillAnswer.toLowerCase().replace(/[.,!?]/g,"").split("|"),ok=parts.some(p=>a.includes(p.trim()));setIsOk(ok);if(ok)exGood();else exBad();setExPhase("fill-fb")};

  useEffect(()=>{if(exPhase==="fill"&&fillRef.current)fillRef.current.focus()},[exPhase]);

  // ─── STAGE: READ ───
  if(stage==="read"){
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <Badge color={T.teal} bg={T.tealSoft}>📖 READING</Badge>
        <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"12px 0 6px"}}>{title}</h2>
        <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 20px"}}>~{readMin} min read · {wordCount} words</p>
      </FadeIn>
      <FadeIn delay={200}>
        <div style={{background:T.card,borderRadius:16,padding:24,boxShadow:T.shadow,marginBottom:24}}>
          <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0,whiteSpace:"pre-wrap"}}>{text}</p>
        </div>
      </FadeIn>
      <FadeIn delay={400}>
        <Btn onClick={()=>{apiLogEncounter({card_id:0,passage_id:passage.passage_id||passage.id,encounter_type:"reading",result:"seen"});setStage(comprehension.length>0?"comp":"highlight")}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Done reading<ArrowRight size={18}/></span></Btn>
      </FadeIn>
    </div>;
  }

  // ─── STAGE: COMPREHENSION ───
  if(stage==="comp"&&compQ){
    const opts=compQ.options||[];
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <Badge color={T.purple} bg={T.purpleSoft}>📝 COMPREHENSION</Badge>
        <Bar current={compIdx+1} total={comprehension.length}/>
      </FadeIn>
      <div style={{marginTop:20}}><FadeIn key={compIdx}>
        <p style={{fontFamily:Fb,fontSize:17,fontWeight:500,color:T.text,margin:"0 0 20px",lineHeight:1.5}}>{compQ.question}</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {opts.map((o,i)=>{
            const correctIdx=typeof compQ.correct==="number"?compQ.correct:opts.indexOf(compQ.correct);
            const isCorrect=i===correctIdx;
            const isSel=compSel===i;
            let bg=T.card,bdr=T.border;
            if(compShow){if(isCorrect){bg=T.okSoft;bdr=T.ok}else if(isSel){bg="#FFF5F0";bdr="#E07A5F"}}
            return <button key={i} onClick={()=>pickComp(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"13px 16px",cursor:compSel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,textAlign:"left",transition:"all .3s",display:"flex",alignItems:"center",gap:10}}>
              {compShow&&isCorrect&&<Check size={16} color={T.ok} strokeWidth={3}/>}{o}
            </button>
          })}
        </div>
      </FadeIn></div>
    </div>;
  }

  // ─── STAGE: HIGHLIGHT (same passage, phrases highlighted + meanings) ───
  if(stage==="highlight"){
    // Use exCards for meaning lookup since they already have resolved card data
    const exCardMap={};exCards.forEach(ec=>{if(ec.card_id!=null)exCardMap[ec.card_id]=ec.card;if(ec.card?.phrase)exCardMap["phrase:"+ec.card.phrase.toLowerCase()]=ec.card});
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <Badge color={T.accent} bg={T.accentSoft}>🎯 KEY PHRASES</Badge>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"12px 0 16px"}}>Notice these phrases from the passage:</p>
      </FadeIn>
      <FadeIn delay={150}>
        <div style={{background:T.card,borderRadius:16,padding:24,boxShadow:T.shadow,marginBottom:16}}>
          {highlightText()}
        </div>
      </FadeIn>
      {targetPhrases.length>0&&<FadeIn delay={300}>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          {targetPhrases.map((tp,i)=>{
            const phrase=tp.phrase||tp;
            const card=exCardMap[tp.card_id]||exCardMap["phrase:"+(phrase||"").toLowerCase()];
            const meaning=card?(card.meaning||card.data?.meaning):tp.meaning||"";
            const meaningEn=card?(card.meaningEn||card.data?.meaningEn):tp.meaningEn||"";
            return <div key={i} style={{background:T.accentSoft,borderRadius:12,padding:14,border:`1.5px solid ${T.accent}30`}}>
              <p style={{fontFamily:Fd,fontSize:16,fontWeight:600,color:T.accent,margin:"0 0 6px",fontStyle:"italic"}}>"{phrase}"</p>
              {meaning&&<p style={{fontFamily:Fb,fontSize:14,color:T.accent,fontWeight:600,margin:"0 0 3px"}}>🇮🇩 {meaning}</p>}
              {meaningEn&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇬🇧 {meaningEn}</p>}
              {!meaning&&!meaningEn&&tp.meaning&&<p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0}}>{tp.meaning}</p>}
            </div>
          })}
        </div>
      </FadeIn>}
      <FadeIn delay={450}>
        <Btn onClick={()=>{if(exCards.length>0){setStage("exercises");initExercise(0)}else if(listeningExercise){setStage("listening")}else if(writingPrompt){setStage("writing")}else{goToSubtextOrRecall()}}}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {exCards.length>0?"Continue to exercises":listeningExercise?"Continue to listening":writingPrompt?"Continue to writing":"Continue"}<ArrowRight size={18}/>
          </span>
        </Btn>
      </FadeIn>
    </div>;
  }

  // ─── STAGE: EXERCISES (using existing exercise types from LessonScreen) ───
  if(stage==="exercises"&&curExCard){
    const card=curExCard.card;
    const isLast=exIdx>=exCards.length-1;
    const phaseLabels={learn:"👀 New",quiz:"👀 Recognize",fill:"✏️ Fill In",rearrange:"🧩 Rearrange",recall:"🧠 Recall","fill-fb":"✏️ Fill In"};
    // Fallback: if card lacks data for the chosen exercise type, fall back to quiz
    const canFill=card.fillBlank&&card.fillAnswer;
    const canRearrange=card.rearrange&&card.rearrange.words;
    const effectivePhase=(exPhase==="fill"&&!canFill)?"quiz":(exPhase==="rearrange"&&!canRearrange)?"quiz":(exPhase==="fill-fb"&&!canFill)?"quiz":exPhase;

    return <div key={exIdx} style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <div style={{marginBottom:14}}>
        <Bar current={exIdx+1} total={exCards.length}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
          <span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>{phaseLabels[effectivePhase]||effectivePhase}</span>
          <span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>Exercise {exIdx+1} of {exCards.length}</span>
        </div>
      </div>

      {effectivePhase==="learn"&&<FadeIn key={`l-${exIdx}`}>
        <div style={{background:T.card,borderRadius:18,padding:24,boxShadow:T.shadow,marginBottom:18}}>
          <Badge color="#B8860B" bg={T.hiSoft}>NEW PHRASE</Badge>
          <h3 style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.text,margin:"12px 0 12px",fontStyle:"italic"}}>"{card.phrase}"</h3>
          <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.6,margin:"0 0 12px"}}><span style={{color:T.muted}}>Example: </span>{card.context}</p>
          <div style={{background:T.bg,borderRadius:12,padding:14,marginBottom:10}}>
            <p style={{fontFamily:Fb,fontSize:14,color:T.accent,fontWeight:600,margin:"0 0 3px"}}>🇮🇩 {card.meaning}</p>
            <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇬🇧 {card.meaningEn}</p>
          </div>
          {card.usage&&<div style={{background:T.navySoft,borderRadius:12,padding:12}}>
            <p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:0,lineHeight:1.5}}>💡 {card.usage}</p>
          </div>}
        </div>
        <Btn onClick={()=>{setExPhase("quiz");setQuizOpts([...(card.wrongOptions||[]).slice(0,3),card.phrase].sort(()=>Math.random()-.5))}}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Got it — test me<ArrowRight size={18}/></span></Btn>
      </FadeIn>}

      {effectivePhase==="quiz"&&<FadeIn key={`q-${exIdx}-${sel}`}>
        <p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:"0 0 10px"}}>Which phrase means:</p>
        <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
          <p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:0,lineHeight:1.5,fontStyle:"italic"}}>"{card.meaning}"</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {quizOpts.map((o,i)=>{const isSel=sel===i,cor=o===card.phrase;let bg=T.card,bdr=T.border;if(sel!==null){if(cor){bg=T.okSoft;bdr=T.ok}else if(isSel){bg="#FFF5F0";bdr="#E07A5F"}}return <button key={i} onClick={()=>doQuiz(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"13px 16px",cursor:sel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,textAlign:"left",transition:"all .3s",display:"flex",alignItems:"center",gap:10}}>{sel!==null&&cor&&<Check size={16} color={T.ok} strokeWidth={3}/>}{o}</button>})}
        </div>
        {sel!==null&&<FadeIn delay={80}><div style={{marginTop:16,padding:14,borderRadius:12,background:isOk?T.okSoft:T.hiSoft}}>
          {isOk?<p style={{fontFamily:Fb,fontSize:14,color:T.ok,fontWeight:500,margin:0}}>✨ Correct!</p>:<div><p style={{fontFamily:Fb,fontSize:14,color:"#B8860B",fontWeight:500,margin:"0 0 5px"}}>Not quite</p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 3px"}}><strong>{card.phrase}</strong> → {card.meaningEn}</p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,fontStyle:"italic"}}>"{card.context}"</p></div>}
        </div><div style={{marginTop:12}}><Btn onClick={exNext}>{isLast?"See results →":"Continue →"}</Btn></div></FadeIn>}
      </FadeIn>}

      {effectivePhase==="fill"&&<FadeIn key={`f-${exIdx}`}>
        <Badge color={T.teal} bg={T.tealSoft}>✏️ FILL IN THE BLANK</Badge>
        <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:10,marginTop:10}}>
          <p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:"0 0 8px",lineHeight:1.5}}>{card.fillBlank}</p>
          <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇮🇩 {card.meaning}</p>
        </div>
        {showHint&&<FadeIn><div style={{background:T.hiSoft,borderRadius:10,padding:"8px 12px",marginBottom:8}}><p style={{fontFamily:Fb,fontSize:13,color:"#B8860B",margin:0}}>💡 Starts with: <strong>"{card.fillAnswer.split("|")[0].slice(0,Math.ceil(card.fillAnswer.split("|")[0].length/2))}..."</strong></p></div></FadeIn>}
        <input ref={fillRef} value={fillIn} onChange={e=>setFillIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&fillIn.trim())doFill()}} placeholder="Type your answer..." style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:16,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",marginBottom:12}} onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.border}/>
        <div style={{display:"flex",gap:10}}>{!showHint&&<Btn v="secondary" onClick={()=>setShowHint(true)} style={{width:"auto",flex:"0 0 auto",padding:"14px 20px"}}>Hint</Btn>}<Btn onClick={doFill} disabled={!fillIn.trim()}>Check</Btn></div>
      </FadeIn>}

      {effectivePhase==="fill-fb"&&<FadeIn key={`ff-${exIdx}`}>
        <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:12}}>
          <p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:0,lineHeight:1.5}}>{card.fillBlank}</p>
        </div>
        <div style={{padding:14,borderRadius:12,background:isOk?T.okSoft:T.hiSoft,marginBottom:12}}>
          {isOk?<p style={{fontFamily:Fb,fontSize:14,color:T.ok,fontWeight:500,margin:0}}>✨ Correct!</p>:<div><p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:"#B8860B",margin:"0 0 5px"}}>Not quite</p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 2px"}}>You: <span style={{opacity:.6,textDecoration:"line-through"}}>{fillIn}</span></p><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 5px"}}>Answer: <strong style={{color:T.ok}}>{card.fillAnswer.split("|")[0]}</strong></p><p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,fontStyle:"italic"}}>"{card.context}"</p></div>}
        </div>
        <Btn onClick={exNext}>{isLast?"See results →":"Continue →"}</Btn>
      </FadeIn>}

      {effectivePhase==="rearrange"&&<RearrangeEx key={`rr-${exIdx}`} card={card} onResult={ok=>{if(ok)exGood();else exBad();exNext()}} onHelp={()=>{}}/>}
      {effectivePhase==="recall"&&<RecallEx key={`rc-${exIdx}`} card={card} onResult={ok=>{if(ok)exGood();else exBad();exNext()}} onHelp={()=>{}}/>}
    </div>;
  }

  // No exercises available — go to listening/writing or recall
  if(stage==="exercises"&&!curExCard){
    goToListeningOrNext();
    return null;
  }

  // ─── STAGE: LISTENING ───
  if(stage==="listening"&&listeningExercise){
    return <ListeningScreen exercise={listeningExercise} onComplete={(ok)=>{goToWritingOrRecall()}}/>;
  }

  // ─── STAGE: WRITING ───
  if(stage==="writing"&&writingPrompt){
    return <WritingScreen prompt={writingPrompt} onComplete={(ok)=>{goToSubtextOrRecall()}} inSession={true}/>;
  }

  // ─── STAGE: SUBTEXT ───
  if(stage==="subtext"&&subtextExercise){
    return <SubtextExercise exercise={subtextExercise} onComplete={(ok)=>{if(ok)scoreRef.current++;goToRegisterOrRecall()}}/>;
  }

  // ─── STAGE: REGISTER ───
  if(stage==="register"&&registerExercise){
    return <RegisterExercise exercise={registerExercise} onComplete={(ok)=>{if(ok)scoreRef.current++;goToSlangOrRecall()}}/>;
  }

  // ─── STAGE: SLANG ───
  if(stage==="slang"&&slangExercise){
    return <SlangExercise exercise={slangExercise} onComplete={(ok)=>{if(ok)scoreRef.current++;goToSarcasmOrRecall()}}/>;
  }

  // ─── STAGE: SARCASM / HUMOR ───
  if(stage==="sarcasm"&&sarcasmExercise){
    return <SarcasmExercise exercise={sarcasmExercise} onComplete={(ok)=>{if(ok)scoreRef.current++;startRecall()}}/>;
  }

  // ─── STAGE: RECALL CHECK ───
  if(stage==="recall"){
    const rcCur=rcPhrases[rcIdx];
    if(!rcCur){
      // All recall done — check score
      if(rcScore>=2){
        const msg=rcScore>=rcPhrases.length?"Perfect recall — these phrases are yours now.":"Solid — "+rcScore+" out of "+rcPhrases.length+" locked in.";
        onComplete(scoreRef.current+rcScore,exCards.length+rcPhrases.length,resultsRef.current,msg);
      }else{
        setStage("retest");setRtIdx(0);setRtInput("");setRtDone(false);setRtOk(null);
      }
      return null;
    }
    const card=rcCur.card;
    const correctMeaning=card.meaning||card.meaningEn||"";
    // Show context sentence with phrase highlighted
    const ctx=card.context||"";
    const phraseRe=new RegExp("("+card.phrase.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","i");
    const ctxParts=ctx.split(phraseRe);

    const pickRc=(opt,i)=>{
      if(rcSel!==null)return;
      setRcSel(i);setRcShow(true);
      const correct=opt===correctMeaning;
      if(correct)setRcScore(s=>s+1);
      else setRcWrong(w=>[...w,rcCur]);
      apiLogEncounter({card_id:rcCur.card_id,encounter_type:"recall_check",result:correct?"correct":"incorrect"});
      setTimeout(()=>{
        const ni=rcIdx+1;setRcIdx(ni);setRcSel(null);setRcShow(false);
        if(ni<rcPhrases.length)setRcOpts(buildRcOpts(ni));
      },1200);
    };

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.navySoft}}>
      <FadeIn>
        <Badge color={T.navy} bg={T.card}>🧠 RECALL CHECK</Badge>
        <p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:"8px 0 4px",fontWeight:500}}>No hints this time — let's see what stuck</p>
        <Bar current={rcIdx+1} total={rcPhrases.length}/>
        <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"6px 0 16px"}}>Recall {rcIdx+1}/{rcPhrases.length}</p>
      </FadeIn>
      <FadeIn key={`rc-${rcIdx}`}>
        <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:16}}>
          <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.7,margin:0}}>
            {ctxParts.map((part,i)=>phraseRe.test(part)?
              <strong key={i} style={{color:T.accent,background:T.accentSoft,borderRadius:4,padding:"2px 4px"}}>{part}</strong>:
              <span key={i}>{part}</span>
            )}
          </p>
        </div>
        <p style={{fontFamily:Fb,fontSize:15,fontWeight:500,color:T.navy,margin:"0 0 14px"}}>What does the highlighted phrase mean here?</p>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {rcOpts.map((o,i)=>{
            const isCorrect=o===correctMeaning;
            const isSel=rcSel===i;
            let bg=T.card,bdr=T.border;
            if(rcShow){if(isCorrect){bg=T.okSoft;bdr=T.ok}else if(isSel){bg="#FFF5F0";bdr="#E07A5F"}}
            return <button key={i} onClick={()=>pickRc(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"13px 16px",cursor:rcSel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,textAlign:"left",transition:"all .3s",display:"flex",alignItems:"center",gap:10}}>
              {rcShow&&isCorrect&&<Check size={16} color={T.ok} strokeWidth={3}/>}{o}
            </button>
          })}
        </div>
      </FadeIn>
    </div>;
  }

  // ─── STAGE: RETEST (fill-in-the-blank for missed recall phrases) ───
  if(stage==="retest"){
    const rtCur=rcWrong[rtIdx];
    if(!rtCur){
      onComplete(scoreRef.current+rcScore,exCards.length+rcPhrases.length,resultsRef.current,"You got there — that extra practice matters.");
      return null;
    }
    const card=rtCur.card;

    const doRt=()=>{
      const a=rtInput.trim().toLowerCase().replace(/[.,!?]/g,"");
      const answers=(card.fillAnswer||card.phrase).toLowerCase().replace(/[.,!?]/g,"").split("|");
      const ok=answers.some(p=>a.includes(p.trim()));
      setRtOk(ok);setRtDone(true);
      apiLogEncounter({card_id:rtCur.card_id,encounter_type:"recall_retest",result:ok?"correct":"incorrect"});
      if(ok)setRcScore(s=>s+1);
    };
    const rtNext=()=>{
      const ni=rtIdx+1;setRtIdx(ni);setRtInput("");setRtDone(false);setRtOk(null);
    };

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.navySoft}}>
      <FadeIn>
        <Badge color={T.navy} bg={T.card}>🧠 REVIEW</Badge>
        <p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:"8px 0 16px",fontWeight:500}}>Almost! Let's review the ones you missed.</p>
      </FadeIn>
      <FadeIn key={`rt-${rtIdx}`}>
        {!rtDone&&<>
          <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:12}}>
            <p style={{fontFamily:Fd,fontSize:18,fontWeight:600,color:T.accent,margin:"0 0 8px",fontStyle:"italic"}}>"{card.phrase}"</p>
            <p style={{fontFamily:Fb,fontSize:14,color:T.accent,fontWeight:600,margin:"0 0 3px"}}>🇮🇩 {card.meaning}</p>
            <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>🇬🇧 {card.meaningEn}</p>
          </div>
          <p style={{fontFamily:Fb,fontSize:14,color:T.navy,margin:"0 0 10px",fontWeight:500}}>Now fill in the blank:</p>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:12}}>
            <p style={{fontFamily:Fd,fontSize:16,fontWeight:500,color:T.text,margin:0,lineHeight:1.5}}>{card.fillBlank||card.context}</p>
          </div>
          <input ref={rtRef} value={rtInput} onChange={e=>setRtInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&rtInput.trim())doRt()}} placeholder="Type your answer..." style={{width:"100%",padding:"14px 16px",borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:16,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",marginBottom:12}} onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.border}/>
          <Btn onClick={doRt} disabled={!rtInput.trim()}>Check</Btn>
        </>}
        {rtDone&&<FadeIn>
          <div style={{padding:14,borderRadius:12,background:rtOk?T.okSoft:T.hiSoft,marginBottom:12}}>
            {rtOk?<p style={{fontFamily:Fb,fontSize:14,color:T.ok,fontWeight:500,margin:0}}>✨ Got it!</p>:<div>
              <p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:"#B8860B",margin:"0 0 5px"}}>The answer was:</p>
              <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0}}><strong style={{color:T.ok}}>{(card.fillAnswer||card.phrase).split("|")[0]}</strong></p>
            </div>}
          </div>
          <Btn onClick={()=>{if(rtOk){rtNext()}else{setRtDone(false);setRtInput("")}}}>{rtOk?"Continue →":"Try again"}</Btn>
        </FadeIn>}
      </FadeIn>
    </div>;
  }

  return null;
}

// Generic quiz for pool exercises
function GenericQuiz({options,correct,onResult}){
  const[sel,setSel]=useState(null);
  const[show,setShow]=useState(false);
  const pick=(o,i)=>{
    if(sel!==null)return;
    setSel(i);setShow(true);
    const isCorrect=typeof correct==="number"?i===correct:o===correct;
    setTimeout(()=>onResult(isCorrect),1200);
  };
  return <div style={{display:"flex",flexDirection:"column",gap:9}}>
    {options.map((o,i)=>{
      const correctIdx=typeof correct==="number"?correct:options.indexOf(correct);
      const isCorrect=i===correctIdx;
      const isSel=sel===i;
      let bg=T.card,bdr=T.border;
      if(show){if(isCorrect){bg=T.okSoft;bdr=T.ok}else if(isSel){bg="#FFF5F0";bdr="#E07A5F"}}
      return <button key={i} onClick={()=>pick(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"13px 16px",cursor:sel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,textAlign:"left",transition:"all .3s",display:"flex",alignItems:"center",gap:10}}>
        {show&&isCorrect&&<Check size={16} color={T.ok} strokeWidth={3}/>}{typeof o==="string"?o:o.text||JSON.stringify(o)}
      </button>
    })}
  </div>
}

/* ─── Background Noise Engine (Web Audio API) ─── */
const NOISE_PROFILES={
  cafe:{bandHz:800,Q:0.5,modHz:0.3,label:"Cafe"},
  office:{bandHz:1200,Q:0.8,modHz:0.15,label:"Office"},
  street:{bandHz:400,Q:0.3,modHz:0.6,label:"Street"}
};

function useBackgroundNoise(){
  const ctxRef=useRef(null);
  const nodesRef=useRef(null);

  const start=useCallback((profile="cafe",volume=0.17)=>{
    try{
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC)return;
      const ctx=new AC();ctxRef.current=ctx;
      const p=NOISE_PROFILES[profile]||NOISE_PROFILES.cafe;

      // White noise buffer
      const bufSize=ctx.sampleRate*2;
      const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1;
      const src=ctx.createBufferSource();
      src.buffer=buf;src.loop=true;

      // Bandpass filter for noise character
      const band=ctx.createBiquadFilter();
      band.type="bandpass";band.frequency.value=p.bandHz;band.Q.value=p.Q;

      // LFO modulation for natural variation
      const lfo=ctx.createOscillator();
      const lfoGain=ctx.createGain();
      lfo.frequency.value=p.modHz;lfo.type="sine";
      lfoGain.gain.value=volume*0.3;

      // Master gain
      const gain=ctx.createGain();
      gain.gain.value=volume;

      // Connect: noise → bandpass → gain → output
      src.connect(band);band.connect(gain);
      lfo.connect(lfoGain);lfoGain.connect(gain.gain);
      gain.connect(ctx.destination);

      src.start();lfo.start();
      nodesRef.current={src,lfo,gain,ctx};
    }catch(e){}
  },[]);

  const stop=useCallback(()=>{
    if(nodesRef.current){
      try{
        nodesRef.current.src.stop();
        nodesRef.current.lfo.stop();
        nodesRef.current.ctx.close();
      }catch(e){}
      nodesRef.current=null;
    }
    ctxRef.current=null;
  },[]);

  // Cleanup on unmount
  useEffect(()=>()=>stop(),[stop]);

  return{start,stop};
}

function RealWorldToggle({enabled,onToggle,noiseType,onNoiseType}){
  return <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
    <button onClick={onToggle} style={{
      background:enabled?"#3D405B":T.card,color:enabled?"#fff":T.muted,
      border:`1.5px solid ${enabled?T.navy:T.border}`,borderRadius:20,
      padding:"6px 14px",cursor:"pointer",fontFamily:Fb,fontSize:12,fontWeight:600,
      transition:"all .2s",display:"flex",alignItems:"center",gap:5
    }}>{enabled?"🔊 Real World":"🔇 Clean"}</button>
    {enabled&&<div style={{display:"flex",gap:4}}>
      {Object.entries(NOISE_PROFILES).map(([k,v])=><button key={k} onClick={()=>onNoiseType(k)} style={{
        background:noiseType===k?T.tealSoft:T.card,color:noiseType===k?T.teal:T.muted,
        border:`1px solid ${noiseType===k?T.teal:T.border}`,borderRadius:14,
        padding:"3px 10px",cursor:"pointer",fontFamily:Fb,fontSize:11,fontWeight:600,
        transition:"all .2s"
      }}>{v.label}</button>)}
    </div>}
  </div>;
}

function ListeningScreen({exercise,onComplete}){
  const exData=exercise.data||exercise;
  const exType=exercise.exercise_type||exercise.type||"dictation";
  const exId=exercise.exercise_id||exercise.id||"";

  // Real World Mode state
  const[realWorld,setRealWorld]=useState(false);
  const[noiseType,setNoiseType]=useState("cafe");
  const noise=useBackgroundNoise();

  // TTS helpers — starts/stops noise around speech
  const speak=(text,rate=1.0)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    noise.stop();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=rate;u.lang="en-US";
    const voices=window.speechSynthesis.getVoices();
    const enVoice=voices.find(v=>v.lang.startsWith("en"));
    if(enVoice)u.voice=enVoice;
    if(realWorld)noise.start(noiseType,0.17);
    u.onend=()=>noise.stop();
    u.onerror=()=>noise.stop();
    window.speechSynthesis.speak(u);
  };

  // Ensure voices are loaded; cleanup on unmount
  useEffect(()=>{
    if(window.speechSynthesis){window.speechSynthesis.getVoices()}
    return ()=>{if(window.speechSynthesis)window.speechSynthesis.cancel();noise.stop()};
  },[]);

  const rwToggle=<RealWorldToggle enabled={realWorld} onToggle={()=>setRealWorld(r=>!r)} noiseType={noiseType} onNoiseType={setNoiseType}/>;

  if(exType==="dictation")return <DictationEx data={exData} exId={exId} speak={speak} onComplete={onComplete} rwToggle={rwToggle}/>;
  if(exType==="listen_comprehension")return <ListenCompEx data={exData} exId={exId} speak={speak} onComplete={onComplete} rwToggle={rwToggle}/>;
  if(exType==="connected_speech")return <ConnectedSpeechEx data={exData} exId={exId} speak={speak} onComplete={onComplete} rwToggle={rwToggle}/>;
  if(exType==="speed_drill")return <SpeedDrillEx data={exData} exId={exId} speak={speak} onComplete={onComplete} rwToggle={rwToggle}/>;
  return <div style={{padding:24}}><p>Unknown listening exercise type: {exType}</p><Btn onClick={()=>onComplete(false)}>Skip</Btn></div>;
}

function SpeedPills({speeds,current,onSelect}){

      border:`1.5px solid ${current===s?T.teal:T.border}`,borderRadius:20,
      padding:"6px 14px",cursor:"pointer",fontFamily:Fb,fontSize:13,fontWeight:600,
      transition:"all .2s"
    }}>{s}x</button>)}
  </div>;
}

function PlayBtn({onClick,label="Play",size="normal"}){
  const sz=size==="large"?56:42;

function DictationEx({data,exId,speak,onComplete,rwToggle}){
  const text=data.text||"";
  const[input,setInput]=useState("");
  const[submitted,setSubmitted]=useState(false);
  const[speed,setSpeed]=useState(1.0);
  const[wordResults,setWordResults]=useState([]);
  const ref=useRef(null);

  const play=()=>speak(text,speed);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),200)},[]);

  const levenshtein=(a,b)=>{
    const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
    for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
  };

  const submit=()=>{
    const correctWords=text.toLowerCase().replace(/[.,!?;:'"]/g,"").split(/\s+/).filter(Boolean);
    const userWords=input.trim().toLowerCase().replace(/[.,!?;:'"]/g,"").split(/\s+/).filter(Boolean);
    const results=correctWords.map((cw,i)=>{
      const uw=userWords[i]||"";
      if(uw===cw)return{correct:cw,user:uw,status:"exact"};
      if(levenshtein(uw,cw)<=1)return{correct:cw,user:uw,status:"close"};
      return{correct:cw,user:uw,status:"wrong"};
    });
    // Extra words user typed
    for(let i=correctWords.length;i<userWords.length;i++){
      results.push({correct:"",user:userWords[i],status:"extra"});
    }
    setWordResults(results);setSubmitted(true);
    const correctCount=results.filter(r=>r.status==="exact"||r.status==="close").length;
    const ok=correctCount>=correctWords.length*0.7;
    apiLogEncounter({exercise_id:exId,encounter_type:"dictation",result:ok?"correct":"incorrect"});
  };

  const statusColor={exact:T.ok,close:"#B8860B",wrong:"#C0392B",extra:"#C0392B"};
  const statusBg={exact:T.okSoft,close:T.hiSoft,wrong:"#FFF0F0",extra:"#FFF0F0"};

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
    <FadeIn>
      <Badge color={T.teal} bg={T.tealSoft}>🎧 LISTENING</Badge>
      <h2 style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.text,margin:"12px 0 6px"}}>Dictation</h2>
      <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px"}}>Listen carefully and type what you hear.</p>
    </FadeIn>
    <FadeIn delay={150}>
      <div style={{background:T.card,borderRadius:16,padding:24,boxShadow:T.shadow,marginBottom:20,display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
        <PlayBtn onClick={play} size="large"/>
        <SpeedPills speeds={[0.75,1.0,1.25]} current={speed} onSelect={s=>{setSpeed(s);speak(text,s)}}/>
        <button onClick={play} style={{background:"none",border:"none",fontFamily:Fb,fontSize:13,color:T.teal,cursor:"pointer",fontWeight:500,display:"flex",alignItems:"center",gap:5}}>
          <RotateCcw size={14}/>Listen again
        </button>
        {rwToggle}
      </div>
    </FadeIn>
    {!submitted&&<FadeIn delay={300}>
      <textarea ref={ref} value={input} onChange={e=>setInput(e.target.value)} placeholder="Type what you heard..."
        style={{width:"100%",minHeight:100,padding:16,borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:"'Courier New',monospace",fontSize:16,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",marginBottom:16,resize:"vertical",lineHeight:1.6}}
        onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/>
      <Btn onClick={submit} disabled={!input.trim()} style={{background:T.teal}}>Check</Btn>
    </FadeIn>}
    {submitted&&<FadeIn>
      <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.muted,margin:"0 0 10px"}}>Word comparison:</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {wordResults.map((w,i)=><span key={i} style={{
            fontFamily:"'Courier New',monospace",fontSize:15,fontWeight:600,
            background:statusBg[w.status],color:statusColor[w.status],
            padding:"4px 8px",borderRadius:6,border:`1px solid ${statusColor[w.status]}25`
          }}>{w.user||"___"}</span>)}
        </div>
      </div>
      <div style={{background:T.okSoft,borderRadius:14,padding:16,marginBottom:16}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.ok,margin:"0 0 6px"}}>Correct sentence:</p>
        <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:0,lineHeight:1.6}}>{text}</p>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:4,fontFamily:Fb,fontSize:11,color:T.ok}}><span style={{width:10,height:10,borderRadius:3,background:T.okSoft,border:`1px solid ${T.ok}`}}/> Exact</span>
        <span style={{display:"inline-flex",alignItems:"center",gap:4,fontFamily:Fb,fontSize:11,color:"#B8860B"}}><span style={{width:10,height:10,borderRadius:3,background:T.hiSoft,border:"1px solid #B8860B"}}/> Close</span>
        <span style={{display:"inline-flex",alignItems:"center",gap:4,fontFamily:Fb,fontSize:11,color:"#C0392B"}}><span style={{width:10,height:10,borderRadius:3,background:"#FFF0F0",border:"1px solid #C0392B"}}/> Wrong</span>
      </div>
      <Btn onClick={()=>{const correctCount=wordResults.filter(r=>r.status==="exact"||r.status==="close").length;onComplete(correctCount>=wordResults.filter(r=>r.status!=="extra").length*0.7)}}>Continue →</Btn>
    </FadeIn>}
  </div>;
}

      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {(q.options||[]).map((o,i)=>{
          const correctIdx=typeof q.correct==="number"?q.correct:(q.options||[]).indexOf(q.correct);
          const isCorrect=i===correctIdx;
          const isSel=sel===i;
          let bg=T.card,bdr=T.border;
          if(show){if(isCorrect){bg=T.okSoft;bdr=T.ok}else if(isSel){bg="#FFF5F0";bdr="#E07A5F"}}
          return <button key={i} onClick={()=>pickAnswer(o,i)} style={{width:"100%",background:bg,border:`1.5px solid ${bdr}`,borderRadius:12,padding:"13px 16px",cursor:sel!==null?"default":"pointer",fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,textAlign:"left",transition:"all .3s",display:"flex",alignItems:"center",gap:10}}>
            {show&&isCorrect&&<Check size={16} color={T.ok} strokeWidth={3}/>}{o}
          </button>;
        })}
      </div>
    </FadeIn>}
    {played&&!hasQ&&<FadeIn>

        if(speedIdx<speeds.length-1){setSpeedIdx(speedIdx+1);setPlayed(false)}

      }} style={{marginTop:16,background:T.teal}}>
        {speedIdx<speeds.length-1?"Next speed →":"Complete →"}

    </FadeIn>}

      <div style={{marginTop:16}}><Btn onClick={()=>onComplete(score>=Math.ceil(speeds.length*0.5))}>Continue →</Btn></div>
    </FadeIn>}
  </div>;

function ScoreCircle({score,max=10,size=72}){
  const r=size/2-4;const c=2*Math.PI*r;const pct=score/max;const offset=c*(1-pct);
  const color=pct>=0.7?T.ok:pct>=0.4?T.hi:T.accent;
  return <svg width={size} height={size} style={{display:"block"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={4}/>

      strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
      style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset .8s ease"}}/>
    <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
      style={{fontFamily:Fd,fontSize:size*.32,fontWeight:700,fill:color}}>{score}</text>

}

function AnnotatedText({text,errors}){
  if(!errors||!errors.length)return <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>{text}</p>;
  // Build segments from error positions
  const sorted=[...errors].sort((a,b)=>(a.start||0)-(b.start||0));
  const parts=[];let pos=0;
  for(const err of sorted){
    const start=err.start!=null?err.start:text.toLowerCase().indexOf(err.original?.toLowerCase()||"~~~",pos);
    const len=err.original?err.original.length:(err.end?err.end-start:0);
    if(start<0||len<=0)continue;
    if(start>pos)parts.push({text:text.slice(pos,start),type:"normal"});
    parts.push({text:text.slice(start,start+len),type:err.type||"grammar",correction:err.correction,explanation:err.explanation});
    pos=start+len;
  }
  if(pos<text.length)parts.push({text:text.slice(pos),type:"normal"});
  if(!parts.length)return <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>{text}</p>;

  const[active,setActive]=useState(null);
  const colors={grammar:{underline:"#C0392B",bg:"#FFF0F0"},unnatural:{underline:"#B8860B",bg:T.hiSoft}};

  return <div style={{position:"relative"}}>
    <p style={{fontFamily:Fb,fontSize:15,color:T.text,lineHeight:1.8,margin:0}}>
      {parts.map((p,i)=>{
        if(p.type==="normal")return <span key={i}>{p.text}</span>;
        const c=colors[p.type]||colors.grammar;
        return <span key={i} onClick={()=>setActive(active===i?null:i)} style={{
          textDecoration:"underline wavy",textDecorationColor:c.underline,
          background:active===i?c.bg:"transparent",cursor:"pointer",
          borderRadius:3,padding:active===i?"1px 3px":0,transition:"all .2s"
        }}>{p.text}</span>;
      })}
    </p>
    {active!=null&&parts[active]&&parts[active].correction&&<FadeIn>
      <div style={{background:T.card,borderRadius:12,padding:14,boxShadow:T.shadow,marginTop:10,border:`1.5px solid ${(colors[parts[active].type]||colors.grammar).underline}25`}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:(colors[parts[active].type]||colors.grammar).underline,margin:"0 0 4px"}}>
          {parts[active].type==="grammar"?"Grammar":"Phrasing"}
        </p>
        <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 4px"}}>
          <span style={{textDecoration:"line-through",opacity:0.5}}>{parts[active].text}</span>{" → "}
          <strong style={{color:T.ok}}>{parts[active].correction}</strong>
        </p>
        {parts[active].explanation&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>{parts[active].explanation}</p>}
      </div>
    </FadeIn>}
  </div>;
}

function WritingScreen({prompt,onComplete,inSession}){
  const pData=prompt.data||prompt;
  const pType=prompt.prompt_type||prompt.type||"free_write";
  const pId=prompt.prompt_id||prompt.id||"";

  const[input,setInput]=useState("");
  const[submitting,setSubmitting]=useState(false);
  const[feedback,setFeedback]=useState(null);
  const[error,setError]=useState("");
  const ref=useRef(null);

  useEffect(()=>{setTimeout(()=>ref.current?.focus(),300)},[]);

  const wordCount=input.trim()?input.trim().split(/\s+/).length:0;
  const targets={email_completion:{min:30,max:80},rewrite:{min:5,max:50},free_write:{min:50,max:200}};
  const target=targets[pType]||targets.free_write;
  const wcColor=wordCount<target.min?T.muted:wordCount>target.max?"#B8860B":T.ok;

  const submit=async()=>{
    if(!input.trim())return;
    setSubmitting(true);setError("");
    try{
      const result=await apiSubmitWriting(pId,input.trim());
      setFeedback(result.feedback||result);
    }catch(e){setError(e.message)}
    setSubmitting(false);
  };

  if(submitting)return <WritingLoading/>;

  if(feedback)return <WritingFeedback
    userText={input}
    feedback={feedback}
    onContinue={()=>onComplete(true)}
    onTryAnother={inSession?null:()=>{setInput("");setFeedback(null);setError("")}}
  />;

  // ─── EMAIL COMPLETION ───
  if(pType==="email_completion"){
    const situation=pData.situation||"";
    const starter=pData.starter||pData.partial||"";
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <Badge color={T.navy} bg={T.navySoft}>✍️ WRITING</Badge>

          <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.purple,margin:"0 0 4px"}}>Situation</p>
          <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,lineHeight:1.6}}>{situation}</p>
        </div>
      </FadeIn>}
      <FadeIn delay={200}>
        <div style={{background:T.navySoft,borderRadius:16,padding:20,marginBottom:16}}>
          {starter&&<div style={{background:T.card,borderRadius:12,padding:16,marginBottom:14,border:`1px solid ${T.border}`}}>
            <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{starter}</p>
          </div>}

            onFocus={e=>e.target.style.borderColor=T.navy} onBlur={e=>e.target.style.borderColor=T.border}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
            <span style={{fontFamily:Fb,fontSize:12,color:wcColor,fontWeight:500}}>{wordCount} words <span style={{color:T.muted}}>(target: {target.min}-{target.max})</span></span>
          </div>
        </div>
      </FadeIn>
      {error&&<div style={{background:"#FFF0F0",borderRadius:10,padding:"10px 14px",marginBottom:12}}><p style={{fontFamily:Fb,fontSize:13,color:"#C0392B",margin:0}}>{error}</p></div>}
      <FadeIn delay={350}>
        <Btn onClick={submit} disabled={wordCount<Math.max(1,target.min-10)} style={{background:T.navy}}>Submit for review</Btn>
      </FadeIn>
    </div>;
  }

  // ─── REWRITE ───
  if(pType==="rewrite"){
    const sentence=pData.sentence||pData.original||"";
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <Badge color={T.navy} bg={T.navySoft}>✍️ WRITING</Badge>
        <h2 style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.text,margin:"12px 0 6px"}}>Rewrite</h2>
