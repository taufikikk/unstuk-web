      const d=new Date(last.getTime()-i*864e5);
      activeDays.push(d.toISOString().split("T")[0]);
    }
  }

  // Find best skill
  const bestSkill=skills.reduce((a,s)=>s.value>a.value?s:a,skills[0]);

  // ── Mastery V2: 7 levels ──
  const M2_LABELS=["Seen","Recognized","Discriminated","Produced","Comprehended","Retained","Mastered"];
  const M2_COLORS=[T.muted,T.hi,"#B8860B",T.accent,T.purple,T.teal,T.ok];

  // Map old mastery (0-5) to V2 level (0-6). Old 0=unseen (skip), 1=Seen, 2=Recognized, 3=Discriminated, 4=Produced/Comprehended, 5=Retained/Mastered
  const toV2=(s)=>{
    if(!s||s.seen===0)return -1; // unseen
    const m=s.mastery||0;
    const produced=s.correct>=3;
    const retained=(s.lastSeen&&(Date.now()-new Date(s.lastSeen).getTime())>864e5*7&&m>=4);
    if(m>=5&&retained)return 6; // Mastered
    if(m>=5)return 5; // Retained
    if(m>=4&&produced)return 4; // Comprehended
    if(m>=4)return 3; // Produced
    if(m>=3)return 2; // Discriminated
    if(m>=2)return 1; // Recognized
    return 0; // Seen
  };

  // Build phrase list with V2 levels
  const cardMap={};
  (allCards||[]).forEach(c=>{cardMap[c.id||c.card_id]=c});
  const phraseEntries=Object.entries(stats).filter(([id,s])=>s.seen>0).map(([id,s])=>{
    const card=cardMap[id];
    return{id,phrase:card?.phrase||id,meaning:card?.meaningEn||card?.meaning||"",stats:s,v2:toV2(s)};
  }).sort((a,b)=>b.stats.seen-a.stats.seen);
  const topPhrases=phraseEntries.slice(0,20);

  // Count per V2 level
  const v2Counts=[0,0,0,0,0,0,0];
  phraseEntries.forEach(p=>{if(p.v2>=0)v2Counts[p.v2]++});
  const totalTracked=phraseEntries.length;
  const trulyMastered=v2Counts[6];

  // Retention check: phrases at level 5 (Retained) that might need re-check
  const retentionDue=phraseEntries.filter(p=>p.v2>=4&&p.v2<6&&p.stats.lastSeen).length;

  const cardStyle={background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:16};

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg}}><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Loading...</p></div>;

  return <div style={{minHeight:"100vh",background:T.bg,padding:"24px 20px",paddingBottom:40}}>
    {/* Header */}
    <FadeIn>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <Badge color={T.accent} bg={T.accentSoft}>📊 PROGRESS</Badge>
          <h1 style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:T.text,margin:"10px 0 0"}}>Your Dashboard</h1>
        </div>
        <button onClick={onBack} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 14px",fontFamily:Fb,fontSize:13,color:T.muted,cursor:"pointer",fontWeight:500}}>Back</button>
      </div>
    </FadeIn>

    {/* Overall Level */}
    <FadeIn delay={100}>
      <div style={{...cardStyle,textAlign:"center",background:`linear-gradient(135deg,${T.accent}08,${T.hi}12)`}}>
        <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Estimated overall level</p>
        <div style={{fontFamily:Fd,fontSize:48,fontWeight:700,color:T.accent,lineHeight:1}}>{overallCEFR}</div>
        <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"6px 0 0"}}>Based on {lessons} sessions · {totalSeen} phrases seen</p>
      </div>
    </FadeIn>

    {/* Radar Chart */}
    <FadeIn delay={200}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 12px"}}>Skill Radar</p>
        <RadarChart skills={skills} size={260}/>
      </div>
    </FadeIn>

    {/* Mastery V2: Per-phrase journey */}
    {topPhrases.length>0&&<FadeIn delay={280}>
      <div style={cardStyle}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:0}}>Phrase Mastery Journey</p>
          <span style={{fontFamily:Fb,fontSize:11,color:T.muted}}>{totalTracked} phrases tracked</span>
        </div>
        <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"0 0 14px"}}>Tap a phrase to see details</p>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {topPhrases.map((p,i)=>{
            const isExpanded=expandedPhrase===p.id;
            return <div key={p.id}>
              <button onClick={()=>setExpandedPhrase(isExpanded?null:p.id)} style={{
                width:"100%",background:isExpanded?`${T.accent}06`:T.bg,border:isExpanded?`1px solid ${T.accent}20`:"1px solid transparent",
                borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"left",transition:"all .15s"
              }}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"55%"}}>{p.phrase}</span>
                  {p.v2>=6?<span onClick={(e)=>{e.stopPropagation();setMasteryToast(p)}} style={{fontFamily:Fb,fontSize:10,color:T.ok,fontWeight:700,cursor:"pointer"}}>&#x1F3C6; Mastered</span>:<span style={{fontFamily:Fb,fontSize:10,color:M2_COLORS[Math.max(p.v2,0)],fontWeight:600}}>{M2_LABELS[Math.max(p.v2,0)]}</span>}
                </div>
                <div style={{display:"flex",gap:3}}>
                  {M2_LABELS.map((_,li)=>{
                    const filled=li<=p.v2;
                    return <div key={li} style={{
                      flex:1,height:6,borderRadius:3,
                      background:filled?M2_COLORS[li]:`${T.muted}20`,
                      transition:"background .3s"
                    }}/>;
                  })}
                </div>
              </button>
              {isExpanded&&<FadeIn>
                <div style={{background:T.card,borderRadius:10,padding:12,margin:"4px 0 2px",border:`1px solid ${T.border}`}}>
                  <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"0 0 6px"}}>{p.meaning}</p>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                    <div style={{background:T.bg,borderRadius:6,padding:6,textAlign:"center"}}>
                      <div style={{fontFamily:Fd,fontSize:16,fontWeight:700,color:T.accent}}>{p.stats.seen||0}</div>
                      <div style={{fontFamily:Fb,fontSize:9,color:T.muted}}>encounters</div>
                    </div>
                    <div style={{background:T.bg,borderRadius:6,padding:6,textAlign:"center"}}>
                      <div style={{fontFamily:Fd,fontSize:16,fontWeight:700,color:T.ok}}>{p.stats.correct||0}</div>
                      <div style={{fontFamily:Fb,fontSize:9,color:T.muted}}>correct</div>
                    </div>
                    <div style={{background:T.bg,borderRadius:6,padding:6,textAlign:"center"}}>
                      <div style={{fontFamily:Fd,fontSize:16,fontWeight:700,color:T.purple}}>L{Math.max(p.v2,0)+1}</div>
                      <div style={{fontFamily:Fb,fontSize:9,color:T.muted}}>level</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                    {M2_LABELS.map((label,li)=>{
                      const active=li<=p.v2;
                      return <span key={li} style={{fontFamily:Fb,fontSize:9,padding:"2px 6px",borderRadius:4,background:active?`${M2_COLORS[li]}18`:T.bg,color:active?M2_COLORS[li]:T.muted,fontWeight:active?600:400,border:`1px solid ${active?M2_COLORS[li]+"30":"transparent"}`}}>{label}</span>;
                    })}
                  </div>
                </div>
              </FadeIn>}
            </div>;
          })}
        </div>
      </div>
    </FadeIn>}

    {/* Mastery V2: Statistics bar chart */}
    {totalTracked>0&&<FadeIn delay={300}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 14px"}}>Phrases at Each Level</p>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {M2_LABELS.map((label,li)=>{
            const count=v2Counts[li];
            const pct=totalTracked>0?Math.round((count/totalTracked)*100):0;
            return <div key={li} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:90,fontFamily:Fb,fontSize:11,color:M2_COLORS[li],fontWeight:600,textAlign:"right"}}>{label}</div>
              <div style={{flex:1,height:14,borderRadius:7,background:`${M2_COLORS[li]}12`,overflow:"hidden"}}>
                <div style={{height:14,borderRadius:7,background:M2_COLORS[li],width:`${Math.max(pct,count>0?4:0)}%`,transition:"width .5s",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:count>0?4:0}}>
                  {count>0&&<span style={{fontFamily:Fb,fontSize:9,fontWeight:700,color:"#fff"}}>{count}</span>}
                </div>
              </div>
              <div style={{width:28,fontFamily:Fb,fontSize:11,color:T.muted,textAlign:"right"}}>{count}</div>
            </div>;
          })}
        </div>
        {trulyMastered>0&&<div style={{background:T.okSoft,borderRadius:8,padding:"8px 12px",marginTop:12,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>&#x1F3C6;</span>
          <span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.ok}}>{trulyMastered} phrase{trulyMastered!==1?"s":""} truly mastered</span>
        </div>}
        {retentionDue>0&&<div style={{background:T.hiSoft,borderRadius:8,padding:"8px 12px",marginTop:8,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>&#x1F504;</span>
          <span style={{fontFamily:Fb,fontSize:12,color:"#B8860B"}}>Next retention check: {retentionDue} phrase{retentionDue!==1?"s":""} due for review</span>
        </div>}
      </div>
    </FadeIn>}

    {/* CEFR Per-Skill Cards */}
    <FadeIn delay={350}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 14px"}}>Per-Skill Levels</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {skillCEFR.map((s,i)=>{
            const colors=[T.ok,T.teal,T.purple,T.accent,T.navy,"#B8860B"];
            const c=colors[i%colors.length];
            return <div key={i} style={{background:`${c}08`,borderRadius:10,padding:"10px 12px",border:`1px solid ${c}15`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>{s.label}</span>
                <span style={{fontFamily:Fd,fontSize:18,fontWeight:700,color:c}}>{s.cefr}</span>
              </div>
              <div style={{marginTop:6,height:4,borderRadius:2,background:`${c}15`}}>
                <div style={{height:4,borderRadius:2,background:c,width:`${s.value}%`,transition:"width .5s"}}/>
              </div>
            </div>;
          })}
        </div>
      </div>
    </FadeIn>

    {/* Immersion Readiness */}
    <FadeIn delay={450}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 4px"}}>Immersion Readiness</p>
        <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"0 0 14px"}}>What you can do in English right now</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {readinessItems.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,background:`${statusColor[item.status]}06`}}>
            <span style={{fontSize:16,flexShrink:0}}>{statusIcon[item.status]}</span>
            <div style={{flex:1}}>
              <span style={{fontFamily:Fb,fontSize:13,color:T.text}}>{item.text}</span>
            </div>
            <span style={{fontFamily:Fb,fontSize:10,fontWeight:600,color:statusColor[item.status],textTransform:"uppercase"}}>{statusLabel[item.status]}</span>
          </div>)}
        </div>
        {onImmersion&&<button onClick={()=>onImmersion(skillCEFR)} style={{
          marginTop:14,width:"100%",background:`linear-gradient(135deg,#4A90A408,${T.hi}10)`,border:`1.5px solid #4A90A420`,
          borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,textAlign:"left",transition:"all .15s"
        }}>
          <div style={{width:40,height:40,borderRadius:10,background:"#E8F4F8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{"\u{1F30F}"}</div>
          <div style={{flex:1}}>
            <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:0}}>Immersion Guide</p>
            <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"2px 0 0"}}>Personalized recommendations + track real-world practice</p>
          </div>
          <ChevronRight size={18} color={T.muted}/>
        </button>}
      </div>
    </FadeIn>

    {/* Streak Calendar */}
    <FadeIn delay={550}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 14px"}}>Activity</p>
        <StreakCalendar activeDays={activeDays} streak={streak}/>
      </div>
    </FadeIn>

    {/* Stats Summary */}
    <FadeIn delay={650}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 14px"}}>Stats Summary</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {val:lessons,label:"Sessions",color:T.accent,bg:T.accentSoft},
            {val:totalSeen,label:"Phrases seen",color:T.ok,bg:T.okSoft},
            {val:totalMastered,label:"Mastered",color:T.purple,bg:T.purpleSoft},
            {val:accuracy+"%",label:"Accuracy",color:T.teal,bg:T.tealSoft},
            {val:convoCount||0,label:"Conversations",color:T.navy,bg:T.navySoft},
            {val:bestSkill.label,label:"Strongest skill",color:"#B8860B",bg:T.hiSoft}
          ].map((s,i)=><div key={i} style={{background:s.bg,borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:typeof s.val==="number"&&s.val>999?16:20,fontWeight:700,color:s.color}}>{s.val}</div>
            <div style={{fontFamily:Fb,fontSize:10,color:T.muted,marginTop:2}}>{s.label}</div>
          </div>)}
        </div>
      </div>
    </FadeIn>

    {/* Mastery Celebration Toast */}
    {masteryToast&&<div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setMasteryToast(null)}>
      <FadeIn><div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:24,padding:32,maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{width:72,height:72,borderRadius:36,background:`linear-gradient(135deg,#FFD700,${T.ok})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:32,animation:"cF 2s ease-in-out infinite alternate"}}>&#x1F3C6;</div>
        <p style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:T.ok,textTransform:"uppercase",letterSpacing:"0.1em",margin:"0 0 8px"}}>TRULY MASTERED</p>
        <h3 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 12px"}}>"{masteryToast.phrase}"</h3>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px",lineHeight:1.6}}>
          You've encountered this in {masteryToast.stats?.seen||"multiple"} contexts, got it right {masteryToast.stats?.correct||"many"} times, and remembered it over time. This phrase is <strong style={{color:T.ok}}>YOURS</strong>.
        </p>
        <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:20}}>
          {M2_LABELS.map((_,li)=><div key={li} style={{width:24,height:6,borderRadius:3,background:M2_COLORS[li]}}/>)}
        </div>
        <Btn onClick={()=>setMasteryToast(null)}>Amazing!</Btn>
      </div></FadeIn>
    </div>}

    {/* Bottom button */}
    <FadeIn delay={750}>
      <Btn onClick={onBack}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><ArrowRight size={16} style={{transform:"rotate(180deg)"}}/> Back to home</span>
      </Btn>
    </FadeIn>
  </div>;
}

/* ═══════════════════════════════════════════════
   IMMERSION SCREEN — personalized real-world recommendations
   ═══════════════════════════════════════════════ */
function ImmersionScreen({skillCEFR,level,immersionLog,onLogActivity,onBack}){
  const cardStyle={background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:16};
  const IM_TEAL="#4A90A4",IM_TEAL_SOFT="#E8F4F8";

  // Build skill map: {Reading:"B2", Listening:"B1", ...}
  const sk={};
  (skillCEFR||[]).forEach(s=>{sk[s.label]=s.cefr});
  const cefrGe=(have,need)=>{const order=["Pre-A1","A1","A2","B1","B2","C1","C2"];return order.indexOf(have||"Pre-A1")>=order.indexOf(need)};

  // ── Recommendations ──
  const recs=[];
  // Reading
  if(cefrGe(sk.Reading,"B2"))recs.push({status:"ready",skill:"Reading",icon:"\u{1F4D6}",title:"Read English articles without a dictionary",detail:"Try: Medium.com, The Verge, Hacker News",tip:"Start with topics you already know well — your domain knowledge fills vocabulary gaps."});
  else if(cefrGe(sk.Reading,"B1"))recs.push({status:"almost",skill:"Reading",icon:"\u{1F4D6}",title:"English articles without a dictionary",detail:`Reading: ${sk.Reading||"?"} — not quite ready yet.`,tip:"Do 5 more reading sessions this week. Try graded readers or news in simple English."});
  else recs.push({status:"not",skill:"Reading",icon:"\u{1F4D6}",title:"English articles without a dictionary",detail:`Reading: ${sk.Reading||"?"} — keep building vocabulary first.`,tip:"Focus on learning 10 new phrases per week through the app."});

  // Listening — podcasts
  if(cefrGe(sk.Listening,"B2"))recs.push({status:"ready",skill:"Listening",icon:"\u{1F3A7}",title:"English podcasts at normal speed",detail:"Try: How I Built This, Lex Fridman (with occasional pause)",tip:"Listen while commuting — even passive listening trains your ear."});
  else if(cefrGe(sk.Listening,"B1"))recs.push({status:"almost",skill:"Listening",icon:"\u{1F3A7}",title:"English podcasts at normal speed",detail:`Listening: ${sk.Listening||"?"} — not quite ready for podcasts yet.`,tip:"Do 5 more listening exercises this week. Try podcasts at 0.75x speed."});
  else recs.push({status:"not",skill:"Listening",icon:"\u{1F3A7}",title:"English podcasts",detail:`Listening: ${sk.Listening||"?"} — build up with app exercises first.`,tip:"Use the Connected Speech lessons to train your ear for fast English."});

  // Listening — Netflix
  if(cefrGe(sk.Listening,"C1"))recs.push({status:"ready",skill:"Listening",icon:"\u{1F4FA}",title:"Netflix without subtitles",detail:"Start with: The Office, Brooklyn 99 (clear dialogue)",tip:"If you miss something, don't rewind — train yourself to catch the gist."});
  else if(cefrGe(sk.Listening,"B2"))recs.push({status:"almost",skill:"Listening",icon:"\u{1F4FA}",title:"Netflix without subtitles",detail:"Try with English subtitles first, then remove them.",tip:"Watch one episode with subs, then rewatch without. You'll be surprised how much you catch."});
  else recs.push({status:"not",skill:"Listening",icon:"\u{1F4FA}",title:"Netflix without subtitles",detail:`Listening: ${sk.Listening||"?"} — use English subtitles for now.`,tip:"Watch with English subtitles — it trains reading speed AND listening together."});

  // Speaking
  if(cefrGe(sk.Speaking,"B2"))recs.push({status:"ready",skill:"Speaking",icon:"\u{1F399}\uFE0F",title:"English meetings without freezing",detail:"Tip: Prepare 3-4 key phrases before each meeting.",tip:"Practice the conversation feature before important meetings to warm up."});
  else if(cefrGe(sk.Speaking,"B1"))recs.push({status:"almost",skill:"Speaking",icon:"\u{1F399}\uFE0F",title:"English meetings confidently",detail:`Speaking: ${sk.Speaking||"?"} — almost there.`,tip:"Do 3 conversation practice sessions this week. Focus on filler phrases that buy you time."});
  else recs.push({status:"not",skill:"Speaking",icon:"\u{1F399}\uFE0F",title:"Confident English meetings",detail:`Speaking: ${sk.Speaking||"?"} — build confidence with app conversations first.`,tip:"Start with the guided conversation scenarios in the app."});

  // Writing
  if(cefrGe(sk.Writing,"B2"))recs.push({status:"ready",skill:"Writing",icon:"\u{270D}\uFE0F",title:"Switch your Slack/email to English",detail:"The more you write daily, the faster you improve.",tip:"Set your phone and apps to English too — every little bit of exposure counts."});
  else if(cefrGe(sk.Writing,"B1"))recs.push({status:"almost",skill:"Writing",icon:"\u{270D}\uFE0F",title:"Professional English writing",detail:`Writing: ${sk.Writing||"?"} — getting close.`,tip:"Practice writing short emails in the app's writing exercises before switching Slack."});
  else recs.push({status:"not",skill:"Writing",icon:"\u{270D}\uFE0F",title:"English emails and Slack",detail:`Writing: ${sk.Writing||"?"} — keep practicing in the app.`,tip:"Do the writing exercises — they give AI feedback on grammar and naturalness."});

  const statusIcon={ready:"\u2705",almost:"\u26A0\uFE0F",not:"\u274C"};
  const statusColor={ready:T.ok,almost:"#B8860B",not:"#C0392B"};
  const statusLabel={ready:"You're ready!",almost:"Almost there",not:"Not yet"};

  // ── Immersion challenge of the week ──
  const readySkills=recs.filter(r=>r.status==="ready");
  const almostSkills=recs.filter(r=>r.status==="almost");
  let challenge=null;
  if(readySkills.some(r=>r.skill==="Listening"&&r.title.includes("Netflix")))
    challenge={icon:"\u{1F4FA}",text:"Watch ONE episode of The Office without Indonesian subtitles.",check:"If you understand 80%+, you're on track!",color:T.purple};
  else if(readySkills.some(r=>r.skill==="Reading"))
    challenge={icon:"\u{1F4D6}",text:"Read ONE full article on Medium or The Verge in English.",check:"If you only looked up 2-3 words, you're doing great!",color:T.accent};
  else if(readySkills.some(r=>r.skill==="Listening"))
    challenge={icon:"\u{1F3A7}",text:"Listen to ONE podcast episode without pausing.",check:"If you got the main idea, your listening is strong!",color:T.navy};
  else if(readySkills.some(r=>r.skill==="Writing"))
    challenge={icon:"\u{270D}\uFE0F",text:"Write ONE email or Slack message entirely in English today.",check:"Don't use Google Translate — trust what you know!",color:T.teal};
  else if(almostSkills.length>0)
    challenge={icon:"\u{1F4AA}",text:`Focus on ${almostSkills[0].skill} this week — do 5 extra exercises.`,check:"You're close to being immersion-ready in this skill!",color:"#B8860B"};
  else
    challenge={icon:"\u{1F680}",text:"Complete 3 sessions this week to unlock your first immersion recommendation.",check:"Consistency is the key to immersion readiness!",color:T.accent};

  // ── Activity checklist ──
  const activities=[
    {id:"netflix",icon:"\u{1F4FA}",label:"I watched Netflix in English today"},
    {id:"article",icon:"\u{1F4D6}",label:"I read an article in English today"},
    {id:"podcast",icon:"\u{1F3A7}",label:"I listened to a podcast in English today"},
    {id:"email",icon:"\u{270D}\uFE0F",label:"I wrote an email/message in English today"},
    {id:"meeting",icon:"\u{1F399}\uFE0F",label:"I spoke English in a meeting/call today"},
    {id:"social",icon:"\u{1F4AC}",label:"I had a casual conversation in English today"}
  ];

  const today=new Date().toISOString().split("T")[0];
  const log=immersionLog||{};
  const todayLog=log[today]||[];
  const totalDays=Object.keys(log).length;
  const totalActivities=Object.values(log).reduce((a,d)=>a+d.length,0);
  // Streak: count consecutive days with at least 1 activity
  const sortedDays=Object.keys(log).sort().reverse();
  let imStreak=0;
  for(let i=0;i<sortedDays.length;i++){
    const expected=new Date(Date.now()-i*864e5).toISOString().split("T")[0];
    if(sortedDays[i]===expected)imStreak++;
    else break;
  }

  const toggleActivity=(actId)=>{
    const updated={...log};
    const dl=updated[today]||[];
    if(dl.includes(actId)){updated[today]=dl.filter(a=>a!==actId)}
    else{updated[today]=[...dl,actId]}
    if(updated[today].length===0)delete updated[today];
    onLogActivity(updated);
  };

  return <div style={{minHeight:"100vh",background:T.bg,padding:"24px 20px",paddingBottom:40}}>
    {/* Header */}
    <FadeIn>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <Badge color={IM_TEAL} bg={IM_TEAL_SOFT}>{"\u{1F30F}"} IMMERSION GUIDE</Badge>
          <h1 style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.text,margin:"10px 0 0"}}>What are you ready for?</h1>
          <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"4px 0 0"}}>Personalized based on your skill levels</p>
        </div>
        <button onClick={onBack} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 14px",fontFamily:Fb,fontSize:13,color:T.muted,cursor:"pointer",fontWeight:500}}>Back</button>
      </div>
    </FadeIn>

    {/* Recommendations */}
    <FadeIn delay={100}>
      <div style={cardStyle}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {recs.map((r,i)=><div key={i} style={{
            background:`${statusColor[r.status]}06`,border:`1px solid ${statusColor[r.status]}18`,
            borderRadius:12,padding:14,transition:"all .15s"
          }}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:20,flexShrink:0,marginTop:2}}>{statusIcon[r.status]}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:16}}>{r.icon}</span>
                  <span style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text}}>{r.status==="ready"?"You're ready to: ":""}{r.title}</span>
                </div>
                <p style={{fontFamily:Fb,fontSize:13,color:r.status==="ready"?T.ok:r.status==="almost"?"#B8860B":"#C0392B",margin:"0 0 4px",fontWeight:500}}>{r.detail}</p>
                <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:0,lineHeight:1.5,fontStyle:"italic"}}>{r.tip}</p>
              </div>
            </div>
          </div>)}
        </div>
      </div>
    </FadeIn>

    {/* Immersion Challenge of the Week */}
    {challenge&&<FadeIn delay={200}>
      <div style={{...cardStyle,background:`linear-gradient(135deg,${challenge.color}08,${T.hi}10)`,border:`1.5px solid ${challenge.color}20`}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:20}}>{"\u{1F3AF}"}</span>
          <p style={{fontFamily:Fb,fontSize:14,fontWeight:700,color:challenge.color,margin:0,textTransform:"uppercase",letterSpacing:"0.04em"}}>Challenge of the Week</p>
        </div>
        <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
          <span style={{fontSize:28,flexShrink:0}}>{challenge.icon}</span>
          <div>
            <p style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.text,margin:"0 0 6px",lineHeight:1.5}}>{challenge.text}</p>
            <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,lineHeight:1.5}}>{challenge.check}</p>
          </div>
        </div>
      </div>
    </FadeIn>}

    {/* Activity Tracker */}
    <FadeIn delay={300}>
      <div style={cardStyle}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:0}}>Today's Immersion Activities</p>
          <span style={{fontFamily:Fb,fontSize:11,color:T.muted}}>{todayLog.length}/{activities.length}</span>
        </div>
        <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"0 0 14px"}}>Check off what you did in English today</p>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {activities.map(a=>{
            const checked=todayLog.includes(a.id);
            return <button key={a.id} onClick={()=>toggleActivity(a.id)} style={{
              display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:10,cursor:"pointer",
              background:checked?`${T.ok}08`:T.bg,border:`1.5px solid ${checked?T.ok:T.border}`,transition:"all .15s",textAlign:"left"
            }}>
              <div style={{
                width:24,height:24,borderRadius:7,border:`2px solid ${checked?T.ok:T.muted+"50"}`,
                background:checked?T.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,transition:"all .15s"
              }}>
                {checked&&<Check size={14} color="#fff"/>}
              </div>
              <span style={{fontSize:16,flexShrink:0}}>{a.icon}</span>
              <span style={{fontFamily:Fb,fontSize:13,color:checked?T.ok:T.text,fontWeight:checked?600:400,transition:"all .15s"}}>{a.label}{checked?" \u2705":""}</span>
            </button>;
          })}
        </div>
      </div>
    </FadeIn>

    {/* Immersion Stats */}
    {totalDays>0&&<FadeIn delay={400}>
      <div style={cardStyle}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 14px"}}>Your Immersion Journey</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{background:IM_TEAL_SOFT,borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:IM_TEAL}}>{totalDays}</div>
            <div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>days active</div>
          </div>
          <div style={{background:T.okSoft,borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.ok}}>{totalActivities}</div>
            <div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>activities</div>
          </div>
          <div style={{background:T.hiSoft,borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:"#B8860B"}}>{imStreak}</div>
            <div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>day streak</div>
          </div>
        </div>
        {imStreak>=3&&<div style={{background:T.okSoft,borderRadius:8,padding:"8px 12px",marginTop:12,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{"\u{1F525}"}</span>
          <span style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.ok}}>{imStreak} days of real-world English practice!</span>
        </div>}
      </div>
    </FadeIn>}

    {/* Back button */}
    <FadeIn delay={500}>
      <Btn onClick={onBack}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><ArrowRight size={16} style={{transform:"rotate(180deg)"}}/> Back to progress</span>
      </Btn>
    </FadeIn>
  </div>;
}

function CelebrationScreen({score,total,streak,lessonCards,allStats,lpp,recallMsg,onContinue}){const[showC,setShowC]=useState(true);const pct=Math.round((score/total)*100);useEffect(()=>{const t=setTimeout(()=>setShowC(false),3500);return ()=>clearTimeout(t)},[]);const totalSeen=Object.values(allStats).filter(s=>s.seen>0).length;const totalMastered=Object.values(allStats).filter(s=>s.mastery>=4).length;const proofPhrases=(lessonCards||[]).slice(0,4);const P=getLPP(lpp);return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:32,background:T.bg}}>{showC&&<Confetti/>}<FadeIn><div style={{width:80,height:80,borderRadius:40,background:T.okSoft,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px"}}><Trophy size={36} color={T.ok}/></div></FadeIn><FadeIn delay={300}><h2 style={{fontFamily:Fd,fontSize:30,fontWeight:700,color:T.text,textAlign:"center",margin:"0 0 8px"}}>Session complete!</h2>{recallMsg?<p style={{fontFamily:Fb,fontSize:15,color:T.navy,textAlign:"center",margin:"0 0 28px",fontWeight:500}}>{recallMsg}</p>:<p style={{fontFamily:Fb,fontSize:15,color:T.muted,textAlign:"center",margin:"0 0 28px"}}>{P.celebrationMsg(pct)}</p>}</FadeIn><FadeIn delay={500}><div style={{background:T.card,borderRadius:20,padding:24,width:"100%",maxWidth:360,boxShadow:T.shadow,marginBottom:28}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:18}}><div style={{background:T.accentSoft,borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.accent}}>{pct}%</div><div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>accuracy</div></div><div style={{background:T.okSoft,borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.ok}}>{totalSeen}</div><div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>seen</div></div><div style={{background:T.purpleSoft,borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.purple}}>{totalMastered}</div><div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>mastered</div></div><div style={{background:T.hiSoft,borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:"#B8860B"}}>{streak}</div><div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>streak</div></div></div><div style={{background:T.bg,borderRadius:12,padding:14}}><p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 8px"}}>{P.proofWallTitle}</p>{proofPhrases.map(c=>{const st=allStats[c.id];const ml=["New","Seen","Familiar","Practiced","Strong","Mastered"][st?Math.min(st.mastery,5):0];return <p key={c.id} style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 3px",lineHeight:1.5}}><em style={{color:T.text}}>"{c.phrase}"</em> <span style={{fontSize:11,color:T.purple}}>({ml})</span></p>})}</div></div></FadeIn><FadeIn delay={700} style={{width:"100%",maxWidth:360}}><Btn onClick={onContinue}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>See what's next<ArrowRight size={18}/></span></Btn></FadeIn></div>}

utton></FadeIn></div>}

        }}>
          <div style={{width:44,height:44,borderRadius:12,background:sel?T.accentSoft:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{d.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.text,margin:0}}>{d.label}</p>
            <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"2px 0 0"}}>{d.desc}</p>
          </div>
          {sel&&<div style={{width:24,height:24,borderRadius:12,background:T.accent,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Check size={14} color="#fff"/></div>}
        </button>})}
      </div>

      <Btn onClick={save} disabled={selected.length===0||saving}>
