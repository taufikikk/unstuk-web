/* ═══════════════════════════════════════════════
   CONNECTED SPEECH SCREEN
   ═══════════════════════════════════════════════ */
const CS_GREEN="#4A8B6F";
const CS_GREEN_SOFT="#E8F5EE";

const speakCS=(text,rate=1)=>{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=rate;window.speechSynthesis.speak(u)};

function ConnectedSpeechScreen({lesson,onComplete,onBack}){
  const d=lesson.data||lesson;
  const forms=d.forms||[];
  const drillSentences=d.drill_sentences||[];
  const speedPassage=d.speed_passage||null;

  const[mode,setMode]=useState("menu"); // menu, lesson, drill, speed
  const[lessonIdx,setLessonIdx]=useState(0);
  const[lessonStep,setLessonStep]=useState("listen"); // listen, pick, reveal, example, identify
  const[lessonSel,setLessonSel]=useState(null);
  const[lessonScore,setLessonScore]=useState(0);
  const[lessonOpts,setLessonOpts]=useState([]);

  // drill state
  const[drillIdx,setDrillIdx]=useState(0);
  const[drillInput,setDrillInput]=useState("");
  const[drillSubmitted,setDrillSubmitted]=useState(false);
  const[drillResults,setDrillResults]=useState([]);
  const[drillDone,setDrillDone]=useState(false);

  // speed ladder state
  const[speedLevel,setSpeedLevel]=useState(0);
  const speeds=[0.75,1.0,1.25,1.5];
  const[speedSel,setSpeedSel]=useState(null);
  const[speedScore,setSpeedScore]=useState(0);
  const[speedDone,setSpeedDone]=useState(false);
  const[speedPlayed,setSpeedPlayed]=useState(false);
  const[maxSpeed,setMaxSpeed]=useState(0);

  const drillRef=useRef(null);

  // Build options for lesson pick step
  const buildLessonOpts=(idx)=>{
    const f=forms[idx];if(!f)return[];
    const allReduced=forms.map(x=>x.reduced);
    const wrongs=allReduced.filter(r=>r!==f.reduced).sort(()=>Math.random()-.5).slice(0,3);
    return[f.reduced,...wrongs].sort(()=>Math.random()-.5);
  };

  const startLesson=()=>{setMode("lesson");setLessonIdx(0);setLessonStep("listen");setLessonScore(0);setLessonSel(null);setLessonOpts(buildLessonOpts(0));setTimeout(()=>speakCS(forms[0]?.reduced||"",1),300)};

  const startDrill=()=>{setMode("drill");setDrillIdx(0);setDrillInput("");setDrillSubmitted(false);setDrillResults([]);setDrillDone(false);setTimeout(()=>{speakCS(drillSentences[0]?.sentence||"",1)},300)};

  const startSpeed=()=>{setMode("speed");setSpeedLevel(0);setSpeedSel(null);setSpeedScore(0);setSpeedDone(false);setSpeedPlayed(false);setMaxSpeed(0)};

  // ─── LESSON MODE ───
  const lessonPick=(opt,i)=>{
    if(lessonSel!==null)return;
    setLessonSel(i);
    const f=forms[lessonIdx];
    if(opt===f.reduced)setLessonScore(s=>s+1);
    setTimeout(()=>setLessonStep("reveal"),800);
  };

  const lessonPlayExample=()=>{
    const f=forms[lessonIdx];
    speakCS(f.example||f.full,1);
    setLessonStep("example");
  };

  const lessonIdentify=()=>{
    const f=forms[lessonIdx];
    speakCS(f.example||f.full,1.1);
    setLessonStep("identify");
  };

  const lessonNext=()=>{
    const ni=lessonIdx+1;
    if(ni>=forms.length){setMode("results");return}
    setLessonIdx(ni);setLessonStep("listen");setLessonSel(null);setLessonOpts(buildLessonOpts(ni));
    setTimeout(()=>speakCS(forms[ni]?.reduced||"",1),300);
  };

  // ─── DRILL MODE ───
  const drillPlay=()=>speakCS(drillSentences[drillIdx]?.sentence||"",1);

  const drillSubmit=()=>{
    if(!drillInput.trim())return;
    const cur=drillSentences[drillIdx];
    const actual=cur.sentence.toLowerCase().replace(/[.,!?;:'"]/g,"");
    const typed=drillInput.trim().toLowerCase().replace(/[.,!?;:'"]/g,"");
    const reducedForms=cur.reduced_forms||[];

    const actualWords=actual.split(/\s+/);
    const typedWords=typed.split(/\s+/);

    // diff: mark each actual word as hit or miss
    const diff=actualWords.map((w,i)=>{
      const tw=typedWords[i]||"";
      const isReduced=reducedForms.some(rf=>w.includes(rf.toLowerCase()));
      const match=tw===w||tw===w.replace(/'/g,"");
      return{word:w,typed:tw,match,isReduced};
    });

    const missedReduced=diff.filter(d=>d.isReduced&&!d.match);
    setDrillResults(r=>[...r,{sentence:cur.sentence,diff,missedReduced,reducedForms}]);
    setDrillSubmitted(true);
  };

  const drillNext=()=>{
    const ni=drillIdx+1;
    if(ni>=drillSentences.length){setDrillDone(true);return}
    setDrillIdx(ni);setDrillInput("");setDrillSubmitted(false);
    setTimeout(()=>speakCS(drillSentences[ni]?.sentence||"",1),300);
  };

  useEffect(()=>{if(mode==="drill"&&!drillSubmitted&&drillRef.current)drillRef.current.focus()},[drillIdx,drillSubmitted,mode]);

  // ─── SPEED LADDER ───
  const spQ=speedPassage?.questions||[];
  const spText=speedPassage?.text||"";

  const speedPlay=()=>{
    speakCS(spText,speeds[speedLevel]);
    setSpeedPlayed(true);
  };

  const speedAnswer=(idx)=>{
    if(speedSel!==null)return;
    setSpeedSel(idx);
    const q=spQ[speedLevel];
    const ok=idx===q.correct;
    const ns=speedScore+(ok?1:0);
    setSpeedScore(ns);
    if(ok)setMaxSpeed(speeds[speedLevel]);
  };

  const speedNext=()=>{
    const nl=speedLevel+1;
    if(nl>=speeds.length||nl>=spQ.length){setSpeedDone(true);return}
    setSpeedLevel(nl);setSpeedSel(null);setSpeedPlayed(false);
  };

  const badgeEl=<div style={{display:"inline-flex",alignItems:"center",gap:6,background:`linear-gradient(135deg,${CS_GREEN},#6BC48F)`,borderRadius:8,padding:"5px 12px",marginBottom:20}}>
    <span style={{fontSize:14}}>&#x1F50A;</span>
    <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:"#fff",letterSpacing:"0.06em"}}>FAST ENGLISH</span>
  </div>;

  const playBtn=(onClick,label,size)=><button onClick={onClick} style={{
    width:size||56,height:size||56,borderRadius:(size||56)/2,background:CS_GREEN,border:"none",cursor:"pointer",
    display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(74,139,111,.3)",transition:"transform .15s"
  }} onMouseDown={e=>e.currentTarget.style.transform="scale(.93)"} onMouseUp={e=>e.currentTarget.style.transform=""}>
    <svg width={20} height={20} viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
    {label&&<span style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:"#fff",marginLeft:6}}>{label}</span>}
  </button>;

  // ─── MENU ───
  if(mode==="menu"){
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>{badgeEl}
        <h2 style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.text,margin:"0 0 6px"}}>Connected Speech</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 28px",lineHeight:1.5}}>Real English is fast, blended, and full of shortcuts. Learn to hear them.</p>
      </FadeIn>
      <FadeIn delay={200}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {forms.length>0&&<button onClick={startLesson} style={{background:T.card,border:`2px solid ${CS_GREEN}30`,borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",boxShadow:T.shadow}}>
            <div style={{width:48,height:48,borderRadius:14,background:CS_GREEN_SOFT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>&#x1F442;</div>
            <div style={{flex:1}}>
              <p style={{fontFamily:Fb,fontSize:16,fontWeight:600,color:T.text,margin:0}}>Reduced Forms Lesson</p>
              <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"2px 0 0"}}>{forms.length} forms — hear, identify, learn</p>
            </div><ChevronRight size={18} color={T.muted}/>
          </button>}
          {drillSentences.length>0&&<button onClick={startDrill} style={{background:T.card,border:`2px solid ${CS_GREEN}30`,borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",boxShadow:T.shadow}}>
            <div style={{width:48,height:48,borderRadius:14,background:CS_GREEN_SOFT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>&#x270D;&#xFE0F;</div>
            <div style={{flex:1}}>
              <p style={{fontFamily:Fb,fontSize:16,fontWeight:600,color:T.text,margin:0}}>Practice Drill</p>
              <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"2px 0 0"}}>{drillSentences.length} sentences — dictation style</p>
            </div><ChevronRight size={18} color={T.muted}/>
          </button>}
          {speedPassage&&spQ.length>0&&<button onClick={startSpeed} style={{background:T.card,border:`2px solid ${CS_GREEN}30`,borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",boxShadow:T.shadow}}>
            <div style={{width:48,height:48,borderRadius:14,background:CS_GREEN_SOFT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>&#x26A1;</div>
            <div style={{flex:1}}>
              <p style={{fontFamily:Fb,fontSize:16,fontWeight:600,color:T.text,margin:0}}>Speed Ladder</p>
              <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"2px 0 0"}}>0.75x → 1.5x — how fast can you go?</p>
            </div><ChevronRight size={18} color={T.muted}/>
          </button>}
        </div>
      </FadeIn>
      <FadeIn delay={400}>
        <Btn v="ghost" onClick={onBack} style={{marginTop:24}}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><ArrowRight size={16} style={{transform:"rotate(180deg)"}}/> Back</span>
        </Btn>
      </FadeIn>
    </div>;
  }

  // ─── LESSON MODE RENDER ───
  if(mode==="lesson"){
    const f=forms[lessonIdx];
    if(!f)return null;
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>{badgeEl}<Bar current={lessonIdx+1} total={forms.length}/></FadeIn>

      {lessonStep==="listen"&&<FadeIn key={"ls-"+lessonIdx}>
        <h3 style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.text,margin:"20px 0 8px"}}>Listen carefully</h3>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 24px"}}>What reduced form do you hear?</p>
        <div style={{display:"flex",justifyContent:"center",marginBottom:32}}>
          {playBtn(()=>speakCS(f.reduced,1))}
        </div>
        <Btn onClick={()=>setLessonStep("pick")}>I heard it — let me pick <ArrowRight size={16} style={{marginLeft:6}}/></Btn>
      </FadeIn>}

      {lessonStep==="pick"&&<FadeIn key={"pk-"+lessonIdx}>
        <h3 style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:"20px 0 8px"}}>What did you hear?</h3>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          {playBtn(()=>speakCS(f.reduced,1))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {lessonOpts.map((opt,i)=>{
            const picked=lessonSel===i;const isRight=opt===f.reduced;
            let bg=T.card,border=T.border,color=T.text;
            if(lessonSel!==null){
              if(isRight){bg=T.okSoft;border=T.ok;color=T.ok}
              else if(picked){bg="#FFF0F0";border="#E74C3C";color="#E74C3C"}
            }
            return <button key={i} onClick={()=>lessonPick(opt,i)} style={{background:bg,border:`2px solid ${border}`,borderRadius:12,padding:"13px 16px",cursor:lessonSel===null?"pointer":"default",fontFamily:Fb,fontSize:16,fontWeight:600,color,textAlign:"center",transition:"all .2s"}}>{opt}</button>;
          })}
        </div>
      </FadeIn>}

      {lessonStep==="reveal"&&<FadeIn key={"rv-"+lessonIdx}>
        <h3 style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:"20px 0 16px"}}>Reduced Form</h3>
        <div style={{background:T.card,borderRadius:16,padding:24,boxShadow:T.shadow,marginBottom:20,textAlign:"center"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,flexWrap:"wrap"}}>
            <div style={{background:T.bg,borderRadius:12,padding:"12px 20px"}}>
              <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"0 0 4px"}}>Full form</p>
              <p style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:0}}>{f.full}</p>
            </div>
            <ArrowRight size={20} color={CS_GREEN}/>
            <div style={{background:CS_GREEN_SOFT,borderRadius:12,padding:"12px 20px",border:`2px solid ${CS_GREEN}30`}}>
              <p style={{fontFamily:Fb,fontSize:12,color:CS_GREEN,margin:"0 0 4px"}}>Reduced</p>
              <p style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:CS_GREEN,margin:0}}>{f.reduced}</p>
            </div>
          </div>
          {f.ipa&&<p style={{fontFamily:Fb,fontSize:14,color:T.muted,marginTop:12}}>/{f.ipa}/</p>}
        </div>
        <Btn onClick={lessonPlayExample}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>&#x1F50A; Hear it in a sentence</span>
        </Btn>
      </FadeIn>}

      {lessonStep==="example"&&<FadeIn key={"ex-"+lessonIdx}>
        <h3 style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:"20px 0 12px"}}>Example</h3>
        <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:8}}>
          <p style={{fontFamily:Fb,fontSize:16,color:T.text,margin:0,lineHeight:1.6,textAlign:"center"}}>
            {f.example.split(new RegExp(`(${f.reduced})`,"gi")).map((part,i)=>
              part.toLowerCase()===f.reduced.toLowerCase()?<strong key={i} style={{color:CS_GREEN,textDecoration:"underline",textDecorationColor:CS_GREEN+"60"}}>{part}</strong>:<span key={i}>{part}</span>
            )}
          </p>
        </div>
        <div style={{display:"flex",justifyContent:"center",margin:"16px 0"}}>
          {playBtn(()=>speakCS(f.example,1))}
        </div>
        <Btn onClick={lessonIdentify}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Now at full speed <ArrowRight size={16}/></span>
        </Btn>
      </FadeIn>}

      {lessonStep==="identify"&&<FadeIn key={"id-"+lessonIdx}>
        <h3 style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:"20px 0 12px"}}>Can you catch it?</h3>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px"}}>The reduced form "<strong style={{color:CS_GREEN}}>{f.reduced}</strong>" in full-speed speech</p>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          {playBtn(()=>speakCS(f.example,1.1))}
        </div>
        <div style={{background:CS_GREEN_SOFT,borderRadius:12,padding:16,marginBottom:20,textAlign:"center"}}>
          <p style={{fontFamily:Fb,fontSize:13,color:CS_GREEN,fontWeight:600,margin:0}}><Check size={14} color={CS_GREEN} style={{verticalAlign:-3,marginRight:4}}/> {f.full} → {f.reduced}</p>
        </div>
        <Btn onClick={lessonNext}>
          {lessonIdx<forms.length-1?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Next form <ArrowRight size={16}/></span>:"See results"}
        </Btn>
      </FadeIn>}
    </div>;
  }

  // ─── DRILL MODE RENDER ───
  if(mode==="drill"){
    if(drillDone){
      const total=drillResults.length;
      const totalMissed=drillResults.reduce((a,r)=>a+r.missedReduced.length,0);
      const totalReduced=drillResults.reduce((a,r)=>a+(r.reducedForms?.length||0),0);
      const caught=totalReduced-totalMissed;
      return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
        <FadeIn>{badgeEl}
          <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 8px"}}>Drill Complete!</h2>
          <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 24px"}}>You caught {caught} of {totalReduced} reduced forms</p>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
            <div style={{background:T.okSoft,borderRadius:12,padding:16,textAlign:"center"}}>
              <div style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:T.ok}}>{caught}</div>
              <div style={{fontFamily:Fb,fontSize:11,color:T.muted}}>Caught</div>
            </div>
            <div style={{background:"#FFF0F0",borderRadius:12,padding:16,textAlign:"center"}}>
              <div style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:"#E74C3C"}}>{totalMissed}</div>
              <div style={{fontFamily:Fb,fontSize:11,color:T.muted}}>Missed</div>
            </div>
          </div>

          {drillResults.filter(r=>r.missedReduced.length>0).length>0&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:20}}>
            <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 10px"}}>Missed reduced forms:</p>
            {drillResults.filter(r=>r.missedReduced.length>0).map((r,i)=><div key={i} style={{marginBottom:10}}>
              <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 4px",fontStyle:"italic"}}>"{r.sentence}"</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{r.missedReduced.map((m,j)=><span key={j} style={{background:"#FFF0F0",border:"1px solid #FFD0D0",borderRadius:6,padding:"2px 8px",fontFamily:Fb,fontSize:12,fontWeight:600,color:"#E74C3C"}}>{m.word}</span>)}</div>
            </div>)}
          </div>}
        </FadeIn>
        <Btn onClick={()=>setMode("menu")}>Back to menu</Btn>
      </div>;
    }

    const cur=drillSentences[drillIdx];
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>{badgeEl}<Bar current={drillIdx+1} total={drillSentences.length}/></FadeIn>
      <FadeIn key={"dr-"+drillIdx}>
        <h3 style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:"20px 0 8px"}}>Type what you hear</h3>
        <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 20px"}}>Listen carefully for reduced forms</p>
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          {playBtn(drillPlay)}
        </div>

        {!drillSubmitted&&<div>
          <textarea ref={drillRef} value={drillInput} onChange={e=>setDrillInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey&&drillInput.trim()){e.preventDefault();drillSubmit()}}} placeholder="Type what you heard..." style={{width:"100%",padding:14,borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:15,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",minHeight:70,resize:"vertical",marginBottom:12}} onFocus={e=>e.target.style.borderColor=CS_GREEN} onBlur={e=>e.target.style.borderColor=T.border}/>
          <Btn onClick={drillSubmit} disabled={!drillInput.trim()}>Check</Btn>
        </div>}

        {drillSubmitted&&<div>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
            <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Correct sentence</p>
            <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:"0 0 12px",lineHeight:1.6}}>
              {drillResults[drillResults.length-1]?.diff.map((w,i)=>{
                const missed=w.isReduced&&!w.match;
                return <span key={i} style={{background:missed?"#FFF0F0":w.isReduced?CS_GREEN_SOFT:"transparent",borderRadius:missed||w.isReduced?4:0,padding:missed||w.isReduced?"1px 3px":"0",color:missed?"#E74C3C":w.isReduced?CS_GREEN:T.text,fontWeight:w.isReduced?600:400,textDecoration:missed?"underline":"none"}}>{w.word}{" "}</span>;
              })}
            </p>
            <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:"0.06em"}}>You typed</p>
            <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:0,fontStyle:"italic"}}>"{drillInput.trim()}"</p>
          </div>

          {(cur.reduced_forms||[]).length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {(cur.reduced_forms||[]).map((rf,i)=><div key={i} style={{background:CS_GREEN_SOFT,border:`1px solid ${CS_GREEN}30`,borderRadius:8,padding:"6px 12px"}}>
              <span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:CS_GREEN}}>{rf}</span>
            </div>)}
          </div>}
          <Btn onClick={drillNext}>{drillIdx<drillSentences.length-1?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Next <ArrowRight size={16}/></span>:"See results"}</Btn>
        </div>}
      </FadeIn>
    </div>;
  }

  // ─── SPEED LADDER RENDER ───
  if(mode==="speed"){
    if(speedDone){
      const pct=Math.round((speedScore/speeds.length)*100);
      return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
        <FadeIn>{badgeEl}
          <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 8px"}}>Speed Ladder Complete!</h2>
          <div style={{background:T.card,borderRadius:16,padding:24,boxShadow:T.shadow,marginBottom:24}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:Fd,fontSize:36,fontWeight:700,color:CS_GREEN}}>{maxSpeed>0?maxSpeed+"x":"—"}</div>
                <div style={{fontFamily:Fb,fontSize:12,color:T.muted,marginTop:4}}>Max comprehension speed</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontFamily:Fd,fontSize:36,fontWeight:700,color:T.accent}}>{pct}%</div>
                <div style={{fontFamily:Fb,fontSize:12,color:T.muted,marginTop:4}}>Overall accuracy</div>
              </div>
            </div>
            <div style={{marginTop:16}}>
              <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 8px"}}>Speed breakdown</p>
              {speeds.map((sp,i)=>{
                const passed=i<spQ.length&&maxSpeed>=sp;
                return <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <div style={{width:48,fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text}}>{sp}x</div>
                  <div style={{flex:1,height:8,borderRadius:4,background:T.bg}}>
                    <div style={{height:8,borderRadius:4,background:passed?CS_GREEN:"#E8E4DC",width:passed?"100%":"0%",transition:"width .5s"}}/>
                  </div>
                  {passed&&<Check size={14} color={CS_GREEN}/>}
                </div>;
              })}
            </div>
          </div>
          <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px",lineHeight:1.6,textAlign:"center"}}>
            {maxSpeed>=1.25?"Excellent! You can handle fast natural speech.":maxSpeed>=1.0?"Good — you follow normal-speed English.":"Keep practicing — you'll get faster!"}
          </p>
        </FadeIn>
        <Btn onClick={()=>setMode("menu")}>Back to menu</Btn>
      </div>;
    }

    const q=spQ[speedLevel];
    if(!q)return null;
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>{badgeEl}<Bar current={speedLevel+1} total={speeds.length}/></FadeIn>
      <FadeIn key={"sp-"+speedLevel}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"20px 0 8px"}}>
          <h3 style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:0}}>Speed: {speeds[speedLevel]}x</h3>
          <div style={{background:CS_GREEN_SOFT,borderRadius:8,padding:"4px 12px"}}>
            <span style={{fontFamily:Fb,fontSize:13,fontWeight:700,color:CS_GREEN}}>Level {speedLevel+1}/{speeds.length}</span>
          </div>
        </div>

        {!speedPlayed&&<div>
          <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 24px",lineHeight:1.5}}>Listen to the passage at <strong>{speeds[speedLevel]}x</strong> speed, then answer a question.</p>
          <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
            <button onClick={speedPlay} style={{
              background:`linear-gradient(135deg,${CS_GREEN},#6BC48F)`,border:"none",borderRadius:16,padding:"16px 32px",cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 16px rgba(74,139,111,.3)"
            }}>
              <svg width={20} height={20} viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
              <span style={{fontFamily:Fb,fontSize:16,fontWeight:700,color:"#fff"}}>Play at {speeds[speedLevel]}x</span>
            </button>
          </div>
        </div>}

        {speedPlayed&&<div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
            {playBtn(()=>speakCS(spText,speeds[speedLevel]))}
          </div>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
            <p style={{fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,margin:"0 0 14px"}}>{q.question}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(q.options||[]).map((opt,i)=>{
                const picked=speedSel===i;const isRight=i===q.correct;
                let bg=T.card,border=T.border,color=T.text;
                if(speedSel!==null){
                  if(isRight){bg=T.okSoft;border=T.ok;color=T.ok}
                  else if(picked){bg="#FFF0F0";border="#E74C3C";color="#E74C3C"}
                }
                return <button key={i} onClick={()=>speedAnswer(i)} style={{background:bg,border:`2px solid ${border}`,borderRadius:10,padding:"11px 14px",cursor:speedSel===null?"pointer":"default",fontFamily:Fb,fontSize:14,color,textAlign:"left",transition:"all .2s"}}>{opt}</button>;
              })}
            </div>
          </div>
          {speedSel!==null&&<FadeIn>
            <div style={{background:speedSel===q.correct?T.okSoft:"#FFF0F0",borderRadius:10,padding:12,marginBottom:16}}>
              <p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:speedSel===q.correct?T.ok:"#E74C3C",margin:0}}>{speedSel===q.correct?"Correct! You understood at this speed.":"Not quite — try again at a slower speed next time."}</p>
            </div>
            <Btn onClick={speedNext}>{speedLevel<speeds.length-1&&speedLevel<spQ.length-1?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Next speed: {speeds[speedLevel+1]}x <ArrowRight size={16}/></span>:"See results"}</Btn>
          </FadeIn>}
        </div>}
      </FadeIn>
    </div>;
  }

  // ─── RESULTS (lesson) ───
  if(mode==="results"){
    const pct=forms.length>0?Math.round((lessonScore/forms.length)*100):0;
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>{badgeEl}
        <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 8px"}}>Lesson Complete!</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 24px"}}>You identified {lessonScore} of {forms.length} reduced forms</p>

        <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:20}}>
          <div style={{width:72,height:72,borderRadius:36,background:`conic-gradient(${CS_GREEN} ${pct}%, ${T.bg} 0)`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <div style={{width:56,height:56,borderRadius:28,background:T.card,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:CS_GREEN}}>{pct}%</span>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {forms.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,background:T.bg,borderRadius:10,padding:"10px 14px"}}>
              <div style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:CS_GREEN,minWidth:60}}>{f.reduced}</div>
              <ArrowRight size={14} color={T.muted}/>
              <div style={{fontFamily:Fb,fontSize:14,color:T.text,flex:1}}>{f.full}</div>
            </div>)}
          </div>
        </div>
      </FadeIn>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {(drillSentences.length>0||speedPassage)&&<Btn v="secondary" onClick={()=>setMode("menu")}>Back to menu</Btn>}
        <Btn onClick={()=>onComplete(lessonScore,forms.length)}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Done<ArrowRight size={16}/></span>
        </Btn>
      </div>
    </div>;
  }

  return null;
}

/* ═══════════════════════════════════════════════
   TOEFL PRACTICE SCREEN
   ═══════════════════════════════════════════════ */
const TOEFL_SECTIONS=[
  {type:"reading",label:"Reading",icon:"\u{1F4D6}",color:T.accent,time:20,maxScore:30,desc:"Read passages and answer questions"},
  {type:"listening",label:"Listening",icon:"\u{1F3A7}",color:T.navy,time:15,maxScore:30,desc:"Listen to audio and answer questions"},
  {type:"writing",label:"Writing",icon:"\u{270D}\uFE0F",color:T.purple,time:20,maxScore:30,desc:"Write responses to prompts"},
  {type:"speaking",label:"Speaking",icon:"\u{1F399}\uFE0F",color:T.teal,time:15,maxScore:30,desc:"Respond to speaking prompts (text-based)"}
];

const TOEFL_BENCHMARKS={
  reading:[{min:0,max:14,cefr:"B1",label:"B1 — Basic"},{min:15,max:21,cefr:"B2",label:"B2 — Independent"},{min:22,max:27,cefr:"C1",label:"C1 — Advanced"},{min:28,max:30,cefr:"C2",label:"C2 — Proficient"}],
  listening:[{min:0,max:14,cefr:"B1",label:"B1 — Basic"},{min:15,max:21,cefr:"B2",label:"B2 — Independent"},{min:22,max:27,cefr:"C1",label:"C1 — Advanced"},{min:28,max:30,cefr:"C2",label:"C2 — Proficient"}],
  writing:[{min:0,max:14,cefr:"B1",label:"B1 — Basic"},{min:15,max:23,cefr:"B2",label:"B2 — Independent"},{min:24,max:27,cefr:"C1",label:"C1 — Advanced"},{min:28,max:30,cefr:"C2",label:"C2 — Proficient"}],
  speaking:[{min:0,max:14,cefr:"B1",label:"B1 — Basic"},{min:15,max:23,cefr:"B2",label:"B2 — Independent"},{min:24,max:27,cefr:"C1",label:"C1 — Advanced"},{min:28,max:30,cefr:"C2",label:"C2 — Proficient"}]
};

function getBenchmark(type,score){
  const bm=TOEFL_BENCHMARKS[type]||TOEFL_BENCHMARKS.reading;
  for(const b of bm)if(score>=b.min&&score<=b.max)return b;
  return bm[0];
}

function TOEFLScreen({level,toeflHistory,onComplete,onBack}){
  const[stage,setStage]=useState("select"); // select, test, report
  const[sectionType,setSectionType]=useState(null);
  const[sectionData,setSectionData]=useState(null);
  const[sectionLoading,setSectionLoading]=useState(false);

  // test state
  const[qIdx,setQIdx]=useState(0);
  const[answers,setAnswers]=useState({});
  const[timeLeft,setTimeLeft]=useState(0);
  const[warned5,setWarned5]=useState(false);
  const[warned1,setWarned1]=useState(false);
  const[writingText,setWritingText]=useState("");
  const[writingWc,setWritingWc]=useState(0);
  const[speakingText,setSpeakingText]=useState("");
  const timerRef=useRef(null);

  // report state
  const[report,setReport]=useState(null);

  // history scores
  const histByType={};
  (toeflHistory||[]).forEach(h=>{
    const t=h.section_type;
    if(!histByType[t])histByType[t]={last:null,best:0};
    histByType[t].last=h.score;
    if(h.score>histByType[t].best)histByType[t].best=h.score;
  });

  const startSection=async(type)=>{
    setSectionLoading(true);setSectionType(type);
    const data=await apiGetToeflBySection(type);
    setSectionLoading(false);
    if(!data||!data.section){return}
    setSectionData(data.section);
    const d=data.section.data||data.section;
    const minutes=d.time_minutes||TOEFL_SECTIONS.find(s=>s.type===type)?.time||20;
    setTimeLeft(minutes*60);
    setQIdx(0);setAnswers({});setWritingText("");setSpeakingText("");setWritingWc(0);
    setWarned5(false);setWarned1(false);
    setStage("test");
  };

  // Timer
  useEffect(()=>{
    if(stage!=="test")return;
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){clearInterval(timerRef.current);submitTest();return 0}
        if(t===301&&!warned5){setWarned5(true)}
        if(t===61&&!warned1){setWarned1(true)}
        return t-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[stage]);

  const fmtTime=(s)=>{const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec<10?"0":""}${sec}`};

  const submitTest=async()=>{
    clearInterval(timerRef.current);
    const d=sectionData?.data||sectionData;
    const questions=d?.questions||[];
    const sId=sectionData?.section_id||"unknown";

    let finalAnswers={...answers};
    if(sectionType==="writing")finalAnswers.writing_text=writingText;
    if(sectionType==="speaking")finalAnswers.speaking_text=speakingText;

    // Client-side scoring
    let correct=0;
    questions.forEach((q,i)=>{
      if(q.correct!=null&&finalAnswers[i]===q.correct)correct++;
    });

    const maxQ=Math.max(questions.length,1);
    const secInfo=TOEFL_SECTIONS.find(s=>s.type===sectionType);
    const maxScore=secInfo?.maxScore||30;
    let rawScore;
    if(sectionType==="writing"||sectionType==="speaking"){
      // For writing/speaking, score based on word count + any MC questions
      const wc=sectionType==="writing"?writingWc:speakingText.trim().split(/\s+/).length;
      const wcScore=Math.min(1,wc/150);
      const mcScore=maxQ>0?correct/maxQ:0;
      rawScore=Math.round(((wcScore*0.6+mcScore*0.4)*maxScore));
    }else{
      rawScore=Math.round((correct/maxQ)*maxScore);
    }

    // Try server-side, fall back to client
    const serverResult=await apiSubmitToefl(sId,finalAnswers);
    const finalScore=serverResult?.score??rawScore;
    const feedback=serverResult?.feedback||null;

    const bm=getBenchmark(sectionType,finalScore);
    const rpt={section_type:sectionType,score:finalScore,max_score:maxScore,benchmark:bm,correct,total:questions.length,feedback};
    setReport(rpt);
    setStage("report");
  };

  const speakToefl=(text)=>{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=1;window.speechSynthesis.speak(u)};

  // ─── SECTION SELECTOR ───
  if(stage==="select"){
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <button onClick={onBack} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text}}>&#x2190; Back</button>
          <div style={{background:`linear-gradient(135deg,${T.navy},${T.purple})`,borderRadius:8,padding:"5px 12px",display:"inline-flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>&#x1F4DD;</span>
            <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:"#fff",letterSpacing:"0.06em"}}>TOEFL PRACTICE</span>
          </div>
        </div>
        <h2 style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.text,margin:"0 0 6px"}}>TOEFL iBT Practice</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 24px",lineHeight:1.5}}>Timed sections that simulate the real test. Pick a skill to practice.</p>
      </FadeIn>

      {sectionLoading&&<div style={{textAlign:"center",padding:40}}><p style={{fontFamily:Fb,fontSize:14,color:T.muted}}>Loading section...</p></div>}

      {!sectionLoading&&<FadeIn delay={200}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {TOEFL_SECTIONS.map((sec,i)=>{
            const h=histByType[sec.type];
            return <button key={sec.type} onClick={()=>startSection(sec.type)} style={{
              background:T.card,border:`2px solid ${sec.color}20`,borderRadius:16,padding:"18px 20px",cursor:"pointer",
              display:"flex",alignItems:"center",gap:14,textAlign:"left",boxShadow:T.shadow,transition:"all .2s"
            }} onMouseEnter={e=>e.currentTarget.style.borderColor=sec.color+"60"} onMouseLeave={e=>e.currentTarget.style.borderColor=sec.color+"20"}>
              <div style={{width:52,height:52,borderRadius:14,background:`${sec.color}12`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{sec.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <p style={{fontFamily:Fb,fontSize:16,fontWeight:600,color:T.text,margin:0}}>{sec.label}</p>
                  <span style={{fontFamily:Fb,fontSize:11,color:T.muted,background:T.bg,borderRadius:6,padding:"2px 8px"}}>{sec.time} min</span>
                </div>
                <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"3px 0 0"}}>{sec.desc}</p>
                {h&&<div style={{display:"flex",gap:12,marginTop:6}}>
                  {h.last!=null&&<span style={{fontFamily:Fb,fontSize:11,color:sec.color,fontWeight:600}}>Last: {h.last}/{sec.maxScore}</span>}
                  {h.best>0&&<span style={{fontFamily:Fb,fontSize:11,color:T.ok,fontWeight:600}}>Best: {h.best}/{sec.maxScore}</span>}
                </div>}
              </div>
              <ChevronRight size={18} color={T.muted}/>
            </button>;
          })}
        </div>
      </FadeIn>}
    </div>;
  }

  // ─── TEST INTERFACE ───
  if(stage==="test"&&sectionData){
    const d=sectionData.data||sectionData;
    const questions=d.questions||[];
    const q=questions[qIdx];
    const secInfo=TOEFL_SECTIONS.find(s=>s.type===sectionType);
    const timerColor=timeLeft<=60?"#E74C3C":timeLeft<=300?T.hi:T.text;

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:T.bg}}>
      {/* Timer bar */}
      <div style={{position:"sticky",top:0,zIndex:10,background:T.card,borderBottom:`1px solid ${T.border}`,padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>{secInfo?.icon}</span>
          <span style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text}}>{secInfo?.label}</span>
          {questions.length>0&&<span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>{qIdx+1}/{questions.length}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={timerColor} strokeWidth={2}><circle cx={12} cy={12} r={10}/><polyline points="12 6 12 12 16 14"/></svg>
          <span style={{fontFamily:Fb,fontSize:16,fontWeight:700,color:timerColor,fontVariantNumeric:"tabular-nums"}}>{fmtTime(timeLeft)}</span>
        </div>
      </div>

      {/* Warning banners */}
      {warned5&&timeLeft>60&&timeLeft<=300&&<div style={{background:"#FFF8E1",padding:"8px 20px",borderBottom:"1px solid #FFE082"}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:"#F57F17",margin:0}}>&#x26A0;&#xFE0F; 5 minutes remaining</p>
      </div>}
      {warned1&&timeLeft<=60&&timeLeft>0&&<div style={{background:"#FFEBEE",padding:"8px 20px",borderBottom:"1px solid #EF9A9A"}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:"#C62828",margin:0}}>&#x26A0;&#xFE0F; Less than 1 minute remaining!</p>
      </div>}

      <div style={{flex:1,padding:20}}>
        {/* ── READING SECTION ── */}
        {sectionType==="reading"&&<div>
          {d.passage&&<div style={{background:T.card,borderRadius:14,padding:18,boxShadow:T.shadow,marginBottom:16,maxHeight:280,overflowY:"auto"}}>
            <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{d.title||"Reading Passage"}</p>
            <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{d.passage}</p>
          </div>}
          {q&&<div>
            <p style={{fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,margin:"0 0 14px",lineHeight:1.5}}>{q.question||q.stem}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(q.options||[]).map((opt,i)=>{
                const sel=answers[qIdx]===i;
                return <button key={i} onClick={()=>setAnswers(a=>({...a,[qIdx]:i}))} style={{
                  background:sel?`${T.accent}10`:T.card,border:`2px solid ${sel?T.accent:T.border}`,borderRadius:12,padding:"12px 16px",
                  cursor:"pointer",fontFamily:Fb,fontSize:14,color:T.text,textAlign:"left",transition:"all .15s",
                  display:"flex",alignItems:"center",gap:10
                }}>
                  <div style={{width:24,height:24,borderRadius:12,border:`2px solid ${sel?T.accent:T.border}`,background:sel?T.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {sel&&<Check size={12} color="#fff"/>}
                  </div>
                  {opt}
                </button>;
              })}
            </div>
          </div>}
        </div>}

        {/* ── LISTENING SECTION ── */}
        {sectionType==="listening"&&<div>
          {d.audio_text&&<div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
            <button onClick={()=>speakToefl(d.audio_text)} style={{
              background:`linear-gradient(135deg,${T.navy},${T.purple})`,border:"none",borderRadius:16,padding:"16px 32px",cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 16px rgba(61,64,91,.3)"
            }}>
              <svg width={20} height={20} viewBox="0 0 24 24" fill="#fff" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
              <span style={{fontFamily:Fb,fontSize:15,fontWeight:700,color:"#fff"}}>Play Audio</span>
            </button>
          </div>}
          {q&&<div>
            <p style={{fontFamily:Fb,fontSize:15,fontWeight:500,color:T.text,margin:"0 0 14px",lineHeight:1.5}}>{q.question||q.stem}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(q.options||[]).map((opt,i)=>{
                const sel=answers[qIdx]===i;
                return <button key={i} onClick={()=>setAnswers(a=>({...a,[qIdx]:i}))} style={{
                  background:sel?`${T.navy}10`:T.card,border:`2px solid ${sel?T.navy:T.border}`,borderRadius:12,padding:"12px 16px",
                  cursor:"pointer",fontFamily:Fb,fontSize:14,color:T.text,textAlign:"left",transition:"all .15s",
                  display:"flex",alignItems:"center",gap:10
                }}>
                  <div style={{width:24,height:24,borderRadius:12,border:`2px solid ${sel?T.navy:T.border}`,background:sel?T.navy:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {sel&&<Check size={12} color="#fff"/>}
                  </div>
                  {opt}
                </button>;
              })}
            </div>
          </div>}
        </div>}

        {/* ── WRITING SECTION ── */}
        {sectionType==="writing"&&<div>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
            <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Prompt</p>
            <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:0,lineHeight:1.6}}>{d.prompt||q?.question||"Write your response."}</p>
          </div>
          <textarea value={writingText} onChange={e=>{setWritingText(e.target.value);setWritingWc(e.target.value.trim()?e.target.value.trim().split(/\s+/).length:0)}} placeholder="Type your response here..." style={{
            width:"100%",minHeight:200,padding:16,borderRadius:14,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:15,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.6
          }} onFocus={e=>e.target.style.borderColor=T.purple} onBlur={e=>e.target.style.borderColor=T.border}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
            <span style={{fontFamily:Fb,fontSize:12,color:writingWc>=150?T.ok:T.muted,fontWeight:600}}>{writingWc} words {writingWc<150&&<span style={{color:T.muted,fontWeight:400}}>(aim for 150+)</span>}</span>
          </div>
        </div>}

        {/* ── SPEAKING SECTION ── */}
        {sectionType==="speaking"&&<div>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
            <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Speaking Prompt</p>
            <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:0,lineHeight:1.6}}>{d.prompt||q?.question||"Speak your response."}</p>
            <p style={{fontFamily:Fb,fontSize:12,color:T.teal,margin:"8px 0 0",fontStyle:"italic"}}>Type your spoken response below (text-based practice)</p>
          </div>
          <textarea value={speakingText} onChange={e=>setSpeakingText(e.target.value)} placeholder="Type what you would say..." style={{
            width:"100%",minHeight:180,padding:16,borderRadius:14,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:15,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.6
          }} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/>
          <div style={{marginTop:8}}>
            <span style={{fontFamily:Fb,fontSize:12,color:T.muted}}>{speakingText.trim()?speakingText.trim().split(/\s+/).length:0} words</span>
          </div>
        </div>}
      </div>

      {/* Navigation */}
      <div style={{position:"sticky",bottom:0,background:T.card,borderTop:`1px solid ${T.border}`,padding:"12px 20px",display:"flex",gap:10}}>
        {sectionType!=="writing"&&sectionType!=="speaking"&&questions.length>0&&<>
          <Btn v="secondary" onClick={()=>setQIdx(i=>Math.max(0,i-1))} disabled={qIdx===0} style={{flex:1}}>&#x2190; Previous</Btn>
          {qIdx<questions.length-1?<Btn onClick={()=>setQIdx(i=>i+1)} style={{flex:1}}>Next &#x2192;</Btn>
          :<Btn onClick={submitTest} style={{flex:1}}>Submit Section</Btn>}
        </>}
        {(sectionType==="writing"||sectionType==="speaking")&&<Btn onClick={submitTest} style={{flex:1}}>Submit Response</Btn>}
      </div>
    </div>;
  }

  // ─── SCORE REPORT ───
  if(stage==="report"&&report){
    const bm=report.benchmark;
    const secInfo=TOEFL_SECTIONS.find(s=>s.type===report.section_type);
    const pct=Math.round((report.score/report.max_score)*100);
    const allSectionScores=TOEFL_SECTIONS.map(s=>{
      const h=histByType[s.type];
      return{type:s.type,label:s.label,icon:s.icon,color:s.color,score:s.type===report.section_type?report.score:(h?.last||null),max:s.maxScore};
    });
    const weakest=allSectionScores.filter(s=>s.score!=null).sort((a,b)=>(a.score/a.max)-(b.score/b.max))[0];

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:`linear-gradient(135deg,${T.navy},${T.purple})`,borderRadius:8,padding:"5px 12px",marginBottom:20}}>
          <span style={{fontSize:14}}>&#x1F4DD;</span>
          <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:"#fff",letterSpacing:"0.06em"}}>SCORE REPORT</span>
        </div>
        <h2 style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.text,margin:"0 0 6px"}}>{secInfo?.label} Results</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 24px"}}>{report.correct!=null&&report.total>0?`${report.correct}/${report.total} questions correct`:""}</p>
      </FadeIn>

      {/* Score circle */}
      <FadeIn delay={200}>
        <div style={{background:T.card,borderRadius:20,padding:28,boxShadow:T.shadow,marginBottom:20,textAlign:"center"}}>
          <div style={{width:100,height:100,borderRadius:50,background:`conic-gradient(${secInfo?.color||T.accent} ${pct}%, ${T.bg} 0)`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <div style={{width:78,height:78,borderRadius:39,background:T.card,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
              <span style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:secInfo?.color||T.accent}}>{report.score}</span>
              <span style={{fontFamily:Fb,fontSize:11,color:T.muted}}>/ {report.max_score}</span>
            </div>
          </div>

          <div style={{background:`${bm.cefr==="C1"||bm.cefr==="C2"?T.ok:bm.cefr==="B2"?T.accent:T.hi}15`,borderRadius:10,padding:"10px 16px",display:"inline-block"}}>
            <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:bm.cefr==="C1"||bm.cefr==="C2"?T.ok:bm.cefr==="B2"?T.accent:"#B8860B",margin:0}}>
              Your {secInfo?.label}: {report.score}/{report.max_score} — this is {bm.label} level
            </p>
          </div>
        </div>
      </FadeIn>

      {/* TOEFL scale mapping */}
      <FadeIn delay={350}>
        <div style={{background:T.card,borderRadius:16,padding:18,boxShadow:T.shadow,marginBottom:20}}>
          <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 12px"}}>TOEFL Score Scale</p>
          {(TOEFL_BENCHMARKS[report.section_type]||[]).map((b,i)=>{
            const active=report.score>=b.min&&report.score<=b.max;
            return <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{width:36,fontFamily:Fb,fontSize:12,fontWeight:600,color:active?T.ok:T.muted}}>{b.cefr}</div>
              <div style={{flex:1,height:8,borderRadius:4,background:T.bg,overflow:"hidden",position:"relative"}}>
                <div style={{position:"absolute",left:`${(b.min/30)*100}%`,width:`${((b.max-b.min)/30)*100}%`,height:8,borderRadius:4,background:active?T.ok:`${T.muted}30`}}/>
                {active&&<div style={{position:"absolute",left:`${(report.score/30)*100}%`,top:-2,width:12,height:12,borderRadius:6,background:T.ok,border:"2px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.2)",transform:"translateX(-6px)"}}/>}
              </div>
              <div style={{width:48,fontFamily:Fb,fontSize:11,color:T.muted,textAlign:"right"}}>{b.min}-{b.max}</div>
            </div>;
          })}
        </div>
      </FadeIn>

      {/* Feedback */}
      {report.feedback&&<FadeIn delay={450}>
        <div style={{background:T.card,borderRadius:16,padding:18,boxShadow:T.shadow,marginBottom:20}}>
          <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 8px"}}>Feedback</p>
          <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:0,lineHeight:1.6}}>{typeof report.feedback==="string"?report.feedback:JSON.stringify(report.feedback)}</p>
        </div>
      </FadeIn>}

      {/* Focus recommendation */}
      {weakest&&<FadeIn delay={550}>
        <div style={{background:`linear-gradient(135deg,${T.accent}08,${T.hi}12)`,border:`1.5px solid ${T.accent}20`,borderRadius:14,padding:16,marginBottom:24}}>
          <p style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:T.accent,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.06em"}}>To reach C1, focus on:</p>
          <p style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.text,margin:0}}>{weakest.icon} {weakest.label} <span style={{fontWeight:400,color:T.muted}}>({weakest.score}/{weakest.max})</span></p>
        </div>
      </FadeIn>}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn v="secondary" onClick={()=>{setStage("select");setReport(null)}}>Try another section</Btn>
        <Btn onClick={()=>onComplete(report)}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Done<ArrowRight size={16}/></span>
        </Btn>
      </div>
    </div>;
  }

  return null;
}

   ═══════════════════════════════════════════════ */
const SESSION_LENGTHS=[
  {id:"quick",label:"Quick",time:"~5 min",desc:"Reading + exercises only",icon:"\u{26A1}"},
  {id:"standard",label:"Standard",time:"~8 min",desc:"Reading + exercises + 1 extra skill",icon:"\u{1F4D6}"},
  {id:"deep",label:"Deep",time:"~15 min",desc:"Reading + exercises + listening + writing + recall",icon:"\u{1F9E0}"}
];

function buildSessionPlan(lessons,level,sessionLength,sessionData,cardStats){
  const items=[];
  const phraseDue=Object.values(cardStats||{}).filter(s=>s.seen>0&&s.mastery<4).length;
  const dayInCycle=(lessons%7)+1;

  if(sessionData?.passage){
    const p=sessionData.passage;
    const title=p.title||p.data?.title||"Reading passage";
    const lv=p.level||level;
    items.push({icon:"\u{1F4D6}",text:`Read: '${title}' (${lv})`});
  }

  // Target phrases / exercises
  const tp=sessionData?.passage?.data?.target_phrases||sessionData?.passage?.target_phrases||[];
  if(tp.length>0){
    items.push({icon:"\u{270D}\uFE0F",text:`${tp.length*2} vocabulary exercises`});
  }else{
    items.push({icon:"\u{1F4DA}",text:"Vocabulary exercises"});
  }

  if(sessionLength!=="quick"){
    if(sessionData?.listening_exercise){
      items.push({icon:"\u{1F3A7}",text:"1 dictation exercise"});
    }
    if(sessionData?.writing_prompt){
      const wt=sessionData.writing_prompt.data?.prompt_type||sessionData.writing_prompt.prompt_type||"writing";
      const labels={email_completion:"Quick email completion",rewrite:"Sentence rewrite",free_write:"Free writing prompt",summary:"Summary writing"};
      items.push({icon:"\u{270D}\uFE0F",text:labels[wt]||"Writing exercise"});
    }
  }

  if(sessionLength==="deep"){
    if(sessionData?.subtext_exercise)items.push({icon:"\u{1F3AD}",text:"Subtext exercise"});
    if(sessionData?.register_exercise)items.push({icon:"\u{1F3AF}",text:"Register exercise"});
    if(sessionData?.slang_exercise)items.push({icon:"\u{1F525}",text:"Slang exercise"});
    if(sessionData?.sarcasm_exercise)items.push({icon:"\u{1F60F}",text:"Humor exercise"});
  }

  if(phraseDue>0){
    items.push({icon:"\u{1F9E0}",text:`Review: ${Math.min(phraseDue,5)} phrases due`});
  }

  const timeEst=sessionLength==="quick"?"~5 min":sessionLength==="deep"?"~15 min":"~8 min";
  const dayLabel=["","Reading + Exercises","Reading + Listening","Reading + Writing","Conversation Day","Full Practice","Grammar Focus","Check-in"][dayInCycle]||"Mixed Session";

  return{items,timeEst,dayInCycle,dayLabel};
}

/* ═══════════════════════════════════════════════
   MAIN APP — with API auth + persistence
   ═══════════════════════════════════════════════ */
function App(){
  const[loading,setLoading]=useState(true);
  const[authed,setAuthed]=useState(false);
  const[screen,setScreen]=useState("welcome");
  const[lpp,setLpp]=useState(null);
  const[level,setLevel]=useState("B1");
  const[lScore,setLScore]=useState({s:0,t:0});
  const[streak,setStreak]=useState(0);
  const[lessons,setLessons]=useState(0);
  const[convoCount,setConvoCount]=useState(0);
  const[lessonCards,setLessonCards]=useState([]);
  const[cardStats,setCardStats]=useState({});
  const[allCards,setAllCards]=useState([]);
  const[isAdmin,setIsAdminState]=useState(false);
  const[sessionData,setSessionData]=useState(null);
  const[sessionLoading,setSessionLoading]=useState(false);
  const[recallMsg,setRecallMsg]=useState("");
  const[grammarLesson,setGrammarLesson]=useState(null);
  const[connSpeechLesson,setConnSpeechLesson]=useState(null);
  const[lastAssessment,setLastAssessment]=useState(null); // {date,scores,overall_level,...}
  const[toeflHistory,setToeflHistory]=useState([]);
  const[domains,setDomains]=useState(null); // user's selected domains
  const[sessionLength,setSessionLength]=useState("standard");
  const[sessionPlan,setSessionPlan]=useState(null);
  const[immersionLog,setImmersionLog]=useState({});
  const[immersionSkillCEFR,setImmersionSkillCEFR]=useState(null);

  const loadCards=async()=>{
    const cards=await apiLoadCards();
    setAllCards(cards);
    return cards;
  };

  useEffect(()=>{
    (async()=>{
      if(!getToken()){setLoading(false);return}
      setIsAdminState(getIsAdmin());
      const[d]=await Promise.all([apiLoad(),loadCards()]);
      if(d&&d.lessonsCompleted>0){
        const s=calcStreak(d.lastDate,d.streak);
        setStreak(s);setLpp(d.lppProfile);setLevel(d.userLevel);setLessons(d.lessonsCompleted);setCardStats(d.cardStats||{});setConvoCount(d.convoCount||0);
        if(d.lastAssessment)setLastAssessment(d.lastAssessment);
        if(d.toeflHistory)setToeflHistory(d.toeflHistory);
        if(d.domains)setDomains(d.domains);
        if(d.immersionLog)setImmersionLog(d.immersionLog);
        setScreen("welcome-back");
      }
      setAuthed(true);setLoading(false);
    })();
  },[]);

  const onAuth=async()=>{
    setIsAdminState(getIsAdmin());
    const[d]=await Promise.all([apiLoad(),loadCards()]);
    if(d&&d.lessonsCompleted>0){
      const s=calcStreak(d.lastDate,d.streak);
      setStreak(s);setLpp(d.lppProfile);setLevel(d.userLevel);setLessons(d.lessonsCompleted);setCardStats(d.cardStats||{});setConvoCount(d.convoCount||0);
      if(d.lastAssessment)setLastAssessment(d.lastAssessment);
      if(d.domains)setDomains(d.domains);
      if(d.immersionLog)setImmersionLog(d.immersionLog);
      setScreen("welcome-back");
    }else{setScreen("welcome")}
    setAuthed(true);
  };

  const onLogout=()=>{clearToken();setIsAdmin(false);setIsAdminState(false);setAuthed(false);setScreen("welcome");setLpp(null);setLevel("B1");setStreak(0);setLessons(0);setCardStats({});setAllCards([])};

  const persist=async(nl,prof,lv,newStats,extra={})=>{
    const t=getToday(),d=await apiLoad(),prev=d?d.streak:0,pd=d?d.lastDate:null;
    let s;if(pd===t)s=prev;else if(pd===new Date(Date.now()-864e5).toISOString().split("T")[0])s=prev+1;else s=1;
    await apiSave({streak:s,lastDate:t,lessonsCompleted:nl,lppProfile:prof,userLevel:lv,cardStats:newStats,...extra});setStreak(s);
  };

  const prepareSession=async()=>{
    setSessionLoading(true);
    const[session,stEx,rgEx,slEx,saEx]=await Promise.all([apiComposeSession(),lessons>=10?apiGetNextSubtext():Promise.resolve(null),lessons>=10?apiGetNextRegister():Promise.resolve(null),lessons>=10?apiGetNextSlang():Promise.resolve(null),lessons>=15?apiGetNextSarcasm():Promise.resolve(null)]);
    setSessionLoading(false);
    if(session&&(session.type==="mixed"||session.type==="mixed_with_listening"||session.type==="mixed_with_writing")&&session.passage){
      if(stEx)session.subtext_exercise=stEx;
      if(rgEx)session.register_exercise=rgEx;
      if(slEx)session.slang_exercise=slEx;
      if(saEx)session.sarcasm_exercise=saEx;
      setSessionData(session);
      const plan=buildSessionPlan(lessons,level,sessionLength,session,cardStats);
      setSessionPlan(plan);
      setScreen("session-preview");
    }else if(session&&session.type==="writing"&&session.writing_prompt){
      setSessionData(session);
      const plan=buildSessionPlan(lessons,level,sessionLength,session,cardStats);
      setSessionPlan(plan);
      setScreen("session-preview");
    }else{
      // Flashcard-only — go straight to lesson (no passage content)
      setScreen("lesson");
    }
  };

  const launchSession=()=>{
    if(!sessionData){setScreen("lesson");return}
    const dayInCycle=((lessons%7)+1);
    // Day 4: conversation day
    if(dayInCycle===4){setScreen("conversation");return}
    // Day 7: assessment check-in (if available)
    if(dayInCycle===7&&assessmentAvailable){setScreen("assessment");return}
    // Day 6: grammar (if available)
    if(dayInCycle===6){
      (async()=>{const gl=await apiGetNextGrammar();if(gl){setGrammarLesson(gl);setScreen("grammar")}else{launchReading()}})();
      return;
    }
    launchReading();
  };

  const launchReading=()=>{
    if(sessionData?.passage){
      setScreen("reading");
    }else if(sessionData?.writing_prompt){
      setScreen("writing");
    }else{
      setScreen("lesson");
    }
  };

  // Kept for backward compatibility (TomorrowScreen "one more session")
  const startSession=prepareSession;

  const onGoal=id=>{setLpp(id);setScreen("placement")};
  const onPlace=lv=>{setLevel(lv);setScreen("domains")};

  const onLesson=async(score,total,cards,results)=>{
    const ns={...cardStats};for(const r of results){ns[r.cardId]=updateSRS(ns[r.cardId]||newCardStats(),r.correct)}
    setCardStats(ns);const nl=lessons+1;setLessons(nl);setLScore({s:score,t:total});setLessonCards(cards);await persist(nl,lpp,level,ns);setScreen("celebration");
  };

  const onReadingComplete=(score,total,results,rcMsg)=>{
    const nl=lessons+1;setLessons(nl);setLScore({s:score,t:Math.max(total,1)});setLessonCards([]);
    setRecallMsg(rcMsg||"");
    persist(nl,lpp,level,cardStats);
    setSessionData(null);setScreen("celebration");
  };

  const onReset=async()=>{await apiReset();setScreen("welcome");setLpp(null);setLevel("B1");setStreak(0);setLessons(0);setLessonCards([]);setCardStats({});setConvoCount(0);setLastAssessment(null);setToeflHistory([]);setDomains(null);setImmersionLog({})};

  const masteredCount=Object.values(cardStats).filter(s=>s.mastery>=4).length;
  const seenCount=Object.values(cardStats).filter(s=>s.seen>0).length;
  const assessmentAvailable=!lastAssessment||!lastAssessment.date||((Date.now()-new Date(lastAssessment.date).getTime())/(864e5))>=14;

  if(loading) return <div style={{maxWidth:440,margin:"0 auto",background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Loading...</p></div>;
  if(!authed) return <div style={{maxWidth:440,margin:"0 auto"}}><AuthScreen onAuth={onAuth}/></div>;

  return <div style={{maxWidth:440,margin:"0 auto",background:T.bg,minHeight:"100vh",position:"relative",overflow:"hidden"}}>
    {screen==="welcome"&&<WelcomeScreen onStart={()=>setScreen("goal")} isAdmin={isAdmin} onAdmin={()=>setScreen("admin")}/>}
    {screen==="welcome-back"&&<WelcomeBackScreen streak={streak} level={level} phrases={seenCount} masteredCount={masteredCount} lpp={lpp} onContinue={startSession} onConversation={()=>setScreen("conversation")} onGrammar={async()=>{const gl=await apiGetNextGrammar();if(gl){setGrammarLesson(gl);setScreen("grammar")}}} onProgress={()=>setScreen("progress")} onAssessment={()=>setScreen("assessment")} assessmentAvailable={assessmentAvailable} onDomains={()=>setScreen("domains-edit")} onConnectedSpeech={async()=>{const cl=await apiGetNextConnectedSpeech();if(cl){setConnSpeechLesson(cl);setScreen("connected-speech")}}} onToefl={async()=>{const h=await apiGetToeflHistory();setToeflHistory(h);setScreen("toefl")}} onReset={onReset} onLogout={onLogout} isAdmin={isAdmin} onAdmin={()=>setScreen("admin")}/>}
    {screen==="goal"&&<GoalScreen onSelect={onGoal}/>}
    {screen==="placement"&&<PlacementScreen onComplete={onPlace}/>}
    {screen==="domains"&&<DomainSelectScreen initialDomains={domains} onComplete={(d)=>{setDomains(d);persist(0,lpp,level,cardStats,{domains:d});setScreen("level-reveal")}}/>}
    {screen==="domains-edit"&&<DomainSelectScreen initialDomains={domains} onComplete={(d)=>{setDomains(d);persist(lessons,lpp,level,cardStats,{domains:d});setScreen("welcome-back")}}/>}
    {screen==="level-reveal"&&<LevelRevealScreen level={level} onContinue={()=>setScreen("lesson")}/>}
    {screen==="lesson"&&<LessonScreen cards={allCards} onComplete={onLesson} allStats={cardStats} lpp={lpp}/>}
    {screen==="reading"&&sessionData&&<ReadingScreen session={sessionData} cards={allCards} onComplete={onReadingComplete} allStats={cardStats} lpp={lpp} listeningExercise={sessionLength!=="quick"?(sessionData.listening_exercise||null):null} writingPrompt={sessionLength!=="quick"?(sessionData.writing_prompt||null):null} subtextExercise={sessionLength==="deep"&&lessons>=10?(sessionData.subtext_exercise||null):null} registerExercise={sessionLength==="deep"&&lessons>=10?(sessionData.register_exercise||null):null} slangExercise={sessionLength==="deep"&&lessons>=10?(sessionData.slang_exercise||null):null} sarcasmExercise={sessionLength==="deep"&&lessons>=15?(sessionData.sarcasm_exercise||null):null}/>}
    {screen==="writing"&&sessionData?.writing_prompt&&<WritingScreen prompt={sessionData.writing_prompt} onComplete={()=>{setSessionData(null);const nl=lessons+1;setLessons(nl);setLScore({s:7,t:10});setLessonCards([]);setRecallMsg("Nice work on your writing today!");persist(nl,lpp,level,cardStats);setScreen("celebration")}} inSession={false}/>}
    {screen==="conversation"&&<ConversationScreen level={level} convoCount={convoCount} onComplete={(analysis)=>{const nc=convoCount+1;setConvoCount(nc);setLessons(l=>l+1);persist(lessons+1,lpp,level,cardStats,{convoCount:nc});setScreen("welcome-back")}} onBack={()=>setScreen("welcome-back")}/>}
    {screen==="grammar"&&grammarLesson&&<GrammarLessonScreen lesson={grammarLesson} onComplete={()=>{setGrammarLesson(null);const nl=lessons+1;setLessons(nl);setLScore({s:5,t:5});setLessonCards([]);setRecallMsg("Great job on your grammar lesson!");persist(nl,lpp,level,cardStats);setScreen("celebration")}}/>}
    {screen==="connected-speech"&&connSpeechLesson&&<ConnectedSpeechScreen lesson={connSpeechLesson} onComplete={(score,total)=>{setConnSpeechLesson(null);const nl=lessons+1;setLessons(nl);setLScore({s:score||3,t:total||5});setLessonCards([]);setRecallMsg("Nice work on connected speech!");persist(nl,lpp,level,cardStats);setScreen("celebration")}} onBack={()=>{setConnSpeechLesson(null);setScreen("welcome-back")}}/>}
    {screen==="progress"&&<ProgressScreen level={level} streak={streak} lessons={lessons} cardStats={cardStats} convoCount={convoCount} lpp={lpp} allCards={allCards} onBack={()=>setScreen("welcome-back")} onImmersion={(skillCEFR)=>{setImmersionSkillCEFR(skillCEFR);setScreen("immersion")}}/>}
    {screen==="immersion"&&<ImmersionScreen skillCEFR={immersionSkillCEFR} level={level} immersionLog={immersionLog} onLogActivity={(updated)=>{setImmersionLog(updated);persist(lessons,lpp,level,cardStats,{immersionLog:updated})}} onBack={()=>setScreen("progress")}/>}
    {screen==="assessment"&&<AssessmentScreen lastAssessmentScores={lastAssessment} onComplete={(results)=>{const now=getToday();const assessment={date:now,scores:results.scores,overall_level:results.overall_level,overall:results.overall,skill_levels:results.skill_levels};setLastAssessment(assessment);persist(lessons,lpp,level,cardStats,{lastAssessment:assessment});setScreen("welcome-back")}} onBack={()=>setScreen("welcome-back")}/>}
    {screen==="toefl"&&<TOEFLScreen level={level} toeflHistory={toeflHistory} onComplete={(report)=>{const nh=[...toeflHistory,report];setToeflHistory(nh);persist(lessons,lpp,level,cardStats,{toeflHistory:nh});setScreen("welcome-back")}} onBack={()=>setScreen("welcome-back")}/>}
    {screen==="session-preview"&&sessionPlan&&<SessionPreviewScreen plan={sessionPlan} sessionLength={sessionLength} onSetLength={(len)=>{setSessionLength(len);setSessionPlan(buildSessionPlan(lessons,level,len,sessionData,cardStats))}} onStart={launchSession} onBack={()=>{setSessionData(null);setSessionPlan(null);setScreen("welcome-back")}}/>}
    {screen==="celebration"&&<CelebrationScreen score={lScore.s} total={lScore.t} streak={streak} lessonCards={lessonCards} allStats={cardStats} lpp={lpp} recallMsg={recallMsg} onContinue={()=>setScreen("post-session")}/>}
    {screen==="post-session"&&<PostSessionScreen onAnotherSession={prepareSession} onConversation={()=>setScreen("conversation")} onProgress={()=>setScreen("progress")} onDone={()=>setScreen("tomorrow")}/>}
    {screen==="tomorrow"&&<TomorrowScreen lppProfile={lpp} onNextLesson={prepareSession} onRestart={onReset}/>}
    {screen==="admin"&&<AdminPanel onBack={()=>setScreen(lessons>0?"welcome-back":"welcome")}/>}
    {sessionLoading&&<div style={{position:"fixed",inset:0,background:"rgba(251,247,240,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{width:48,height:48,borderRadius:24,background:`linear-gradient(135deg,${T.accent},${T.hi})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><BookOpen size={22} color="#fff"/></div><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Preparing your session...</p></div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
