      <FadeIn delay={150}>
        <div style={{background:T.hiSoft,borderRadius:14,padding:18,marginBottom:20,border:`1.5px solid ${T.hi}50`}}>
          <p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:0,lineHeight:1.6,fontStyle:"italic"}}>"{sentence}"</p>

  // ─── FREE WRITE (default) ───
  const topic=pData.topic||pData.prompt||pData.title||"Write about anything you'd like.";
  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
    <FadeIn>
      <Badge color={T.navy} bg={T.navySoft}>✍️ WRITING</Badge>
      <h2 style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.text,margin:"12px 0 6px"}}>Free Write</h2>
      <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 16px"}}>Write your thoughts on this topic:</p>
    </FadeIn>
    <FadeIn delay={150}>
      <div style={{background:T.purpleSoft,borderRadius:14,padding:18,marginBottom:20,border:`1px solid ${T.purple}20`}}>
        <p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.purple,margin:0,lineHeight:1.5}}>{topic}</p>
      </div>
    </FadeIn>
    <FadeIn delay={250}>
      <div style={{background:T.navySoft,borderRadius:16,padding:20,marginBottom:16}}>
        <textarea ref={ref} value={input} onChange={e=>setInput(e.target.value)}
          placeholder="Start writing..."
          style={{width:"100%",minHeight:160,padding:16,borderRadius:12,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:15,color:T.text,background:T.card,outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:1.7}}

          <span style={{fontFamily:Fb,fontSize:12,color:wcColor,fontWeight:500}}>{wordCount} words <span style={{color:T.muted}}>(target: {target.min}-{target.max})</span></span>

    {error&&<div style={{background:"#FFF0F0",borderRadius:10,padding:"10px 14px",marginBottom:12}}><p style={{fontFamily:Fb,fontSize:13,color:"#C0392B",margin:0}}>{error}</p></div>}
    <FadeIn delay={350}>
      <Btn onClick={submit} disabled={wordCount<Math.max(1,target.min-10)} style={{background:T.navy}}>Submit for review</Btn>

function ChatBubble({message,isUser}){
  const text=message.text||message.content||"";
  // Parse corrections: [[correction|original]] → highlight spans
  const renderText=(t)=>{
    const re=/\[\[([^|]+)\|([^\]]+)\]\]/g;
    const parts=[];let last=0,m;
    while((m=re.exec(t))!==null){
      if(m.index>last)parts.push({type:"text",val:t.slice(last,m.index)});
      parts.push({type:"correction",correction:m[1],original:m[2]});
      last=re.lastIndex;
    }
    if(last<t.length)parts.push({type:"text",val:t.slice(last)});
    if(!parts.length)return t;
    return parts.map((p,i)=>p.type==="text"?<span key={i}>{p.val}</span>:
      <span key={i} style={{background:"#FFF3CD",borderRadius:4,padding:"1px 4px",fontWeight:500}} title={`Correction: ${p.correction}`}>
        {p.original}<span style={{fontSize:11,color:"#B8860B",marginLeft:3}}>→ {p.correction}</span>
      </span>
    );
  };

  return <div style={{
    display:"flex",justifyContent:isUser?"flex-end":"flex-start",marginBottom:10
  }}>
    <div style={{
      maxWidth:"80%",padding:"12px 16px",borderRadius:isUser?"16px 16px 4px 16px":"16px 16px 16px 4px",
      background:isUser?T.accent:T.card,color:isUser?"#fff":T.text,
      boxShadow:isUser?"none":T.shadow,
      fontFamily:Fb,fontSize:14,lineHeight:1.6
    }}>
      {isUser?text:renderText(text)}
    </div>
  </div>;
}

function ConversationScreen({level,onComplete,onBack,convoCount}){
  const[stage,setStage]=useState("pick"); // pick, chat, analysis
  const[scenarios,setScenarios]=useState([]);
  const[loadingScenarios,setLoadingScenarios]=useState(true);
  const[convoId,setConvoId]=useState(null);
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState("");
  const[sending,setSending]=useState(false);
  const[msgCount,setMsgCount]=useState(0);
  const[rateLimited,setRateLimited]=useState(false);
  const[analysis,setAnalysis]=useState(null);
  const[ending,setEnding]=useState(false);
  const[error,setError]=useState("");
  const[scenario,setScenario]=useState(null);
  const[curveball,setCurveball]=useState(false);
  const chatEndRef=useRef(null);
  const inputRef=useRef(null);
  const MSG_LIMIT=30;
  const suggestCurveball=(convoCount||0)>=5;

  useEffect(()=>{
    (async()=>{
      const s=await apiGetConversationScenarios();
      setScenarios(s);setLoadingScenarios(false);
    })();
  },[]);

  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"})},[messages,sending]);

  const startConvo=async(scenarioId)=>{
    setError("");
    try{
      const s=scenarios.find(x=>x.scenario_id===scenarioId);
      setScenario(s||null);
      const res=await apiStartConversation(scenarioId,curveball);
      setConvoId(res.conversation_id);
      const firstMsg=res.message||res.starter_message||(s?.data?.starter_message);
      if(firstMsg)setMessages([{role:"ai",text:firstMsg}]);
      setMsgCount(0);setStage("chat");
      setTimeout(()=>inputRef.current?.focus(),200);
    }catch(e){setError(e.message)}
  };

  const startFreeChat=async()=>{
    setError("");
    try{
      const res=await apiStartConversation(null,curveball);
      setConvoId(res.conversation_id);setScenario(null);
      const firstMsg=res.message||"Hi! What would you like to talk about today?";
      setMessages([{role:"ai",text:firstMsg}]);
      setMsgCount(0);setStage("chat");
      setTimeout(()=>inputRef.current?.focus(),200);
    }catch(e){setError(e.message)}
  };

  const sendMessage=async()=>{
    if(!input.trim()||sending||rateLimited)return;
    const txt=input.trim();setInput("");
    setMessages(m=>[...m,{role:"user",text:txt}]);
    const newCount=msgCount+1;setMsgCount(newCount);
    if(newCount>=MSG_LIMIT){setRateLimited(true)}
    setSending(true);setError("");
    try{
      const res=await apiSendMessage(convoId,txt,curveball);
      if(res.rate_limited){setRateLimited(true);setMessages(m=>[...m,{role:"ai",text:"You've had a great practice today! Come back tomorrow for more."}]);setSending(false);return}
      const aiText=res.message||res.response||"";
      if(aiText)setMessages(m=>[...m,{role:"ai",text:aiText}]);
    }catch(e){setError(e.message)}
    setSending(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const endConvo=async()=>{
    setEnding(true);setError("");
    try{
      const res=await apiEndConversation(convoId);
      setAnalysis(res.analysis||res);setStage("analysis");
    }catch(e){setError(e.message)}
    setEnding(false);
  };

  // ─── SCENARIO PICKER ───
  if(stage==="pick"){
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <button onClick={onBack} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text}}>← Back</button>
          <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:0}}>Conversation</h2>
        </div>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 16px",lineHeight:1.5}}>Practice speaking English in realistic scenarios. Pick a situation or start a free chat.</p>
        <div style={{marginBottom:20}}>
          <CurveballToggle enabled={curveball} onToggle={()=>setCurveball(c=>!c)} suggested={suggestCurveball}/>
          {curveball&&<p style={{fontFamily:Fb,fontSize:12,color:T.accent,margin:"8px 0 0",lineHeight:1.5}}>🌪️ Topics will shift frequently. Expect idioms, sarcasm, and unexpected questions.</p>}
          {suggestCurveball&&!curveball&&<p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"6px 0 0",lineHeight:1.5}}>You've had {convoCount}+ conversations — ready for a challenge?</p>}
        </div>
      </FadeIn>
      <FadeIn delay={150}>
        <button onClick={startFreeChat} style={{width:"100%",background:`linear-gradient(135deg,${T.purple}15,${T.teal}15)`,border:`1.5px solid ${T.purple}30`,borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",marginBottom:20,transition:"all .2s"}}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
          <div style={{width:44,height:44,borderRadius:12,background:T.purpleSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>💬</div>
          <div><div style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.text}}>Free Chat</div><div style={{fontFamily:Fb,fontSize:13,color:T.muted,marginTop:2}}>Talk about anything — no pressure</div></div>
          <ChevronRight size={18} color={T.muted} style={{flexShrink:0,marginLeft:"auto"}}/>
        </button>
      </FadeIn>
      {loadingScenarios&&<p style={{fontFamily:Fb,fontSize:14,color:T.muted}}>Loading scenarios...</p>}
      {!loadingScenarios&&scenarios.length>0&&<FadeIn delay={250}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.muted,margin:"0 0 12px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Scenarios</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {scenarios.map((s,i)=>{
            const d=s.data||s;
            return <FadeIn key={s.scenario_id||i} delay={300+i*60}>
              <button onClick={()=>startConvo(s.scenario_id)} style={{width:"100%",background:T.card,border:`1.5px solid ${T.border}`,borderRadius:16,padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,textAlign:"left",boxShadow:T.shadow,transition:"all .2s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accent;e.currentTarget.style.transform="translateY(-2px)"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform=""}}>
                <div style={{width:40,height:40,borderRadius:10,background:T.accentSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🎭</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text}}>{s.title||d.title||s.scenario_id}</div>
                  <div style={{fontFamily:Fb,fontSize:12,color:T.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.situation||""}</div>
                </div>
                <ChevronRight size={16} color={T.muted} style={{flexShrink:0}}/>
              </button>
            </FadeIn>;
          })}
        </div>
      </FadeIn>}
      {!loadingScenarios&&scenarios.length===0&&<FadeIn delay={250}>
        <div style={{background:T.navySoft,borderRadius:14,padding:20,textAlign:"center"}}>
          <p style={{fontFamily:Fb,fontSize:14,color:T.navy,margin:0}}>No scenarios available yet. Try Free Chat!</p>
        </div>
      </FadeIn>}
      {error&&<div style={{background:"#FFF0F0",borderRadius:10,padding:"10px 14px",marginTop:12}}><p style={{fontFamily:Fb,fontSize:13,color:"#C0392B",margin:0}}>{error}</p></div>}
    </div>;
  }

  // ─── CHAT INTERFACE ───
  if(stage==="chat"){
    return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg}}>
      {/* Header */}
      <div style={{padding:"14px 20px",background:T.card,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:T.accentSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>💬</div>
          <div>
            <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:0}}>{scenario?.title||scenario?.data?.title||"Free Chat"}{curveball&&<span style={{fontSize:12,marginLeft:6}} title="Curveball mode">🌪️</span>}</p>
            <p style={{fontFamily:Fb,fontSize:11,color:T.muted,margin:0}}>{msgCount}/{MSG_LIMIT} messages today</p>
          </div>
        </div>
        <button onClick={endConvo} disabled={ending||messages.length<2} style={{
          background:ending?"transparent":T.card,border:`1.5px solid ${T.border}`,borderRadius:10,
          padding:"6px 14px",cursor:ending||messages.length<2?"default":"pointer",
          fontFamily:Fb,fontSize:12,fontWeight:600,color:T.accent,opacity:ending||messages.length<2?0.4:1
        }}>{ending?"Analyzing...":"End chat"}</button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column"}}>
        {scenario?.data?.situation&&<div style={{background:T.purpleSoft,borderRadius:12,padding:12,marginBottom:14,border:`1px solid ${T.purple}20`}}>
          <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.purple,margin:"0 0 3px"}}>Scenario</p>
          <p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0,lineHeight:1.5}}>{scenario.data.situation}</p>
        </div>}
        {messages.map((m,i)=><ChatBubble key={i} message={m} isUser={m.role==="user"}/>)}
        {sending&&<div style={{display:"flex",justifyContent:"flex-start",marginBottom:10}}>
          <div style={{background:T.card,borderRadius:"16px 16px 16px 4px",boxShadow:T.shadow}}>
            <TypingIndicator/>
          </div>
        </div>}
        {rateLimited&&!sending&&<FadeIn>
          <div style={{background:T.hiSoft,borderRadius:14,padding:16,marginTop:8,border:`1px solid ${T.hi}50`,textAlign:"center"}}>
            <p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:"#B8860B",margin:"0 0 4px"}}>You've had a great practice today!</p>
            <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>Come back tomorrow for more conversations.</p>
          </div>
        </FadeIn>}
        <div ref={chatEndRef}/>
      </div>

      {/* Input */}
      {!rateLimited&&<div style={{padding:"12px 20px 16px",background:T.card,borderTop:`1px solid ${T.border}`,flexShrink:0}}>
        {error&&<p style={{fontFamily:Fb,fontSize:12,color:"#C0392B",margin:"0 0 8px"}}>{error}</p>}
        <div style={{display:"flex",gap:8}}>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey)sendMessage()}}
            placeholder="Type your message..."
            disabled={sending}
            style={{flex:1,padding:"12px 16px",borderRadius:24,border:`1.5px solid ${T.border}`,fontFamily:Fb,fontSize:15,color:T.text,background:T.bg,outline:"none",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor=T.accent} onBlur={e=>e.target.style.borderColor=T.border}/>
          <button onClick={sendMessage} disabled={!input.trim()||sending} style={{
            width:44,height:44,borderRadius:22,background:!input.trim()||sending?T.border:T.accent,
            border:"none",cursor:!input.trim()||sending?"default":"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",
            transition:"all .2s",flexShrink:0
          }}>
            <SendIcon size={18}/>
          </button>
        </div>
      </div>}
      {rateLimited&&<div style={{padding:"12px 20px 16px",background:T.card,borderTop:`1px solid ${T.border}`,flexShrink:0}}>
        <Btn onClick={endConvo} disabled={ending} style={{background:T.accent}}>{ending?"Analyzing...":"See your analysis"}</Btn>
      </div>}
    </div>;
  }

  // ─── ANALYSIS ───
  if(stage==="analysis"&&analysis){
    const a=analysis;
    const fluency=a.fluency_score||a.fluency||7;
    const uniqueWords=a.unique_words||a.vocabulary_count||0;
    const grammarErrors=a.grammar_errors||a.error_count||0;
    const phrasesUsed=a.phrases_used||[];
    const newPhrase=a.new_phrase||a.suggested_phrase||"";
    const bestMoment=a.best_moment||a.highlight||"";

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:24,background:T.bg}}>
      <FadeIn>
        <Badge color={T.accent} bg={T.accentSoft}>💬 CONVERSATION ANALYSIS</Badge>
        <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"12px 0 20px"}}>Great conversation!</h2>
      </FadeIn>

      {/* Fluency score */}
      <FadeIn delay={150}>
        <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:16,display:"flex",alignItems:"center",gap:20}}>
          <ScoreCircle score={fluency}/>
          <div>
            <p style={{fontFamily:Fd,fontSize:18,fontWeight:700,color:T.text,margin:"0 0 4px"}}>Fluency</p>
            <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0}}>{fluency>=8?"Very natural flow!":fluency>=6?"Good conversational English!":"Keep practicing — you're improving!"}</p>
          </div>
        </div>
      </FadeIn>

      {/* Curveball badge */}
      {curveball&&<FadeIn delay={250}>
        <div style={{background:`linear-gradient(135deg,${T.accent}10,${T.hi}20)`,borderRadius:12,padding:"10px 16px",marginBottom:16,border:`1px solid ${T.accent}20`,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🌪️</span>
          <div>
            <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.accent,margin:0}}>Curveball Mode</p>
            <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:0}}>You handled topic shifts, idioms, and surprises!</p>
          </div>
        </div>
      </FadeIn>}

      {/* Stats grid */}
      <FadeIn delay={300}>
        <div style={{display:"grid",gridTemplateColumns:curveball?"1fr 1fr 1fr":"1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.teal}}>{uniqueWords}</div>
            <div style={{fontFamily:Fb,fontSize:11,color:T.muted,marginTop:2}}>unique words</div>
          </div>
          <div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:grammarErrors>5?T.accent:grammarErrors>2?"#B8860B":T.ok}}>{grammarErrors}</div>
            <div style={{fontFamily:Fb,fontSize:11,color:T.muted,marginTop:2}}>errors corrected</div>
          </div>
          {curveball&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,textAlign:"center"}}>
            <div style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.accent}}>{a.topic_shifts||a.curveballs||"~"}</div>
            <div style={{fontFamily:Fb,fontSize:11,color:T.muted,marginTop:2}}>topic shifts</div>
          </div>}
        </div>
      </FadeIn>

      {/* Phrases used */}
      {phrasesUsed.length>0&&<FadeIn delay={400}>
        <div style={{background:T.okSoft,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${T.ok}25`}}>
          <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.ok,margin:"0 0 8px"}}>Phrases from Unstuck used: {phrasesUsed.length}</p>
          {phrasesUsed.map((p,i)=><p key={i} style={{fontFamily:Fb,fontSize:14,color:T.text,margin:"0 0 4px"}}>
            <Check size={14} color={T.ok} style={{verticalAlign:-2,marginRight:6}}/><em>"{typeof p==="string"?p:p.phrase||p}"</em>
          </p>)}
        </div>
      </FadeIn>}

      {/* New phrase */}
      {newPhrase&&<FadeIn delay={500}>
        <div style={{background:T.purpleSoft,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${T.purple}25`}}>
          <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.purple,margin:"0 0 4px"}}>New phrase learned</p>
          <p style={{fontFamily:Fd,fontSize:16,fontWeight:600,color:T.text,margin:0,fontStyle:"italic"}}>"{typeof newPhrase==="string"?newPhrase:newPhrase.phrase||newPhrase}"</p>
        </div>
      </FadeIn>}

      {/* Best moment */}
      {bestMoment&&<FadeIn delay={600}>
        <div style={{background:T.hiSoft,borderRadius:14,padding:16,marginBottom:20,border:`1px solid ${T.hi}50`}}>
          <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:"#B8860B",margin:"0 0 6px"}}>Your best moment</p>
          <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,fontStyle:"italic",lineHeight:1.6}}>"{bestMoment}"</p>
        </div>
      </FadeIn>}

      <FadeIn delay={700}>
        <div style={{display:"flex",gap:10}}>
          <Btn v="secondary" onClick={()=>{setStage("pick");setMessages([]);setConvoId(null);setMsgCount(0);setRateLimited(false);setAnalysis(null);setError("")}} style={{flex:1}}>Start another</Btn>
          <Btn onClick={()=>onComplete(analysis)} style={{flex:1}}>Back to home</Btn>
        </div>
      </FadeIn>
    </div>;
  }

  return null;
}

/* ═══════════════════════════════════════════════
   SUBTEXT EXERCISE — what people SAY vs MEAN
   ═══════════════════════════════════════════════ */
const SUBTEXT_CATEGORIES={
  polite_disagreement:{label:"Polite Disagreement",icon:"🤝",color:"#7B68A8"},
  hidden_frustration:{label:"Hidden Frustration",icon:"😤",color:"#E07A5F"},
  social_lubricant:{label:"Social Lubricant",icon:"☕",color:"#4A90A4"},
  genuine_vs_performative:{label:"Genuine vs Performative",icon:"🎭",color:"#81B29A"}
};

function SubtextExercise({exercise,onComplete}){
  const d=exercise.data||exercise;
  const options=d.options||[];
  const correct=d.correct??0;
  const category=exercise.category||d.category||"";
  const cat=SUBTEXT_CATEGORIES[category]||{label:category,icon:"🎭",color:T.purple};

  const[selected,setSelected]=useState(null);
  const[revealed,setRevealed]=useState(false);

  const check=()=>{
    setRevealed(true);
    apiLogEncounter({card_id:0,exercise_id:exercise.exercise_id||"subtext",encounter_type:"subtext",result:selected===correct?"correct":"incorrect"});
  };

  const contextParts=[];
  if(d.setting)contextParts.push(d.setting);
  if(d.relationship)contextParts.push(d.relationship);
  const contextLine=contextParts.join(" · ");

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:"24px 20px",background:T.bg}}>
    <FadeIn>
      <Badge color={T.purple} bg={T.purpleSoft}>🎭 SUBTEXT</Badge>
      {category&&<div style={{display:"inline-block",marginLeft:8}}><span style={{fontFamily:Fb,fontSize:11,fontWeight:600,color:cat.color,background:`${cat.color}12`,padding:"3px 8px",borderRadius:6}}>{cat.icon} {cat.label}</span></div>}
      <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"16px 0 6px"}}>What do they really mean?</h2>
      <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px",lineHeight:1.5}}>Read the situation and figure out the hidden meaning.</p>
    </FadeIn>

    <FadeIn delay={200}>
      <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:20}}>
        {d.scenario&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 8px"}}>{d.scenario}</p>}
        <div style={{background:`${T.purple}08`,borderRadius:12,padding:16,border:`1px solid ${T.purple}18`,marginBottom:d.tone||contextLine?12:0}}>
          <p style={{fontFamily:Fd,fontSize:20,fontWeight:600,color:T.text,margin:0,lineHeight:1.5,textAlign:"center"}}>"{d.phrase}"</p>
        </div>
        {(d.tone||contextLine)&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
          {d.tone&&<span style={{fontFamily:Fb,fontSize:12,color:T.muted,fontStyle:"italic",background:T.bg,padding:"3px 8px",borderRadius:6}}>{d.tone}</span>}
          {contextLine&&<span style={{fontFamily:Fb,fontSize:12,color:T.muted,background:T.bg,padding:"3px 8px",borderRadius:6}}>{contextLine}</span>}
        </div>}
      </div>
    </FadeIn>

    <FadeIn delay={350}>
      <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 10px"}}>What do they probably mean?</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {options.map((opt,i)=>{
          const picked=selected===i;
          const isCorrect=i===correct;
          let bg=T.card,border=T.border,col=T.text;
          if(revealed){
            if(isCorrect){bg=T.okSoft;border=T.ok;col=T.ok}
            else if(picked&&!isCorrect){bg="#FFF0F0";border="#E07A5F";col="#C0392B"}
          }else if(picked){bg=T.purpleSoft;border=T.purple;col=T.purple}
          return <button key={i} onClick={()=>{if(!revealed)setSelected(i)}} style={{background:bg,border:`2px solid ${border}`,borderRadius:12,padding:"14px 16px",cursor:revealed?"default":"pointer",textAlign:"left",fontFamily:Fb,fontSize:14,color:col,fontWeight:picked?600:400,lineHeight:1.5,transition:"all .2s"}}>
            <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:revealed&&isCorrect?T.ok:(picked?col:T.muted),marginRight:8}}>{String.fromCharCode(65+i)}.</span>
            {opt}
            {revealed&&isCorrect&&<span style={{float:"right"}}><Check size={18} color={T.ok}/></span>}
          </button>;
        })}
      </div>
    </FadeIn>

    {selected!==null&&!revealed&&<FadeIn><Btn onClick={check}>Check</Btn></FadeIn>}

    {revealed&&<FadeIn>
      <div style={{background:selected===correct?T.okSoft:"#FFF5F3",borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${selected===correct?T.ok:"#E07A5F"}25`}}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:selected===correct?T.ok:"#C0392B",margin:"0 0 8px"}}>{selected===correct?"You got it!":"Not quite — here's the real meaning:"}</p>
        <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,lineHeight:1.6}}>{d.explanation||"—"}</p>
      </div>
      {d.variations&&d.variations.length>0&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:16}}>
        <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.purple,margin:"0 0 10px"}}>Same phrase, different meaning:</p>
        {d.variations.map((v,vi)=><div key={vi} style={{background:`${T.purple}06`,borderRadius:10,padding:12,marginBottom:vi<d.variations.length-1?8:0}}>
          <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"0 0 4px",fontStyle:"italic"}}>{v.context}</p>
          <p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0,lineHeight:1.5}}>{v.meaning}</p>
        </div>)}
      </div>}
      <Btn onClick={()=>onComplete(selected===correct)}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Continue<ArrowRight size={16}/></span>
      </Btn>
    </FadeIn>}
  </div>;
}

/* ═══════════════════════════════════════════════
   REGISTER EXERCISE — formality awareness
   ═══════════════════════════════════════════════ */
const REGISTER_LABELS={formal:{label:"Formal",color:"#3D405B",bg:"#3D405B12",icon:"👔"},professional_casual:{label:"Professional Casual",color:"#4A90A4",bg:"#4A90A412",icon:"💼"},casual:{label:"Casual",color:"#81B29A",bg:"#81B29A12",icon:"😊"}};

function ThreeWaysExercise({data,onDone}){
  const registers=data.registers||[]; // [{register:"formal",options:[...],correct:0}, ...]
  const[rIdx,setRIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[revealed,setRevealed]=useState(false);
  const[score,setScore]=useState(0);

  const cur=registers[rIdx];
  if(!cur)return null;
  const rl=REGISTER_LABELS[cur.register]||{label:cur.register,color:T.teal,bg:T.tealSoft,icon:"📝"};

  const check=()=>{
    setRevealed(true);
    if(selected===cur.correct)setScore(s=>s+1);
  };
  const next=()=>{
    if(rIdx<registers.length-1){setRIdx(rIdx+1);setSelected(null);setRevealed(false)}
    else onDone(score+(selected===cur.correct?1:0),registers.length);
  };

  return <div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {registers.map((r,i)=>{
        const l=REGISTER_LABELS[r.register]||{label:r.register,color:T.teal};
        const done=i<rIdx,active=i===rIdx;
        return <div key={i} style={{flex:1,textAlign:"center"}}>
          <div style={{height:4,borderRadius:2,background:done?T.teal:active?T.teal:T.border,opacity:done?1:active?0.6:0.3,transition:"all .3s"}}/>
          <div style={{fontFamily:Fb,fontSize:10,fontWeight:active?700:500,color:active?l.color:T.muted,marginTop:4}}>{l.icon} {l.label}</div>
        </div>;
      })}
    </div>

    <FadeIn key={rIdx}>
      <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:rl.color,margin:"0 0 12px"}}>Pick the <strong>{rl.label.toLowerCase()}</strong> version:</p>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {(cur.options||[]).map((opt,i)=>{
          const picked=selected===i;
          const isCorrect=i===cur.correct;
          let bg=T.card,border=T.border,col=T.text;
          if(revealed){
            if(isCorrect){bg=T.okSoft;border=T.ok;col=T.ok}
            else if(picked&&!isCorrect){bg="#FFF0F0";border="#E07A5F";col="#C0392B"}
          }else if(picked){bg=T.tealSoft;border=T.teal;col=T.teal}
          return <button key={i} onClick={()=>{if(!revealed)setSelected(i)}} style={{background:bg,border:`2px solid ${border}`,borderRadius:10,padding:"12px 14px",cursor:revealed?"default":"pointer",textAlign:"left",fontFamily:Fb,fontSize:14,color:col,fontWeight:picked?600:400,lineHeight:1.5,transition:"all .2s"}}>
            "{opt}"
            {revealed&&isCorrect&&<span style={{float:"right"}}><Check size={16} color={T.ok}/></span>}
          </button>;
        })}
      </div>
      {selected!==null&&!revealed&&<Btn onClick={check}>Check</Btn>}
      {revealed&&<>
        {cur.explanation&&<div style={{background:`${rl.color}08`,borderRadius:10,padding:12,marginBottom:12,border:`1px solid ${rl.color}18`}}>
          <p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0,lineHeight:1.5}}>{cur.explanation}</p>
        </div>}
        <Btn onClick={next}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{rIdx<registers.length-1?"Next register":"Continue"}<ArrowRight size={16}/></span>
        </Btn>
      </>}
    </FadeIn>
  </div>;
}

function RightRegisterExercise({data,onDone}){
  const[answered,setAnswered]=useState(null); // true/false
  const[revealed,setRevealed]=useState(false);
  const correct=data.is_appropriate??true;

  const answer=(val)=>{
    setAnswered(val);setRevealed(true);
  };

  const isCorrect=answered===correct;

  return <div>
    <div style={{background:T.card,borderRadius:14,padding:18,boxShadow:T.shadow,marginBottom:16}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {data.setting&&<span style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.teal,background:T.tealSoft,padding:"3px 10px",borderRadius:6}}>{data.setting}</span>}
        {data.relationship&&<span style={{fontFamily:Fb,fontSize:12,color:T.muted,background:T.bg,padding:"3px 10px",borderRadius:6}}>{data.relationship}</span>}
      </div>
      {data.situation&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 12px",lineHeight:1.5}}>{data.situation}</p>}
      <div style={{background:`${T.teal}08`,borderRadius:10,padding:14,border:`1px solid ${T.teal}18`}}>
        <p style={{fontFamily:Fd,fontSize:18,fontWeight:500,color:T.text,margin:0,lineHeight:1.5}}>"{data.message}"</p>
      </div>
    </div>

    <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 12px"}}>Is this the right level of formality?</p>

    {!revealed&&<div style={{display:"flex",gap:10}}>
      <Btn v="secondary" onClick={()=>answer(true)} style={{flex:1}}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Check size={16}/> Yes, appropriate</span>
      </Btn>
      <Btn v="secondary" onClick={()=>answer(false)} style={{flex:1}}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>✕ No, wrong register</span>
      </Btn>
    </div>}

    {revealed&&<FadeIn>
      <div style={{background:isCorrect?T.okSoft:"#FFF5F3",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${isCorrect?T.ok:"#E07A5F"}25`}}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:isCorrect?T.ok:"#C0392B",margin:"0 0 6px"}}>{isCorrect?"Correct!":"Not quite!"}</p>
        <p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0,lineHeight:1.5}}>{data.explanation||"—"}</p>
      </div>
      {data.better_version&&<div style={{background:T.card,borderRadius:12,padding:14,boxShadow:T.shadow,marginBottom:14}}>
        <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.teal,margin:"0 0 6px"}}>A better version:</p>
        <p style={{fontFamily:Fd,fontSize:16,fontWeight:500,color:T.text,margin:0,lineHeight:1.5}}>"{data.better_version}"</p>
      </div>}
      <Btn onClick={()=>onDone(isCorrect?1:0,1)}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Continue<ArrowRight size={16}/></span>
      </Btn>
    </FadeIn>}
  </div>;
}

function DetectiveExercise({data,onDone}){
  const messages=data.messages||[]; // [{text:"...",rank:0}, ...] rank 0=most formal
  const[order,setOrder]=useState(()=>messages.map((_,i)=>i).sort(()=>Math.random()-.5));
  const[selectedIdx,setSelectedIdx]=useState(null);
  const[checked,setChecked]=useState(false);

  const swap=(i)=>{
    if(checked)return;
    if(selectedIdx===null){setSelectedIdx(i)}
    else{
      const newOrder=[...order];
      const tmp=newOrder[i];newOrder[i]=newOrder[selectedIdx];newOrder[selectedIdx]=tmp;
      setOrder(newOrder);setSelectedIdx(null);
    }
  };

  const correctOrder=[...messages.keys()].sort((a,b)=>(messages[a].rank??a)-(messages[b].rank??b));
  const isCorrect=checked&&order.every((o,i)=>o===correctOrder[i]);
  const score=checked?order.reduce((s,o,i)=>s+(o===correctOrder[i]?1:0),0):0;

  return <div>
    <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 6px",lineHeight:1.5}}>Rank these from <strong>most formal</strong> (top) to <strong>most casual</strong> (bottom).</p>
    <p style={{fontFamily:Fb,fontSize:12,color:T.teal,margin:"0 0 16px"}}>Tap two messages to swap their positions.</p>

    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
      {order.map((msgIdx,pos)=>{
        const msg=messages[msgIdx];
        const isSelected=selectedIdx===pos;
        const correctPos=correctOrder.indexOf(msgIdx);
        let bg=T.card,border=T.border;
        if(checked){
          if(pos===correctPos){bg=T.okSoft;border=T.ok}
          else{bg="#FFF5F3";border="#E07A5F"}
        }else if(isSelected){bg=T.tealSoft;border=T.teal}
        const labels=["Most formal","","","Most casual"];
        const posLabel=pos===0?"Most formal":pos===order.length-1?"Most casual":"";
        return <button key={msgIdx} onClick={()=>swap(pos)} style={{background:bg,border:`2px solid ${border}`,borderRadius:10,padding:"12px 14px",cursor:checked?"default":"pointer",textAlign:"left",transition:"all .2s",position:"relative"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:24,height:24,borderRadius:12,background:checked?(pos===correctPos?T.ok:"#E07A5F"):T.teal,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:Fb,fontSize:12,fontWeight:700,flexShrink:0,opacity:checked?1:0.3}}>{pos+1}</div>
            <p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,lineHeight:1.5,flex:1}}>"{msg.text}"</p>
          </div>
          {posLabel&&!checked&&<div style={{fontFamily:Fb,fontSize:10,color:T.muted,marginTop:4,marginLeft:34}}>{posLabel}</div>}
          {checked&&pos!==correctPos&&<div style={{fontFamily:Fb,fontSize:11,color:T.muted,marginTop:4,marginLeft:34}}>Should be #{correctPos+1}</div>}
        </button>;
      })}
    </div>

    {!checked&&<Btn onClick={()=>setChecked(true)}>Check my ranking</Btn>}
    {checked&&<FadeIn>
      <div style={{background:isCorrect?T.okSoft:"#FFFBF0",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${isCorrect?T.ok:"#F2CC8F"}25`}}>
        <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:isCorrect?T.ok:"#B8860B",margin:"0 0 6px"}}>{isCorrect?"Perfect ranking!":"Close! "+score+"/"+messages.length+" in the right spot."}</p>
        {data.explanation&&<p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0,lineHeight:1.5}}>{data.explanation}</p>}
      </div>
      <Btn onClick={()=>onDone(score,messages.length)}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Continue<ArrowRight size={16}/></span>
      </Btn>
    </FadeIn>}
  </div>;
}

function RegisterExercise({exercise,onComplete}){
  const d=exercise.data||exercise;
  const exType=exercise.exercise_type||d.exercise_type||"three_ways";

  const onDone=(score,total)=>{
    apiLogEncounter({card_id:0,exercise_id:exercise.exercise_id||"register",encounter_type:"register",result:score>0?"correct":"incorrect"});
    onComplete(score>0);
  };

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:"24px 20px",background:T.bg}}>
    <FadeIn>
      <Badge color={T.teal} bg={T.tealSoft}>🎯 REGISTER</Badge>
      <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"16px 0 6px"}}>
        {exType==="three_ways"?"Same Message, Three Ways":exType==="right_register"?"Right Register?":"Register Detective"}
      </h2>
      {d.situation&&exType==="three_ways"&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:20}}>
        <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 8px"}}>The situation:</p>
        <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:0,lineHeight:1.5}}>{d.situation}</p>
        {d.message&&<div style={{background:`${T.teal}08`,borderRadius:10,padding:12,marginTop:10,border:`1px solid ${T.teal}18`}}>
          <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.teal,margin:"0 0 4px"}}>The message:</p>
          <p style={{fontFamily:Fd,fontSize:17,fontWeight:500,color:T.text,margin:0}}>"{d.message}"</p>
        </div>}
      </div>}
      {d.topic&&exType==="register_detective"&&<div style={{background:T.card,borderRadius:14,padding:16,boxShadow:T.shadow,marginBottom:20}}>
        <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 4px"}}>Topic:</p>
        <p style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.text,margin:0}}>{d.topic}</p>
      </div>}
    </FadeIn>
    <FadeIn delay={200}>
      {exType==="three_ways"&&<ThreeWaysExercise data={d} onDone={onDone}/>}
      {exType==="right_register"&&<RightRegisterExercise data={d} onDone={onDone}/>}
      {exType==="register_detective"&&<DetectiveExercise data={d} onDone={onDone}/>}
    </FadeIn>
  </div>;
}

/* ═══════════════════════════════════════════════
   GRAMMAR LESSON — 5-step discovery flow
   ═══════════════════════════════════════════════ */
function GrammarStepIndicator({current,labels}){
  return <div style={{display:"flex",gap:4,marginBottom:24}}>
    {labels.map((label,i)=>{
      const done=i<current,active=i===current;
      return <div key={i} style={{flex:1,textAlign:"center"}}>
        <div style={{height:4,borderRadius:2,background:done?T.navy:active?T.navy:T.border,opacity:done?1:active?0.6:0.3,transition:"all .3s"}}/>
        <div style={{fontFamily:Fb,fontSize:9,fontWeight:active?700:500,color:active?T.navy:T.muted,marginTop:4,letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}</div>
      </div>;
    })}
  </div>;
}

function GrammarLessonScreen({lesson,onComplete}){
  const steps=["Notice","Spot","Practice","Produce","Exceptions"];
  const[step,setStep]=useState(0);
  const[exIdx,setExIdx]=useState(0);
  const d=lesson.data||{};
  const examples=d.examples||[];
  const exercises=d.exercises||[];
  const production=d.production||[];
  const exceptions=d.exceptions||[];

  // Step 0: Notice
  const[noticeIdx,setNoticeIdx]=useState(0);
  // Step 1: Spot the pattern
  const[spotAnswer,setSpotAnswer]=useState(null);
  const[spotRevealed,setSpotRevealed]=useState(false);
  const patternOptions=d.pattern_options||[];
  const patternCorrect=d.pattern_correct??0;
  // Step 2: Practice
  const[practiceAnswer,setPracticeAnswer]=useState("");
  const[practiceRevealed,setPracticeRevealed]=useState(false);
  const[practiceScore,setPracticeScore]=useState(0);
  // Step 3: Produce
  const[prodIdx,setProdIdx]=useState(0);
  const[prodText,setProdText]=useState("");
  const[prodChecked,setProdChecked]=useState(false);
  const[prodResults,setProdResults]=useState([]);
  // Step 4: Exceptions — just display

  const totalScore=useRef(0);

  const containerStyle={minHeight:"100vh",display:"flex",flexDirection:"column",padding:"24px 20px",background:T.bg};
  const cardStyle={background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow};

  // === STEP 0: NOTICE ===
  if(step===0){
    return <div style={containerStyle}>
      <Badge color={T.navy} bg={T.navySoft}>📐 GRAMMAR</Badge>
      <GrammarStepIndicator current={0} labels={steps}/>
      <FadeIn>
        <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 6px"}}>Notice</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px",lineHeight:1.5}}>Read each sentence. What do they all have in common?</p>
      </FadeIn>
      <FadeIn delay={200}>
        <div style={{...cardStyle,marginBottom:20,minHeight:120,display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <p style={{fontFamily:Fb,fontSize:11,fontWeight:600,color:T.navy,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:"0.06em"}}>{noticeIdx+1} of {examples.length}</p>
          <p style={{fontFamily:Fd,fontSize:20,fontWeight:500,color:T.text,margin:0,lineHeight:1.6}}>{examples[noticeIdx]}</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          {noticeIdx>0&&<Btn v="secondary" onClick={()=>setNoticeIdx(n=>n-1)} style={{flex:1}}>Back</Btn>}
          {noticeIdx<examples.length-1?
            <Btn onClick={()=>setNoticeIdx(n=>n+1)} style={{flex:1}}>Next sentence</Btn>:
            <Btn onClick={()=>setStep(1)} style={{flex:1}}>
              <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>What's the pattern?<ArrowRight size={16}/></span>
            </Btn>}
        </div>
        <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:16}}>
          {examples.map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:4,background:i===noticeIdx?T.navy:T.border,transition:"all .2s"}}/>)}
        </div>
      </FadeIn>
    </div>;
  }

  // === STEP 1: SPOT THE PATTERN ===
  if(step===1){
    return <div style={containerStyle}>
      <Badge color={T.navy} bg={T.navySoft}>📐 GRAMMAR</Badge>
      <GrammarStepIndicator current={1} labels={steps}/>
      <FadeIn>
        <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 6px"}}>Spot the pattern</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px",lineHeight:1.5}}>{d.pattern_question||"What pattern did you notice in those sentences?"}</p>
      </FadeIn>
      <FadeIn delay={200}>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          {patternOptions.map((opt,i)=>{
            const picked=spotAnswer===i;
            const correct=i===patternCorrect;
            let bg=T.card,border=T.border,col=T.text;
            if(spotRevealed){
              if(correct){bg=T.okSoft;border=T.ok;col=T.ok}
              else if(picked&&!correct){bg="#FFF0F0";border="#E07A5F";col="#C0392B"}
            }else if(picked){bg=T.navySoft;border=T.navy;col=T.navy}
            return <button key={i} onClick={()=>{if(!spotRevealed)setSpotAnswer(i)}} style={{background:bg,border:`2px solid ${border}`,borderRadius:12,padding:"14px 16px",cursor:spotRevealed?"default":"pointer",textAlign:"left",fontFamily:Fb,fontSize:15,color:col,fontWeight:picked?600:400,transition:"all .2s"}}>
              {opt}
              {spotRevealed&&correct&&<span style={{float:"right"}}><Check size={18} color={T.ok}/></span>}
            </button>;
          })}
        </div>
        {spotAnswer!==null&&!spotRevealed&&<Btn onClick={()=>{setSpotRevealed(true);if(spotAnswer===patternCorrect)totalScore.current++}}>Check</Btn>}
        {spotRevealed&&<FadeIn>
          <div style={{...cardStyle,background:`${T.navy}08`,border:`1px solid ${T.navy}20`,marginBottom:16}}>
            <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.navy,margin:"0 0 6px"}}>The pattern:</p>
            <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:0,lineHeight:1.6}}>{d.pattern_explanation||"—"}</p>
          </div>
          <Btn onClick={()=>{setStep(2);setExIdx(0);setPracticeAnswer("");setPracticeRevealed(false)}}>
            <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Practice it<ArrowRight size={16}/></span>
          </Btn>
        </FadeIn>}
      </FadeIn>
    </div>;
  }

  // === STEP 2: PRACTICE ===
  if(step===2){
    const ex=exercises[exIdx];
    if(!ex) return <div style={containerStyle}><p>No exercises</p><Btn onClick={()=>setStep(3)}>Next</Btn></div>;
    const isBlank=ex.type==="fill";
    const prompt=ex.prompt||ex.sentence||"";
    const answer=(ex.answer||"").trim().toLowerCase();
    const options=ex.options||[];

    const checkPractice=()=>{
      setPracticeRevealed(true);
      const userAns=practiceAnswer.trim().toLowerCase();
      if(isBlank){
        if(userAns===answer){setPracticeScore(s=>s+1);totalScore.current++}
      }else{
        if(userAns===answer){setPracticeScore(s=>s+1);totalScore.current++}
      }
    };

    const nextPractice=()=>{
      if(exIdx<exercises.length-1){setExIdx(exIdx+1);setPracticeAnswer("");setPracticeRevealed(false)}
      else{setStep(3);setProdIdx(0);setProdText("");setProdChecked(false)}
    };

    const userCorrect=practiceAnswer.trim().toLowerCase()===answer;

    return <div style={containerStyle}>
      <Badge color={T.navy} bg={T.navySoft}>📐 GRAMMAR</Badge>
      <GrammarStepIndicator current={2} labels={steps}/>
      <FadeIn>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:0}}>Practice</h2>
          <span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.navy}}>{exIdx+1}/{exercises.length}</span>
        </div>
      </FadeIn>
      <FadeIn delay={100} key={exIdx}>
        <div style={{...cardStyle,marginBottom:16}}>
          <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:"0 0 14px",lineHeight:1.6}}>{prompt}</p>
          {isBlank?<input value={practiceAnswer} onChange={e=>setPracticeAnswer(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!practiceRevealed&&practiceAnswer.trim())checkPractice()}} placeholder="Type your answer..." disabled={practiceRevealed} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`2px solid ${practiceRevealed?(userCorrect?T.ok:"#E07A5F"):T.border}`,fontFamily:Fb,fontSize:15,background:practiceRevealed?(userCorrect?T.okSoft:"#FFF5F3"):T.bg,outline:"none",transition:"all .2s"}}/>:
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {options.map((o,oi)=>{
              const picked=practiceAnswer===o;
              const isCorrect=o.toLowerCase()===answer;
              let bg=T.card,bdr=T.border,col=T.text;
              if(practiceRevealed){
                if(isCorrect){bg=T.okSoft;bdr=T.ok;col=T.ok}
                else if(picked&&!isCorrect){bg="#FFF0F0";bdr="#E07A5F";col="#C0392B"}
              }else if(picked){bg=T.navySoft;bdr=T.navy;col=T.navy}
              return <button key={oi} onClick={()=>{if(!practiceRevealed)setPracticeAnswer(o)}} style={{background:bg,border:`2px solid ${bdr}`,borderRadius:10,padding:"12px 14px",cursor:practiceRevealed?"default":"pointer",textAlign:"left",fontFamily:Fb,fontSize:14,color:col,fontWeight:picked?600:400,transition:"all .2s"}}>{o}</button>;
            })}
          </div>}
        </div>
        {practiceRevealed&&<FadeIn>
          <div style={{background:userCorrect?T.okSoft:"#FFF5F3",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${userCorrect?T.ok:"#E07A5F"}30`}}>
            <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:userCorrect?T.ok:"#C0392B",margin:"0 0 4px"}}>{userCorrect?"Correct!":"Not quite"}</p>
            {!userCorrect&&<p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:0}}>Answer: <strong>{ex.answer}</strong></p>}
            {ex.explanation&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"4px 0 0",lineHeight:1.5}}>{ex.explanation}</p>}
          </div>
        </FadeIn>}
        {!practiceRevealed&&practiceAnswer&&<Btn onClick={checkPractice}>Check</Btn>}
        {practiceRevealed&&<Btn onClick={nextPractice}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{exIdx<exercises.length-1?"Next exercise":"Write your own"}<ArrowRight size={16}/></span>
        </Btn>}
      </FadeIn>
    </div>;
  }

  // === STEP 3: PRODUCE ===
  if(step===3){
    const prompt=production[prodIdx];
    if(!prompt) return <div style={containerStyle}><Badge color={T.navy} bg={T.navySoft}>📐 GRAMMAR</Badge><GrammarStepIndicator current={3} labels={steps}/><p style={{fontFamily:Fb,fontSize:15,color:T.muted}}>No production prompts available.</p><Btn onClick={()=>setStep(4)}>Continue</Btn></div>;

    const checkProd=()=>{
      const text=prodText.trim();
      if(!text)return;
      const keywords=(prompt.keywords||[]).map(k=>k.toLowerCase());
      const lower=text.toLowerCase();
      const matched=keywords.length===0||keywords.some(k=>lower.includes(k));
      setProdResults(r=>[...r,{text,matched,prompt:prompt.prompt}]);
      setProdChecked(true);
    };

    const nextProd=()=>{
      if(prodIdx<production.length-1){setProdIdx(prodIdx+1);setProdText("");setProdChecked(false)}
      else setStep(4);
    };

    const lastResult=prodResults[prodResults.length-1];

    return <div style={containerStyle}>
      <Badge color={T.navy} bg={T.navySoft}>📐 GRAMMAR</Badge>
      <GrammarStepIndicator current={3} labels={steps}/>
      <FadeIn>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:0}}>Your turn</h2>
          <span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.navy}}>{prodIdx+1}/{production.length}</span>
        </div>
      </FadeIn>
      <FadeIn delay={100} key={prodIdx}>
        <div style={{...cardStyle,marginBottom:16}}>
          <p style={{fontFamily:Fb,fontSize:15,color:T.text,margin:"0 0 14px",lineHeight:1.6}}>{prompt.prompt||"Write an original sentence using the pattern."}</p>
          <textarea value={prodText} onChange={e=>setProdText(e.target.value)} placeholder="Write your sentence here..." disabled={prodChecked} rows={3} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`2px solid ${prodChecked?(lastResult?.matched?T.ok:"#F2CC8F"):T.border}`,fontFamily:Fb,fontSize:15,background:prodChecked?(lastResult?.matched?T.okSoft:"#FFFBF0"):T.bg,outline:"none",resize:"vertical",transition:"all .2s"}}/>
        </div>
        {prodChecked&&<FadeIn>
          <div style={{background:lastResult?.matched?T.okSoft:"#FFFBF0",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${lastResult?.matched?T.ok:"#F2CC8F"}30`}}>
            <p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:lastResult?.matched?T.ok:"#B8860B",margin:0}}>{lastResult?.matched?"Looks good! The pattern is there.":"Give it another look — try to include the pattern."}</p>
          </div>
        </FadeIn>}
        {!prodChecked&&<Btn onClick={checkProd} disabled={!prodText.trim()}>Check my sentence</Btn>}
        {prodChecked&&<Btn onClick={nextProd}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{prodIdx<production.length-1?"Next prompt":"See exceptions"}<ArrowRight size={16}/></span>
        </Btn>}
      </FadeIn>
    </div>;
  }

  // === STEP 4: EXCEPTIONS ===
  if(step===4){
    return <div style={containerStyle}>
      <Badge color={T.navy} bg={T.navySoft}>📐 GRAMMAR</Badge>
      <GrammarStepIndicator current={4} labels={steps}/>
      <FadeIn>
        <h2 style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.text,margin:"0 0 6px"}}>Watch out for these</h2>
        <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 20px",lineHeight:1.5}}>The pattern doesn't always apply. Here are the exceptions:</p>
      </FadeIn>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:28}}>
        {exceptions.map((exc,i)=><FadeIn key={i} delay={i*150}>
          <div style={{...cardStyle,borderLeft:`4px solid #F2CC8F`}}>
            <p style={{fontFamily:Fb,fontSize:15,fontWeight:600,color:T.text,margin:"0 0 6px"}}>{exc.example||exc.sentence||"—"}</p>
            <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,lineHeight:1.5}}>{exc.explanation||"—"}</p>
          </div>
        </FadeIn>)}
        {exceptions.length===0&&<div style={cardStyle}><p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:0}}>No major exceptions for this pattern.</p></div>}
      </div>
      <FadeIn delay={exceptions.length*150+200}>
        <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,textAlign:"center",marginBottom:20}}>
          <div style={{width:56,height:56,borderRadius:28,background:T.navySoft,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:24}}>📐</div>
          <p style={{fontFamily:Fd,fontSize:20,fontWeight:700,color:T.text,margin:"0 0 4px"}}>Lesson complete!</p>
          <p style={{fontFamily:Fb,fontSize:14,color:T.muted,margin:"0 0 12px"}}>{lesson.title||"Grammar pattern"}</p>
          <div style={{display:"flex",justifyContent:"center",gap:16}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.navy}}>{examples.length}</div>
              <div style={{fontFamily:Fb,fontSize:11,color:T.muted}}>examples</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.ok}}>{exercises.length}</div>
              <div style={{fontFamily:Fb,fontSize:11,color:T.muted}}>practiced</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:Fd,fontSize:24,fontWeight:700,color:T.purple}}>{production.length}</div>
              <div style={{fontFamily:Fb,fontSize:11,color:T.muted}}>produced</div>
            </div>
          </div>
        </div>
        <Btn onClick={()=>{apiCompleteGrammar(lesson.lesson_id);onComplete()}}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Continue<ArrowRight size={16}/></span>
        </Btn>
      </FadeIn>
    </div>;
  }

  return null;
}

/* ═══════════════════════════════════════════════
   ASSESSMENT SCREEN — adaptive 20-question level check
   ═══════════════════════════════════════════════ */
const ASSESS_LEVELS=["A1","A2","B1","B2","C1"];
const ASSESS_SKILLS=["vocabulary","grammar","reading","listening"];
const ASSESS_SKILL_LABELS={vocabulary:"Vocabulary",grammar:"Grammar",reading:"Reading",listening:"Listening"};
const ASSESS_SKILL_COLORS={vocabulary:T.purple,grammar:T.navy,reading:T.ok,listening:T.teal};

function AssessmentScreen({onComplete,onBack,lastAssessmentScores}){
  const[stage,setStage]=useState("intro"); // intro, questions, results
  const[questions,setQuestions]=useState([]);
  const[qIdx,setQIdx]=useState(0);
  const[selected,setSelected]=useState(null);
  const[revealed,setRevealed]=useState(false);
  const[answers,setAnswers]=useState([]); // {question_id,skill,level,correct}
  const[results,setResults]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  // Adaptive state
  const[currentLevel,setCurrentLevel]=useState(2); // index into ASSESS_LEVELS, start at B1
  const[streak,setStreak]=useState(0); // consecutive correct at current level
  const[wrongStreak,setWrongStreak]=useState(0); // consecutive wrong at current level

  // TTS for listening questions
  const speakAssess=(text,rate=1.0)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=rate;u.lang="en-US";
    const voices=window.speechSynthesis.getVoices();
    const enVoice=voices.find(v=>v.lang.startsWith("en"));
    if(enVoice)u.voice=enVoice;
    window.speechSynthesis.speak(u);
  };
  useEffect(()=>{
    if(window.speechSynthesis)window.speechSynthesis.getVoices();
    return()=>{if(window.speechSynthesis)window.speechSynthesis.cancel()};
  },[]);

  const startAssessment=async()=>{
    setLoading(true);setError("");
    const data=await apiStartAssessment();
    setLoading(false);
    if(data&&data.questions&&data.questions.length>0){
      setQuestions(data.questions);setStage("questions");setQIdx(0);setAnswers([]);
      setCurrentLevel(2);setStreak(0);setWrongStreak(0);
    }else{
      setError("No assessment questions available. Ask your admin to upload some.");
    }
  };

  const submitAnswers=async(allAnswers)=>{
    setLoading(true);
    const res=await apiSubmitAssessment(allAnswers);
    setLoading(false);
    if(res){setResults(res);setStage("results")}
    else{
      // Client-side scoring fallback
      const skillScores={};
      ASSESS_SKILLS.forEach(sk=>{
        const skAnswers=allAnswers.filter(a=>a.skill===sk);
        const correct=skAnswers.filter(a=>a.correct).length;
        const total=skAnswers.length;
        skillScores[sk]=total>0?Math.round((correct/total)*100):0;
      });
      const overall=Math.round(Object.values(skillScores).reduce((a,v)=>a+v,0)/ASSESS_SKILLS.length);
      const toCEFR=(v)=>v>=90?"C1":v>=70?"B2":v>=50?"B1":v>=30?"A2":v>=15?"A1":"Pre-A1";
      setResults({scores:skillScores,overall,overall_level:toCEFR(overall),skill_levels:Object.fromEntries(ASSESS_SKILLS.map(s=>[s,toCEFR(skillScores[s])]))});
      setStage("results");
    }
  };

  const pickAnswer=(optIdx)=>{
    if(revealed)return;
    setSelected(optIdx);
  };

  const confirmAnswer=()=>{
    if(selected===null)return;
    setRevealed(true);
    const q=questions[qIdx];
    const d=q.data||q;
    const correct=selected===(d.correct??0);

    const ans={question_id:q.question_id||q.id,skill:q.skill,level:q.level,correct,selected};
    const newAnswers=[...answers,ans];
    setAnswers(newAnswers);

    // Adaptive logic
    if(correct){
      setStreak(s=>s+1);setWrongStreak(0);
      if(streak+1>=3&&currentLevel<ASSESS_LEVELS.length-1){
        setCurrentLevel(l=>l+1);setStreak(0);
      }
    }else{
      setWrongStreak(w=>w+1);setStreak(0);
      if(wrongStreak+1>=2&&currentLevel>0){
        setCurrentLevel(l=>l-1);setWrongStreak(0);
      }
    }

    setTimeout(()=>{
      if(qIdx<questions.length-1){
        setQIdx(qIdx+1);setSelected(null);setRevealed(false);
      }else{
        submitAnswers(newAnswers);
      }
    },1200);
  };

  const cardStyle={background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow};

  // === INTRO ===
  if(stage==="intro"){
    const lastDate=lastAssessmentScores?.date;
    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"24px 20px",background:T.bg}}>
      <FadeIn>
        <Badge color={T.accent} bg={T.accentSoft}>📋 ASSESSMENT</Badge>
        <h1 style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:T.text,margin:"14px 0 8px"}}>Level Check</h1>
        <p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:"0 0 24px",lineHeight:1.6}}>20 questions across vocabulary, grammar, reading, and listening. Takes about 10 minutes.</p>
      </FadeIn>
      <FadeIn delay={200}>
        <div style={{...cardStyle,marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {ASSESS_SKILLS.map(sk=><div key={sk} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:4,background:ASSESS_SKILL_COLORS[sk]}}/>
              <span style={{fontFamily:Fb,fontSize:13,color:T.text}}>{ASSESS_SKILL_LABELS[sk]}</span>
            </div>)}
          </div>
          <div style={{marginTop:16,padding:"12px 14px",background:T.bg,borderRadius:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Sparkles size={16} color={T.accent}/>
              <span style={{fontFamily:Fb,fontSize:13,color:T.text,fontWeight:500}}>Adaptive difficulty</span>
            </div>
            <p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"4px 0 0",lineHeight:1.5}}>Questions get harder as you answer correctly, and easier if you struggle.</p>
          </div>
        </div>
      </FadeIn>
      {lastDate&&<FadeIn delay={300}><div style={{background:T.navySoft,borderRadius:12,padding:14,marginBottom:20}}>
        <p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:0}}>Last assessment: {new Date(lastDate).toLocaleDateString()}</p>
      </div></FadeIn>}
      {error&&<p style={{fontFamily:Fb,fontSize:13,color:"#C0392B",margin:"0 0 12px"}}>{error}</p>}
      <FadeIn delay={350}>
        <Btn onClick={startAssessment} disabled={loading}>{loading?"Preparing questions...":"Start Assessment"}</Btn>
        <button onClick={onBack} style={{background:"none",border:"none",fontFamily:Fb,fontSize:13,color:T.muted,cursor:"pointer",marginTop:16,display:"block",width:"100%",textAlign:"center"}}>Back</button>
      </FadeIn>
    </div>;
  }

  // === QUESTIONS ===
  if(stage==="questions"){
    const q=questions[qIdx];
    if(!q)return null;
    const d=q.data||q;
    const opts=d.options||[];
    const correctIdx=d.correct??0;
    const skill=q.skill||"vocabulary";
    const skillColor=ASSESS_SKILL_COLORS[skill]||T.accent;
    const isListening=skill==="listening";
    const isReading=skill==="reading";
    const pct=Math.round(((qIdx)/questions.length)*100);

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:"24px 20px",background:T.bg}}>
      {/* Progress bar */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted}}>{qIdx+1} of {questions.length}</span>
          <span style={{fontFamily:Fb,fontSize:11,color:skillColor,fontWeight:600,background:`${skillColor}12`,padding:"2px 8px",borderRadius:4}}>{ASSESS_SKILL_LABELS[skill]||skill} · {q.level||ASSESS_LEVELS[currentLevel]}</span>
        </div>
        <div style={{height:6,borderRadius:3,background:T.border}}>
          <div style={{height:6,borderRadius:3,background:T.accent,width:`${pct}%`,transition:"width .4s"}}/>
        </div>
      </div>

      <FadeIn key={qIdx}>
        {/* Listening play button */}
        {isListening&&d.audio_text&&<div style={{...cardStyle,marginBottom:16,textAlign:"center"}}>
          <button onClick={()=>speakAssess(d.audio_text,d.rate||1.0)} style={{background:T.tealSoft,border:`2px solid ${T.teal}`,borderRadius:14,width:64,height:64,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}}>
            <svg width={28} height={28} viewBox="0 0 24 24" fill={T.teal} stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <p style={{fontFamily:Fb,fontSize:13,color:T.teal,fontWeight:500}}>Tap to listen</p>
          {d.listen_hint&&<p style={{fontFamily:Fb,fontSize:12,color:T.muted,margin:"4px 0 0"}}>{d.listen_hint}</p>}
        </div>}

        {/* Reading passage */}
        {isReading&&d.passage&&<div style={{...cardStyle,marginBottom:16,borderLeft:`4px solid ${T.ok}`}}>
          <p style={{fontFamily:Fb,fontSize:14,color:T.text,lineHeight:1.7,margin:0}}>{d.passage}</p>
        </div>}

        {/* Question stem */}
        <div style={{marginBottom:16}}>
          {d.context&&!isReading&&<p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 6px",fontStyle:"italic"}}>"{d.context}"</p>}
          <p style={{fontFamily:Fd,fontSize:18,fontWeight:600,color:T.text,margin:0,lineHeight:1.5}}>{d.stem||d.question||"—"}</p>
        </div>

        {/* Options */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {opts.map((opt,i)=>{
            const picked=selected===i;
            const isCorrect=i===correctIdx;
            let bg=T.card,border=T.border,col=T.text;
            if(revealed){
              if(isCorrect){bg=T.okSoft;border=T.ok;col=T.ok}
              else if(picked&&!isCorrect){bg="#FFF0F0";border="#E07A5F";col="#C0392B"}
            }else if(picked){bg=`${skillColor}10`;border=skillColor;col=skillColor}
            return <button key={i} onClick={()=>pickAnswer(i)} style={{background:bg,border:`2px solid ${border}`,borderRadius:10,padding:"12px 14px",cursor:revealed?"default":"pointer",textAlign:"left",fontFamily:Fb,fontSize:14,color:col,fontWeight:picked?600:400,lineHeight:1.5,transition:"all .2s"}}>
              <span style={{fontFamily:Fb,fontSize:12,fontWeight:700,color:revealed&&isCorrect?T.ok:(picked?col:T.muted),marginRight:8}}>{String.fromCharCode(65+i)}.</span>
              {opt}
              {revealed&&isCorrect&&<span style={{float:"right"}}><Check size={16} color={T.ok}/></span>}
            </button>;
          })}
        </div>

        {selected!==null&&!revealed&&<Btn onClick={confirmAnswer}>Confirm</Btn>}
        {revealed&&d.explanation&&<FadeIn><div style={{background:T.bg,borderRadius:10,padding:12,border:`1px solid ${T.border}`}}>
          <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:0,lineHeight:1.5}}>{d.explanation}</p>
        </div></FadeIn>}
      </FadeIn>
    </div>;
  }

  // === RESULTS ===
  if(stage==="results"&&results){
    const scores=results.scores||{};
    const prevScores=lastAssessmentScores?.scores||{};
    const overallLevel=results.overall_level||results.overallLevel||"B1";
    const skillLevels=results.skill_levels||results.skillLevels||{};

    // Find biggest improvement and weakest area
    let biggestImprove=null,biggestDelta=-999;
    let weakest=null,weakestScore=999;
    ASSESS_SKILLS.forEach(sk=>{
      const cur=scores[sk]||0;
      const prev=prevScores[sk]||0;
      const delta=cur-prev;
      if(delta>biggestDelta&&prev>0){biggestDelta=delta;biggestImprove={skill:sk,delta}}
      if(cur<weakestScore){weakestScore=cur;weakest=sk}
    });

    const[revealIdx,setRevealIdx]=useState(-1);
    useEffect(()=>{
      const timers=ASSESS_SKILLS.map((sk,i)=>setTimeout(()=>setRevealIdx(i),600+i*400));
      return()=>timers.forEach(clearTimeout);
    },[]);

    return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:"24px 20px",background:T.bg,paddingBottom:40}}>
      <FadeIn>
        <Badge color={T.accent} bg={T.accentSoft}>📋 RESULTS</Badge>
        <h1 style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:T.text,margin:"14px 0 8px"}}>Assessment Complete</h1>
      </FadeIn>

      {/* Overall level */}
      <FadeIn delay={300}>
        <div style={{...cardStyle,textAlign:"center",marginBottom:16,background:`linear-gradient(135deg,${T.accent}08,${T.hi}12)`}}>
          <p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Your level</p>
          <div style={{fontFamily:Fd,fontSize:52,fontWeight:700,color:T.accent,lineHeight:1}}>{overallLevel}</div>
          <p style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"6px 0 0"}}>Overall: {results.overall||0}%</p>
        </div>
      </FadeIn>

      {/* Animated per-skill scores */}
      <FadeIn delay={500}>
        <div style={{...cardStyle,marginBottom:16}}>
          <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.text,margin:"0 0 14px"}}>Per-Skill Scores</p>
          {ASSESS_SKILLS.map((sk,i)=>{
            const score=scores[sk]||0;
            const prev=prevScores[sk]||0;
            const delta=prev>0?score-prev:0;
            const color=ASSESS_SKILL_COLORS[sk];
            const visible=i<=revealIdx;
            const lvl=skillLevels[sk]||"—";
            return <div key={sk} style={{marginBottom:i<ASSESS_SKILLS.length-1?14:0,opacity:visible?1:0,transform:visible?"translateX(0)":"translateX(-20px)",transition:"all .5s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:8,height:8,borderRadius:4,background:color}}/>
                  <span style={{fontFamily:Fb,fontSize:13,fontWeight:500,color:T.text}}>{ASSESS_SKILL_LABELS[sk]}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontFamily:Fd,fontSize:16,fontWeight:700,color}}>{lvl}</span>
                  <span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color}}>{score}%</span>
                  {delta!==0&&<span style={{fontFamily:Fb,fontSize:11,fontWeight:600,color:delta>0?T.ok:"#C0392B"}}>{delta>0?"+":""}{delta}%</span>}
                </div>
              </div>
              <div style={{height:6,borderRadius:3,background:`${color}15`}}>
                <div style={{height:6,borderRadius:3,background:color,width:visible?`${score}%`:"0%",transition:"width 1s ease"}}/>
              </div>
            </div>;
          })}
        </div>
      </FadeIn>

      {/* Insights */}
      <FadeIn delay={2200}>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {biggestImprove&&biggestDelta>0&&<div style={{...cardStyle,background:T.okSoft,padding:16,border:`1px solid ${T.ok}20`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Trophy size={18} color={T.ok}/>
              <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:T.ok,margin:0}}>Biggest improvement</p>
            </div>
            <p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:"6px 0 0"}}>{ASSESS_SKILL_LABELS[biggestImprove.skill]} (+{biggestImprove.delta}%)</p>
          </div>}
          {weakest&&<div style={{...cardStyle,background:T.hiSoft,padding:16,border:`1px solid ${T.hi}40`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Zap size={18} color="#B8860B"/>
              <p style={{fontFamily:Fb,fontSize:14,fontWeight:600,color:"#B8860B",margin:0}}>Focus area</p>
            </div>
            <p style={{fontFamily:Fb,fontSize:13,color:T.text,margin:"6px 0 0"}}>{ASSESS_SKILL_LABELS[weakest]} — try more {weakest} exercises</p>
          </div>}
          <div style={{...cardStyle,background:T.navySoft,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <RefreshCw size={16} color={T.navy}/>
              <p style={{fontFamily:Fb,fontSize:13,color:T.navy,margin:0}}>Next assessment available in 14 days</p>
            </div>
          </div>
        </div>
      </FadeIn>

      <FadeIn delay={2600}>
        <Btn onClick={()=>onComplete(results)}>
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>Back to home<ArrowRight size={16}/></span>
        </Btn>
      </FadeIn>
    </div>;
  }

  return null;
}

/* ═══════════════════════════════════════════════
   PROGRESS SCREEN — dashboard with radar, CEFR, calendar, stats
   ═══════════════════════════════════════════════ */
function RadarChart({skills,size=260}){
  const cx=size/2,cy=size/2,r=size/2-30;
  const n=skills.length;
  const angleStep=(2*Math.PI)/n;
  const startAngle=-Math.PI/2;

  const pt=(i,val)=>{
    const a=startAngle+i*angleStep;
    const d=r*(val/100);
    return[cx+d*Math.cos(a),cy+d*Math.sin(a)];
  };

  const gridLevels=[25,50,75,100];
  const gridPaths=gridLevels.map(lv=>{
    const pts=skills.map((_,i)=>pt(i,lv));
    return pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")+"Z";
  });

  const axes=skills.map((_,i)=>{
    const[x,y]=pt(i,100);
    return{x1:cx,y1:cy,x2:x,y2:y};
  });

  const dataPts=skills.map((s,i)=>pt(i,s.value));
  const dataPath=dataPts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")+"Z";

  const labelPts=skills.map((s,i)=>{
    const[x,y]=pt(i,118);
    return{x,y,label:s.label};
  });

  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block",margin:"0 auto"}}>
    {gridPaths.map((d,i)=><path key={i} d={d} fill="none" stroke={T.border} strokeWidth={1} opacity={0.5}/>)}
    {axes.map((a,i)=><line key={i} x1={a.x1} y1={a.y1} x2={a.x2} y2={a.y2} stroke={T.border} strokeWidth={1} opacity={0.3}/>)}
    <path d={dataPath} fill={T.accent} fillOpacity={0.2} stroke={T.accent} strokeWidth={2}/>
    {dataPts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={4} fill={T.accent}/>)}
    {labelPts.map((lp,i)=><text key={i} x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="middle" style={{fontFamily:Fb,fontSize:11,fontWeight:600,fill:T.text}}>{lp.label}</text>)}
  </svg>;
}

function StreakCalendar({activeDays,streak}){
  const weeks=12;
  const today=new Date();
  const dayMs=864e5;
  const startDate=new Date(today.getTime()-((weeks*7)-1)*dayMs);
  const dayOfWeek=startDate.getDay();
  const cells=[];
  const activeSet=new Set((activeDays||[]).map(d=>typeof d==="string"?d:new Date(d).toISOString().split("T")[0]));
  const todayStr=today.toISOString().split("T")[0];

  for(let i=0;i<weeks*7;i++){
    const d=new Date(startDate.getTime()+i*dayMs);
    const ds=d.toISOString().split("T")[0];
    const future=ds>todayStr;
    const active=activeSet.has(ds);
    const col=Math.floor(i/7);
    const row=i%7;
    cells.push({ds,active,future,col,row});
  }

  const cellSize=12,gap=3;
  const svgW=(cellSize+gap)*weeks-gap;
  const svgH=(cellSize+gap)*7-gap;
  const dayLabels=["","M","","W","","F",""];

  return <div>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
      <div style={{width:48,height:48,borderRadius:14,background:T.accentSoft,display:"flex",alignItems:"center",justifyContent:"center"}}><Flame size={22} color={T.accent}/></div>
      <div>
        <div style={{fontFamily:Fd,fontSize:28,fontWeight:700,color:T.accent,lineHeight:1}}>{streak}</div>
        <div style={{fontFamily:Fb,fontSize:12,color:T.muted}}>day streak</div>
      </div>
    </div>
    <div style={{display:"flex",gap:6}}>
      <div style={{display:"flex",flexDirection:"column",gap:gap,paddingTop:0}}>
        {dayLabels.map((l,i)=><div key={i} style={{height:cellSize,display:"flex",alignItems:"center"}}><span style={{fontFamily:Fb,fontSize:9,color:T.muted,width:14,textAlign:"right"}}>{l}</span></div>)}
      </div>
      <svg width={svgW} height={svgH}>
        {cells.map((c,i)=>{
          if(c.future)return <rect key={i} x={c.col*(cellSize+gap)} y={c.row*(cellSize+gap)} width={cellSize} height={cellSize} rx={2} fill={T.border} opacity={0.2}/>;
          return <rect key={i} x={c.col*(cellSize+gap)} y={c.row*(cellSize+gap)} width={cellSize} height={cellSize} rx={2} fill={c.active?T.ok:T.border} opacity={c.active?0.9:0.3}/>;
        })}
      </svg>
    </div>
  </div>;
}

function ProgressScreen({level,streak,lessons,cardStats,convoCount,lpp,allCards,onBack,onImmersion}){
  const[progressData,setProgressData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[expandedPhrase,setExpandedPhrase]=useState(null);
  const[masteryToast,setMasteryToast]=useState(null);

  useEffect(()=>{
    (async()=>{
      const d=await apiLoad();
      setProgressData(d);
      setLoading(false);
    })();
  },[]);

  const stats=cardStats||{};
  const totalSeen=Object.values(stats).filter(s=>s.seen>0).length;
  const totalMastered=Object.values(stats).filter(s=>s.mastery>=4).length;
  const totalCorrect=Object.values(stats).reduce((a,s)=>a+(s.correct||0),0);
  const totalAttempts=Object.values(stats).reduce((a,s)=>a+(s.seen||0),0);
  const accuracy=totalAttempts>0?Math.round((totalCorrect/totalAttempts)*100):0;

  // Estimate per-skill scores (0-100) from available data
  const readingScore=Math.min(100,Math.round((lessons/30)*60+(totalSeen/50)*40));
  const vocabScore=Math.min(100,Math.round((totalMastered/40)*70+(totalSeen/60)*30));
  const grammarScore=Math.min(100,Math.round(accuracy*0.7+(lessons/20)*30));
  const listeningScore=Math.min(100,Math.round((lessons/40)*50+accuracy*0.3));
  const writingScore=Math.min(100,Math.round((lessons/30)*40+(accuracy*0.4)));
  const speakingScore=Math.min(100,Math.round(((convoCount||0)/10)*60+(lessons/30)*30));

  const skills=[
    {label:"Reading",value:readingScore},
    {label:"Listening",value:listeningScore},
    {label:"Writing",value:writingScore},
    {label:"Speaking",value:speakingScore},
    {label:"Grammar",value:grammarScore},
    {label:"Vocabulary",value:vocabScore}
  ];

  // CEFR estimation per skill
  const toCEFR=(v)=>v>=90?"C1":v>=70?"B2":v>=50?"B1":v>=30?"A2":v>=15?"A1":"Pre-A1";
  const skillCEFR=skills.map(s=>({...s,cefr:toCEFR(s.value)}));
  const avgScore=Math.round(skills.reduce((a,s)=>a+s.value,0)/skills.length);
  const overallCEFR=toCEFR(avgScore);

  // Immersion readiness based on skill levels
  const readinessItems=[];
  if(readingScore>=40)readinessItems.push({status:"ok",text:"English articles and blogs"});
  else readinessItems.push({status:"no",text:"English articles without a dictionary"});
  if(listeningScore>=30)readinessItems.push({status:"ok",text:"Simple podcasts and slow videos"});
  else readinessItems.push({status:"no",text:"Simple English podcasts"});
  if(readingScore>=60&&listeningScore>=50)readinessItems.push({status:"ok",text:"Netflix with English subtitles"});
  else if(readingScore>=40||listeningScore>=30)readinessItems.push({status:"almost",text:"Netflix with English subtitles"});
  else readinessItems.push({status:"no",text:"Netflix with English subtitles"});
  if(listeningScore>=70&&speakingScore>=60)readinessItems.push({status:"ok",text:"Meetings without prep"});
  else if(listeningScore>=50||speakingScore>=40)readinessItems.push({status:"almost",text:"Meetings without much prep"});
  else readinessItems.push({status:"no",text:"Fast podcasts and meetings without prep"});
  if(speakingScore>=50&&vocabScore>=50)readinessItems.push({status:"ok",text:"Casual conversations with natives"});
  else if(speakingScore>=30)readinessItems.push({status:"almost",text:"Casual conversations with natives"});
  else readinessItems.push({status:"no",text:"Casual conversations with native speakers"});
  if(writingScore>=60&&grammarScore>=60)readinessItems.push({status:"ok",text:"Writing professional emails"});
  else if(writingScore>=35)readinessItems.push({status:"almost",text:"Writing professional emails"});
  else readinessItems.push({status:"no",text:"Professional email writing"});

  const statusIcon={ok:"✅",almost:"⚠️",no:"❌"};
  const statusColor={ok:T.ok,almost:"#B8860B",no:"#C0392B"};
  const statusLabel={ok:"Ready",almost:"Almost",no:"Not yet"};

  // Build active days from progress data
  const activeDays=[];
  if(progressData?.lastDate){
    // We track lastDate and streak, reconstruct active days
    const last=new Date(progressData.lastDate);
    const s=progressData.streak||0;
    for(let i=0;i<s;i++){
