orderRadius:10,padding:10,textAlign:"center"}}><div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:T.purple}}>{totalMastered}</div><div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>mastered</div></div><div style={{background:T.hiSoft,borderRadius:10,padding:10,textAlign:"center"}}><div style={{fontFamily:Fd,fontSize:22,fontWeight:700,color:"#B8860B"}}>{streak}</div><div style={{fontFamily:Fb,fontSize:10,color:T.muted}}>streak</div></div></div><div style={{background:T.bg,borderRadius:12,padding:14}}><p style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:T.text,margin:"0 0 8px"}}>{P.proofWallTitle}</p>{proofPhrases.map(c=>{const st=allStats[c.id];const ml=["New","Seen","Familiar","Practiced","Strong","Mastered"][st?Math.min(st.mastery,5):0];return <p key={c.id} style={{fontFamily:Fb,fontSize:13,color:T.muted,margin:"0 0 3px",lineHeight:1.5}}><em style={{color:T.text}}>"{c.phrase}"</em> <span style={{fontSize:11,color:T.purple}}>({ml})</span></p>})}</div></div></FadeIn><FadeIn delay={700} style={{width:"100%",maxWidth:360}}><Btn onClick={onContinue}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>See what's next<ArrowRight size={18}/></span></Btn></FadeIn></div>}

function TomorrowScreen({lppProfile,onNextLesson,onRestart}){const teaser=rnd(TT);const P=getLPP(lppProfile);return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:32,background:T.bg}}><FadeIn><Badge>COMING TOMORROW</Badge><h2 style={{fontFamily:Fd,fontSize:26,fontWeight:700,color:T.text,margin:"12px 0 8px"}}>{teaser.title}</h2><p style={{fontFamily:Fb,fontSize:15,color:T.muted,margin:"0 0 32px",lineHeight:1.5}}>{teaser.hint}</p></FadeIn><FadeIn delay={300}><div style={{background:T.card,borderRadius:16,padding:20,boxShadow:T.shadow,marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}><div style={{width:40,height:40,borderRadius:10,background:`${P.color}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{P.icon}</div><div><p style={{fontFamily:Fb,fontSize:12,fontWeight:600,color:T.muted,margin:"0 0 2px",textTransform:"uppercase",letterSpacing:"0.06em"}}>Your learning style</p><p style={{fontFamily:Fb,fontSize:14,fontWeight:500,color:T.text,margin:0}}>{P.label}</p></div></div></div></FadeIn><FadeIn delay={500}><div style={{background:`linear-gradient(135deg,${P.color}08,${T.hi}15)`,borderRadius:16,padding:18,marginBottom:32,border:`1px solid ${T.border}`}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><Heart size={16} color={P.color}/><span style={{fontFamily:Fb,fontSize:13,fontWeight:600,color:P.color}}>What's next</span></div><p style={{fontFamily:Fb,fontSize:14,color:T.text,margin:0,lineHeight:1.6}}>{P.tomorrowHook}</p></div></FadeIn><FadeIn delay={700}><Btn onClick={onNextLesson}><span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>One more session<ArrowRight size={18}/></span></Btn><button onClick={onRestart} style={{background:"none",border:"none",fontFamily:Fb,fontSize:13,color:T.muted,cursor:"pointer",marginTop:16,display:"block",width:"100%",textAlign:"center",opacity:.5}}>Reset progress</button></FadeIn></div>}

/* ═══════════════════════════════════════════════
   MAIN APP — with API auth + persistence
   ═══════════════════════════════════════════════ */
function App(){
  const[loading,setLoading]=useState(true);
  const[authed,setAuthed]=useState(false);
  const[screen,setScreen]=useState("welcome");
  const[lpp,setLpp]=useState(null);
  const[level,setLevel]=useState("B1");
  const[lScore,setLScore]=useState({s:0,t:0});
  const[streak,setStreak]=useState(0);
  const[lessons,setLessons]=useState(0);
  const[lessonCards,setLessonCards]=useState([]);
  const[cardStats,setCardStats]=useState({});
  const[allCards,setAllCards]=useState([]);
  const[isAdmin,setIsAdminState]=useState(false);
  const[sessionData,setSessionData]=useState(null);
  const[sessionLoading,setSessionLoading]=useState(false);
  const[recallMsg,setRecallMsg]=useState("");

  const loadCards=async()=>{
    const cards=await apiLoadCards();
    setAllCards(cards);
    return cards;
  };

  useEffect(()=>{
    (async()=>{
      if(!getToken()){setLoading(false);return}
      setIsAdminState(getIsAdmin());
      const[d]=await Promise.all([apiLoad(),loadCards()]);
      if(d&&d.lessonsCompleted>0){
        const s=calcStreak(d.lastDate,d.streak);
        setStreak(s);setLpp(d.lppProfile);setLevel(d.userLevel);setLessons(d.lessonsCompleted);setCardStats(d.cardStats||{});
        setScreen("welcome-back");
      }
      setAuthed(true);setLoading(false);
    })();
  },[]);

  const onAuth=async()=>{
    setIsAdminState(getIsAdmin());
    const[d]=await Promise.all([apiLoad(),loadCards()]);
    if(d&&d.lessonsCompleted>0){
      const s=calcStreak(d.lastDate,d.streak);
      setStreak(s);setLpp(d.lppProfile);setLevel(d.userLevel);setLessons(d.lessonsCompleted);setCardStats(d.cardStats||{});
      setScreen("welcome-back");
    }else{setScreen("welcome")}
    setAuthed(true);
  };

  const onLogout=()=>{clearToken();setIsAdmin(false);setIsAdminState(false);setAuthed(false);setScreen("welcome");setLpp(null);setLevel("B1");setStreak(0);setLessons(0);setCardStats({});setAllCards([])};

  const persist=async(nl,prof,lv,newStats)=>{
    const t=getToday(),d=await apiLoad(),prev=d?d.streak:0,pd=d?d.lastDate:null;
    let s;if(pd===t)s=prev;else if(pd===new Date(Date.now()-864e5).toISOString().split("T")[0])s=prev+1;else s=1;
    await apiSave({streak:s,lastDate:t,lessonsCompleted:nl,lppProfile:prof,userLevel:lv,cardStats:newStats});setStreak(s);
  };

  const startSession=async()=>{
    setSessionLoading(true);
    const session=await apiComposeSession();
    setSessionLoading(false);
    if(session&&session.type==="mixed"&&session.passage){
      setSessionData(session);
      setScreen("reading");
    }else{
      setScreen("lesson");
    }
  };

  const onGoal=id=>{setLpp(id);setScreen("placement")};
  const onPlace=lv=>{setLevel(lv);setScreen("level-reveal")};

  const onLesson=async(score,total,cards,results)=>{
    const ns={...cardStats};for(const r of results){ns[r.cardId]=updateSRS(ns[r.cardId]||newCardStats(),r.correct)}
    setCardStats(ns);const nl=lessons+1;setLessons(nl);setLScore({s:score,t:total});setLessonCards(cards);await persist(nl,lpp,level,ns);setScreen("celebration");
  };

  const onReadingComplete=(score,total,results,rcMsg)=>{
    const nl=lessons+1;setLessons(nl);setLScore({s:score,t:Math.max(total,1)});setLessonCards([]);
    setRecallMsg(rcMsg||"");
    persist(nl,lpp,level,cardStats);
    setSessionData(null);setScreen("celebration");
  };

  const onReset=async()=>{await apiReset();setScreen("welcome");setLpp(null);setLevel("B1");setStreak(0);setLessons(0);setLessonCards([]);setCardStats({})};

  const masteredCount=Object.values(cardStats).filter(s=>s.mastery>=4).length;
  const seenCount=Object.values(cardStats).filter(s=>s.seen>0).length;

  if(loading) return <div style={{maxWidth:440,margin:"0 auto",background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Loading...</p></div>;
  if(!authed) return <div style={{maxWidth:440,margin:"0 auto"}}><AuthScreen onAuth={onAuth}/></div>;

  return <div style={{maxWidth:440,margin:"0 auto",background:T.bg,minHeight:"100vh",position:"relative",overflow:"hidden"}}>
    {screen==="welcome"&&<WelcomeScreen onStart={()=>setScreen("goal")} isAdmin={isAdmin} onAdmin={()=>setScreen("admin")}/>}
    {screen==="welcome-back"&&<WelcomeBackScreen streak={streak} level={level} phrases={seenCount} masteredCount={masteredCount} lpp={lpp} onContinue={startSession} onReset={onReset} onLogout={onLogout} isAdmin={isAdmin} onAdmin={()=>setScreen("admin")}/>}
    {screen==="goal"&&<GoalScreen onSelect={onGoal}/>}
    {screen==="placement"&&<PlacementScreen onComplete={onPlace}/>}
    {screen==="level-reveal"&&<LevelRevealScreen level={level} onContinue={()=>setScreen("lesson")}/>}
    {screen==="lesson"&&<LessonScreen cards={allCards} onComplete={onLesson} allStats={cardStats} lpp={lpp}/>}
    {screen==="reading"&&sessionData&&<ReadingScreen session={sessionData} cards={allCards} onComplete={onReadingComplete} allStats={cardStats} lpp={lpp}/>}
    {screen==="celebration"&&<CelebrationScreen score={lScore.s} total={lScore.t} streak={streak} lessonCards={lessonCards} allStats={cardStats} lpp={lpp} recallMsg={recallMsg} onContinue={()=>setScreen("tomorrow")}/>}
    {screen==="tomorrow"&&<TomorrowScreen lppProfile={lpp} onNextLesson={startSession} onRestart={onReset}/>}
    {screen==="admin"&&<AdminPanel onBack={()=>setScreen(lessons>0?"welcome-back":"welcome")}/>}
    {sessionLoading&&<div style={{position:"fixed",inset:0,background:"rgba(251,247,240,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{width:48,height:48,borderRadius:24,background:`linear-gradient(135deg,${T.accent},${T.hi})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><BookOpen size={22} color="#fff"/></div><p style={{fontFamily:Fd,fontSize:18,color:T.muted,fontStyle:"italic"}}>Preparing your session...</p></div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
